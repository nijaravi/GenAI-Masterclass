        {/* ── Ch12: Why A2A Exists ── */}
        <section id="ag14" style={{paddingTop:"2.5rem"}}>
          <ChH num="12" title="Why A2A Exists" sub="MCP connects agents to tools. A2A connects agents to each other." color="var(--violet)"/>
          <P>MCP solved the agent-to-tool problem. But what about agent-to-agent? If you have a LangGraph agent that's great at research and a CrewAI agent that's great at writing, how do they collaborate? Without a standard, you'd need custom integration code for every agent-to-agent combination — the same M×N problem all over again.</P>
          <P>Google introduced the Agent-to-Agent (A2A) protocol in April 2025 to solve exactly this. A2A standardises how agents <S color="var(--violet)">discover each other's capabilities</S>, <S color="var(--violet)">delegate tasks</S>, and <S color="var(--violet)">exchange results</S> — regardless of what framework they're built on.</P>
          <SubH>MCP vs A2A — they're complementary, not competing</SubH>
          <div style={{margin:"1rem 0",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{padding:"14px",background:"var(--teal-bg)",borderRadius:10,border:"1px solid var(--teal-border)"}}>
              <div style={{color:"var(--teal)",fontWeight:700,fontSize:"0.92rem",marginBottom:4}}>MCP — Vertical</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.84rem",lineHeight:1.6}}>Agent connects <S>down</S> to tools and data. Like an employee accessing company systems. One agent, many tools.</div>
            </div>
            <div style={{padding:"14px",background:"var(--violet-bg)",borderRadius:10,border:"1px solid "+("var(--violet)"+"33")}}>
              <div style={{color:"var(--violet)",fontWeight:700,fontSize:"0.92rem",marginBottom:4}}>A2A — Horizontal</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.84rem",lineHeight:1.6}}>Agent connects <S>across</S> to other agents. Like employees collaborating between departments. Agent to agent.</div>
            </div>
          </div>
          <Callout color="var(--violet)" icon="🤝"><S>When you need A2A:</S> when your system has agents built on different frameworks that need to work together. A LangGraph orchestrator that delegates research to a CrewAI agent team. An OpenAI agent that hands off to a specialised analysis agent built with a custom framework. A2A is the glue.</Callout>
        </section>

        {/* ── Ch13: A2A Core Concepts ── */}
        <section id="ag15" style={{paddingTop:"2.5rem"}}>
          <ChH num="13" title="A2A Core Concepts" sub="Agent Cards, Tasks, and Payloads — the three building blocks" color="var(--violet)"/>
          <P>A2A is built on three concepts: <S color="var(--violet)">Agent Cards</S> for discovery, <S color="var(--violet)">Tasks</S> for delegation, and <S color="var(--violet)">Payloads</S> for data exchange. All of it runs over HTTP with JSON-RPC — familiar infrastructure, new protocol.</P>
          <div style={{margin:"1.5rem 0",display:"flex",flexDirection:"column",gap:12}}>
            {[
              {concept:"Agent Cards",color:"#7C3AED",icon:"🪪",
                desc:"A machine-readable description of what an agent can do. Published at a well-known URL (like /.well-known/agent.json). Other agents read this to discover capabilities, input/output formats, and authentication requirements.",
                example:`{
  "name": "Research Agent",
  "description": "Researches topics using web search and document analysis",
  "url": "https://research-agent.example.com",
  "capabilities": {
    "streaming": true,
    "pushNotifications": false
  },
  "skills": [
    {"name": "web_research", "description": "Search and synthesize web sources"},
    {"name": "document_analysis", "description": "Analyze uploaded documents"}
  ],
  "authentication": {"schemes": ["bearer"]}
}`},
              {concept:"Tasks",color:"#4F46E5",icon:"📋",
                desc:"A unit of work with a defined lifecycle. A client agent creates a task, the remote agent processes it, and the task progresses through states: submitted → working → input-required → completed / failed / canceled.",
                example:`// Client sends a task
POST /tasks/send
{
  "id": "task-abc-123",
  "message": {
    "role": "user",
    "parts": [{"type": "text", "text": "Research the latest EV market trends in Southeast Asia"}]
  }
}

// Server responds with task status
{
  "id": "task-abc-123",
  "status": {"state": "working"},
  "history": [...]
}`},
              {concept:"Payloads (Parts & Artifacts)",color:"#0D9488",icon:"📦",
                desc:"Tasks carry structured content. Parts are inline data (text, files, structured data) sent in messages. Artifacts are outputs the agent produces — like a completed report or analysis. Both support multiple content types.",
                example:`// Task completion with an artifact
{
  "id": "task-abc-123",
  "status": {"state": "completed"},
  "artifacts": [{
    "name": "ev_market_report",
    "parts": [
      {"type": "text", "text": "# EV Market in Southeast Asia\\n\\n..."},
      {"type": "file", "file": {"name": "data.csv", "mimeType": "text/csv", "bytes": "..."}}
    ]
  }]
}`},
            ].map((c,i)=>(
              <div key={i} style={{padding:"14px 16px",background:"white",borderRadius:12,border:"1px solid "+c.color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:"1.3rem"}}>{c.icon}</span>
                  <span style={{fontWeight:700,fontSize:"1rem",color:c.color}}>{c.concept}</span>
                </div>
                <div style={{color:"var(--text)",fontSize:"0.86rem",marginBottom:10,lineHeight:1.7}}>{c.desc}</div>
                <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"10px 12px",fontSize:"0.72rem",fontFamily:"'JetBrains Mono'",color:"#C9CDD3",lineHeight:1.55,margin:0,overflowX:"auto"}}>{c.example}</pre>
              </div>
            ))}
          </div>
          <Callout color="var(--violet)" icon="💡"><S>Think of it like microservices for agents.</S> Agent Cards are like API documentation (OpenAPI spec). Tasks are like HTTP requests with a lifecycle. Payloads are the request/response bodies. If you've built REST APIs, A2A's mental model will feel familiar.</Callout>
          <NB/>
        </section>

        {/* ── Ch14: MCP + A2A Together ── */}
        <section id="ag16" style={{paddingTop:"2.5rem"}}>
          <ChH num="14" title="MCP + A2A Together" sub="The three-layer protocol stack for agentic AI" color="var(--violet)"/>
          <P>MCP and A2A form a protocol stack. Together with the Agentic AI Foundation (AAIF) governance layer, they create the infrastructure for an ecosystem where any agent can use any tool and collaborate with any other agent.</P>
          <ProtocolStackDemo/>
          <SubH>A real-world example: cross-framework research team</SubH>
          <P>Imagine you have a research orchestrator (LangGraph), a web researcher (custom Python), and a report writer (CrewAI). Here's how the protocols connect them:</P>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:6}}>
            {[
              {step:"1",desc:"Orchestrator reads the Web Researcher's Agent Card → discovers it has 'web_research' skill",protocol:"A2A",color:"#7C3AED"},
              {step:"2",desc:"Orchestrator sends a research Task to Web Researcher via A2A",protocol:"A2A",color:"#7C3AED"},
              {step:"3",desc:"Web Researcher calls search_web() and fetch_page() via its MCP server",protocol:"MCP",color:"#0D9488"},
              {step:"4",desc:"Web Researcher returns completed Task with research data as artifacts",protocol:"A2A",color:"#7C3AED"},
              {step:"5",desc:"Orchestrator reads the Report Writer's Agent Card → discovers 'report_writing' skill",protocol:"A2A",color:"#7C3AED"},
              {step:"6",desc:"Orchestrator sends writing Task to Report Writer, passing research artifacts as context",protocol:"A2A",color:"#7C3AED"},
              {step:"7",desc:"Report Writer saves the report via its MCP file-system server",protocol:"MCP",color:"#0D9488"},
              {step:"8",desc:"Report Writer returns completed Task with the final report as artifact",protocol:"A2A",color:"#7C3AED"},
            ].map((s,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"30px 1fr 60px",gap:8,padding:"6px 0",borderBottom:i<7?"1px solid var(--border-light)":"none",alignItems:"center"}}>
                <span style={{color:"var(--text-muted)",fontWeight:700,fontSize:"0.82rem",textAlign:"center"}}>{s.step}</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.82rem"}}>{s.desc}</span>
                <span style={{color:s.color,fontWeight:700,fontSize:"0.68rem",padding:"2px 6px",background:s.color+"14",borderRadius:4,textAlign:"center"}}>{s.protocol}</span>
              </div>
            ))}
          </div>
          <P>Notice: MCP handles steps 3 and 7 (agent ↔ tools). A2A handles steps 1, 2, 4, 5, 6, 8 (agent ↔ agent). Neither protocol knows or cares about the other — they're independent layers that compose naturally.</P>
          <Callout color="var(--violet)" icon="🌐"><S>The bigger picture:</S> MCP + A2A together mean that a LangGraph agent, a CrewAI agent, and an OpenAI agent can collaborate on a task — each using their own MCP tool servers — without any of them knowing what framework the others use. This is the infrastructure vision that the Agentic AI Foundation is governing. You're learning the protocols that will define how AI systems work together for years to come.</Callout>
        </section>

        {/* ── Practice 1: ReAct Agent ── */}
        <section id="ag17" style={{paddingTop:"2.5rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><SectionTag label="PRACTICE" color="var(--info-color)" bg="var(--info-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Practice — Build a ReAct Agent from Scratch</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>No framework. Just Python + OpenAI API + the agent loop.</div>
          </div>
          <P>Build a complete ReAct agent without any agent framework. This exercise forces you to understand every piece of the agent loop before frameworks abstract it away.</P>
          <SubH>What to build</SubH>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {t:"The agent loop",d:"Implement the while-loop from Chapter 1. Use gpt-4o-mini. Support multiple tool calls per iteration. Track iteration count."},
              {t:"3 tools minimum",d:"search_web (simulated), calculate (eval math expressions safely), get_current_date. Each with a proper JSON schema."},
              {t:"Tool validation",d:"Before executing any tool call, verify the tool name exists in your tool registry. Return a helpful error if the model hallucinates a tool."},
              {t:"Max iteration safety",d:"Hard cap at 10 iterations. If reached, return the best partial answer with a note that the agent hit its limit."},
              {t:"Conversation logging",d:"Print every Think/Act/Observe step as the agent runs. After completion, print total iterations, tool calls made, and tokens used."},
              {t:"Test on 5 queries",d:"'What is 2^10 + 3^5?' (needs calculate), 'What day is it?' (needs date), 'What's the capital of UAE and its population?' (needs search), 'Hello!' (should answer directly — no tools), 'What's 15% tip on $85.50?' (needs calculate, possibly two steps)."},
            ].map((p,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:3}}>{p.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{p.d}</div>
              </div>
            ))}
          </div>
          <Callout color="var(--info-color)" icon="📄"><S>Why this exercise matters:</S> every agent framework you used in Section 6 is an abstraction over this loop. If you can build it from scratch, you'll understand what LangGraph's nodes and edges actually do, why max_iter matters, and where to look when an agent misbehaves in production.</Callout>
        </section>

        {/* ── Practice 2: MCP Server ── */}
        <section id="ag18" style={{paddingTop:"2.5rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><SectionTag label="PRACTICE" color="var(--info-color)" bg="var(--info-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Practice — Build an MCP Server + Client</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Create a tool server, connect it to an agent, test end-to-end</div>
          </div>
          <P>Build your own MCP server (extending or modifying the TechStore example from Chapter 10), then connect it to an agent and verify the full discovery → invocation → response loop.</P>
          <SubH>What to build</SubH>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {t:"An MCP server with 3+ tools",d:"Extend the TechStore server or build a new one for a domain you're interested in (weather, news, personal finance, code analysis). Each tool must have: descriptive name, clear docstring, typed parameters, proper error handling."},
              {t:"At least 1 resource",d:"Expose a static resource (documentation, policy, configuration). Verify it shows up in resources/list."},
              {t:"Test with mcp dev",d:"Run mcp dev server.py and use the MCP Inspector to: list tools, call each tool with valid inputs, call with invalid inputs (verify error handling), list and read resources."},
              {t:"Connect to an agent",d:"Wire your MCP server to either: (a) Claude Desktop via config, (b) OpenAI Agents SDK, or (c) your ReAct agent from Practice 1. The agent should discover tools automatically."},
              {t:"End-to-end test",d:"Ask the agent a question that requires your custom tool. Verify: agent discovers tool → calls it with correct args → receives result → uses result in answer."},
              {t:"Error scenario",d:"Test what happens when the agent calls a tool with bad input. Your server should return a clear error message, and the agent should handle it gracefully (retry or ask the user)."},
            ].map((p,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:3}}>{p.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{p.d}</div>
              </div>
            ))}
          </div>
          <Callout color="var(--info-color)" icon="📄"><S>Why this exercise matters:</S> MCP is the standard interface between agents and the outside world. Building a server teaches you the protocol from the tool-provider side — which is exactly the perspective you'll need when exposing your company's internal APIs to AI agents. This skill will only become more valuable as agent adoption grows.</Callout>
        </section>

        {/* ── Cheat Sheet ── */}
        <section id="ag-cheat" style={{paddingTop:"2rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><SectionTag label="REFERENCE" color="var(--indigo)" bg="var(--indigo-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Cheat Sheet</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Architecture & protocol quick reference</div>
          </div>
          <SubH>Architecture decision guide</SubH>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {q:"Task: answer questions using search + docs",a:"ReAct. The default. Tight think-act-observe loop. Start here.",color:"#4F46E5"},
              {q:"Task: multi-step workflow with 5+ steps",a:"Plan-and-Execute. Upfront planning prevents wasted tool calls.",color:"#0D9488"},
              {q:"Task: generate code that needs to pass tests",a:"Reflexion. Self-critique catches bugs. Worth the extra tokens.",color:"#B45309"},
              {q:"Not sure which architecture to use",a:"Start with ReAct. Run 20 test queries. Switch only when you see specific failures.",color:"#4F46E5"},
              {q:"Need to expose internal APIs to agents",a:"Build an MCP server. Write it once, connect to any agent.",color:"#0D9488"},

            ].map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1.5fr auto 1.5fr",gap:12,alignItems:"flex-start",padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontSize:"0.84rem",color:"var(--text)"}}>{r.q}</div>
                <div style={{color:r.color,fontSize:"0.92rem",paddingTop:2}}>→</div>
                <div style={{fontSize:"0.83rem",color:r.color,fontWeight:600,lineHeight:1.55}}>{r.a}</div>
              </div>
            ))}
          </div>
          <SubH>MCP quick reference</SubH>
          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              ["Capability","Method","When to use"],
              ["Tools","tools/list, tools/call","Agent needs to take action (search, create, update)"],
              ["Resources","resources/list, resources/read","Agent needs background data (docs, configs, catalogs)"],
              ["Prompts","prompts/list, prompts/get","Standardise complex interactions with curated templates"],
              ["Transport: stdio","Local process","Development, local tools, CLI integrations"],
              ["Transport: SSE","HTTP + Server-Sent Events","Web-deployed servers, remote tools"],
              ["Transport: Streamable HTTP","Bidirectional HTTP","Production systems needing server-initiated messages"],
            ].map((row,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1.4fr 1.2fr 2fr",gap:8,padding:"6px 0",borderBottom:i<6?"1px solid var(--border-light)":"none",fontSize:i===0?"0.72rem":"0.82rem",fontWeight:i===0?700:400,color:i===0?"var(--text-muted)":"var(--text-secondary)"}}>
                {row.map((c,j)=><span key={j} style={{color:j===0&&i>0?"var(--teal)":undefined,fontWeight:j===0&&i>0?600:undefined,fontFamily:j===1&&i>0?"'JetBrains Mono'":undefined,fontSize:j===1&&i>0?"0.76rem":undefined}}>{c}</span>)}
              </div>
            ))}
          </div>
          <SubH>Agent safety essentials</SubH>
          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              "Max iteration limit on every agent loop (recommended: 10–15)",
              "Tool call validation — reject hallucinated tool names before execution",
              "Error messages agents can act on — not stack traces",
              "Tool descriptions that are specific and unambiguous",
              "Structured output for tool arguments (not free-text parsing)",
              "Track total tokens per agent session for cost visibility",
              "For loop with range(max_iter) — never while True",
              "Test your agent on 20+ queries before deploying, including adversarial inputs",
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<7?"1px solid var(--border-light)":"none",fontSize:"0.86rem"}}>
                <span style={{color:"var(--indigo)"}}>✓</span>
                <span style={{color:"var(--text-secondary)"}}>{s}</span>
              </div>

          </div>
          <Callout color="var(--accent)" icon="🎓"><S>Section 10 complete.</S> You now understand agent architectures at a deep level — ReAct, Plan-and-Execute, and Reflexion — and the protocol stack (MCP + A2A) that connects agents to the world. You've built an agent loop from scratch and an MCP server that any AI client can use. The next section moves into <S>Agent Frameworks & Multi-Agent Systems</S> — where you'll build with LangGraph, CrewAI, and OpenAI's SDK, and learn how multiple agents collaborate in production.</Callout>
