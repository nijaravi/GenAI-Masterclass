<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #FAFAF8; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF;
  --border: #E8E5E0; --border-light: #F0EDE8;
  --text: #2D2B28; --text-secondary: #6B6560; --text-muted: #9C9690;
  --accent: #1A6B4E; --accent-light: #E8F5EE; --accent-hover: #15573F;
  --build-color: #B45309; --build-bg: #FEF3C7; --build-border: #FCD34D;
  --work-color: #1A6B4E; --work-bg: #E8F5EE; --work-border: #6EE7B7;
  --info-color: #1E6091; --info-bg: #EFF6FF; --info-border: #93C5FD;
  --purple: #6D28D9; --purple-bg: #F3F0FF;
  --orange: #C2410C; --orange-bg: #FFF7ED;
  --red: #B91C1C; --red-bg: #FEF2F2;
  --demo-bg: #1A1D27; --demo-border: #2E3240; --demo-text: #E2E8F0;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:16px; line-height:1.7; }
::selection { background:#1A6B4E33; }
pre { white-space:pre-wrap; word-wrap:break-word; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); background:var(--sidebar-bg); border-right:1px solid var(--border); overflow-y:auto; z-index:50; padding:0.75rem 0; scrollbar-width:thin; }
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:#D1D5DB; border-radius:2px; }
.sidebar-logo { padding:0 1rem 0.85rem; border-bottom:1px solid var(--border); margin-bottom:0.5rem; }
.sidebar-logo h2 { font-family:'Libre Baskerville',serif; font-size:0.92rem; color:var(--text); line-height:1.35; }
.sidebar-logo p { font-size:0.72rem; color:var(--accent); font-weight:600; margin-top:2px; }
.sidebar-section { padding:0.25rem 0.75rem; margin-top:0.25rem; }
.sidebar-label { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:1.1px; color:var(--text-muted); margin-bottom:0.35rem; padding:8px 9px 2px; margin-top:4px; }
.sidebar-item { display:block; padding:5px 9px; border-radius:7px; text-decoration:none; font-size:0.8rem; color:var(--text-secondary); transition:all 0.15s; cursor:pointer; margin-bottom:1px; border:1px solid transparent; }
.sidebar-item:hover { background:var(--bg); color:var(--text); }
.sidebar-item.active { background:var(--accent-light); color:var(--accent); font-weight:600; border-color:#6EE7B733; }
.sidebar-item .num { display:inline-block; width:20px; height:20px; border-radius:5px; text-align:center; line-height:20px; font-size:0.66rem; font-weight:700; margin-right:7px; }
.sidebar-item .sub { font-size:0.66rem; color:var(--text-muted); display:block; }
.main { margin-left:var(--sidebar-w); min-height:100vh; }
.content { max-width:760px; margin:0 auto; padding:2rem 2.5rem 4rem; }
@media(max-width:900px) { .sidebar{display:none;} .main{margin-left:0;} .content{padding:1.5rem 1rem 3rem;} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slideDown { from{max-height:0;opacity:0} to{max-height:500px;opacity:1} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============================================================
// HELPER COMPONENTS
// ============================================================
function P({children}){return <p style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8,margin:"0.85rem 0"}}>{children}</p>;}
function S({children,color="var(--text)"}){return <strong style={{color,fontWeight:700}}>{children}</strong>;}
function A({children,color="var(--accent)"}){return <span style={{color,fontWeight:600}}>{children}</span>;}
function CB({children}){return <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:10,padding:"1.1rem 1.3rem",margin:"1rem 0",fontSize:"0.82rem",lineHeight:1.7,fontFamily:"'JetBrains Mono',monospace",color:"#E2E8F0",overflowX:"auto"}}>{children}</pre>;}
function Callout({children,color="var(--accent)",bg,icon="💡"}){
  const bgC=bg||(color==="var(--build-color)"?"var(--build-bg)":color==="var(--info-color)"?"var(--info-bg)":color==="var(--purple)"?"var(--purple-bg)":color==="var(--red)"?"var(--red-bg)":color==="var(--orange)"?"var(--orange-bg)":"var(--accent-light)");
  return(<div style={{background:bgC,borderRadius:10,padding:"1rem 1.25rem",margin:"1.25rem 0",display:"flex",gap:10,alignItems:"flex-start",border:"1px solid "+color+"22"}}>
    <span style={{fontSize:"1.1rem",flexShrink:0}}>{icon}</span>
    <div style={{color:"var(--text)",fontSize:"0.92rem",lineHeight:1.7}}>{children}</div>
  </div>);
}
function ChH({num,title,sub,color="var(--accent)"}){return(
  <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}} id={"ch"+num}>
    <div style={{display:"inline-block",padding:"3px 12px",background:color+"15",borderRadius:5,marginBottom:10,border:"1px solid "+color+"25"}}>
      <span style={{color,fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>CHAPTER {num}</span>
    </div>
    <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>{title}</h3>
    <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>{sub}</div>
  </div>
);}
function SectionHeading({children}){return <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>{children}</div>;}

// ============================================================
// INTERACTIVE: Error Handling Flow Demo
// ============================================================
function ErrorFlowDemo() {
  const [scenario, setScenario] = useState("success");
  const scenarios = {
    success: {label:"✅ 200 OK",color:"#10B981",status:"200",timeline:[
      {step:"Your code sends request",icon:"📤",ms:0},
      {step:"API processes prompt (all layers, token by token)",icon:"⚙️",ms:800},
      {step:"Response returned with content + usage",icon:"📥",ms:1500},
    ],response:`{
  "choices": [{"message": {"content": "Hadoop is a distributed..."}}],
  "usage": {"prompt_tokens": 14, "completion_tokens": 28}
}`,advice:"Everything worked. Parse response.choices[0].message.content."},
    rate_limit: {label:"⚠️ 429 Rate Limit",color:"#F59E0B",status:"429",timeline:[
      {step:"Your code sends request",icon:"📤",ms:0},
      {step:"API says: too many requests!",icon:"🚫",ms:100},
      {step:"Wait (exponential backoff)",icon:"⏳",ms:2000},
      {step:"Retry automatically",icon:"🔄",ms:4000},
      {step:"Success on retry",icon:"📥",ms:5000},
    ],response:`RateLimitError: Rate limit reached for gpt-4o-mini.
Retry after 2.0 seconds.`,advice:"Don't panic. Implement exponential backoff: wait 1s → 2s → 4s → 8s. Most SDKs handle this automatically."},
    timeout: {label:"⏱️ Timeout",color:"#F97316",status:"timeout",timeline:[
      {step:"Your code sends request",icon:"📤",ms:0},
      {step:"API processing... still processing...",icon:"⚙️",ms:5000},
      {step:"Connection timeout after 30s",icon:"💥",ms:30000},
    ],response:`APITimeoutError: Request timed out after 30.0 seconds.`,advice:"Long prompts + high max_tokens = slow. Set a reasonable timeout. Consider streaming for long responses."},
    invalid: {label:"❌ 400 Bad Request",color:"#EF4444",status:"400",timeline:[
      {step:"Your code sends request",icon:"📤",ms:0},
      {step:"API rejects immediately",icon:"🚫",ms:50},
    ],response:`BadRequestError: Invalid value for 'model': 'gpt-5-turbo'
does not exist. Available models: gpt-4o, gpt-4o-mini, ...`,advice:"Check your model name, message format, and parameter values. This is a code bug — fix it, don't retry."},
    context: {label:"📏 Context Overflow",color:"#A78BFA",status:"400",timeline:[
      {step:"Your code sends a very long prompt",icon:"📤",ms:0},
      {step:"API says: too many tokens!",icon:"🚫",ms:100},
    ],response:`BadRequestError: This model's maximum context length is 128000
tokens. However, your messages resulted in 142857 tokens.`,advice:"Your prompt + expected response exceeds the context window. Truncate input, summarize, or use a model with a larger context window."},
  };
  const s = scenarios[scenario];
  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#EF4444",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>API Error Scenarios</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Click each scenario to see what happens and how to handle it.</div>
      <div style={{display:"flex",gap:5,marginBottom:"1.25rem",flexWrap:"wrap"}}>
        {Object.entries(scenarios).map(([key, val]) => (
          <button key={key} onClick={() => setScenario(key)} style={{
            padding:"7px 12px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.78rem",fontWeight:600,
            background:scenario===key?val.color:"#252833",color:scenario===key?"#111":"#94A3B8",transition:"all 0.2s"
          }}>{val.label}</button>
        ))}
      </div>
      {/* Timeline */}
      <div style={{background:"#12141C",borderRadius:10,padding:"1rem",border:"1px solid #2E3240",marginBottom:10}}>
        <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>What Happens</div>
        {s.timeline.map((t,i) => (
          <div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:i<s.timeline.length-1?"1px solid #2E3240":"none"}}>
            <span style={{fontSize:"1rem",width:24,textAlign:"center"}}>{t.icon}</span>
            <span style={{color:"#E2E8F0",fontSize:"0.85rem",flex:1}}>{t.step}</span>
            <span style={{color:"#6B7280",fontFamily:"'JetBrains Mono'",fontSize:"0.72rem"}}>{t.ms<1000?t.ms+"ms":(t.ms/1000)+"s"}</span>
          </div>
        ))}
      </div>
      {/* Response */}
      <div style={{background:"#12141C",borderRadius:10,padding:"0.85rem 1rem",border:"1px solid "+s.color+"33",marginBottom:10}}>
        <div style={{color:s.color,fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:4}}>RESPONSE</div>
        <pre style={{color:"#94A3B8",fontSize:"0.78rem",fontFamily:"'JetBrains Mono'",lineHeight:1.6,whiteSpace:"pre-wrap",margin:0}}>{s.response}</pre>
      </div>
      {/* Advice */}
      <div style={{padding:"0.65rem 0.85rem",background:s.color+"12",borderRadius:8,border:"1px solid "+s.color+"33"}}>
        <span style={{color:s.color,fontSize:"0.82rem",fontWeight:600}}>How to handle: </span>
        <span style={{color:"#94A3B8",fontSize:"0.82rem"}}>{s.advice}</span>
      </div>
    </div>
  );
}

// ============================================================
// INTERACTIVE: Streaming Demo
// ============================================================
function StreamingDemo() {
  const [mode, setMode] = useState(null); // null, "standard", "streaming"
  const [tokens, setTokens] = useState([]);
  const [done, setDone] = useState(false);
  const fullResponse = ["Hadoop", " is", " a", " distributed", " computing", " framework", " designed", " to", " process", " large", " datasets", " across", " clusters", " of", " commodity", " hardware", "."];
  const timerRef = useRef(null);
  
  const startStandard = () => {
    setMode("standard"); setTokens([]); setDone(false);
    // Wait 3 seconds then show all at once
    timerRef.current = setTimeout(() => {
      setTokens(fullResponse);
      setDone(true);
    }, 3000);
  };
  const startStreaming = () => {
    setMode("streaming"); setTokens([]); setDone(false);
    let i = 0;
    const interval = setInterval(() => {
      if (i < fullResponse.length) {
        setTokens(prev => [...prev, fullResponse[i]]);
        i++;
      } else {
        clearInterval(interval);
        setDone(true);
      }
    }, 180);
    timerRef.current = interval;
  };
  const reset = () => {
    if(timerRef.current) { clearTimeout(timerRef.current); clearInterval(timerRef.current); }
    setMode(null); setTokens([]); setDone(false);
  };

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#60A5FA",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Standard vs Streaming Response</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Click each mode to see the difference in user experience.</div>
      <div style={{display:"flex",gap:8,marginBottom:"1.25rem"}}>
        <button onClick={startStandard} style={{padding:"8px 18px",background:mode==="standard"?"#EF4444":"#252833",color:mode==="standard"?"#fff":"#94A3B8",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>Standard (wait for all)</button>
        <button onClick={startStreaming} style={{padding:"8px 18px",background:mode==="streaming"?"#10B981":"#252833",color:mode==="streaming"?"#fff":"#94A3B8",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>Streaming (token by token)</button>
        <button onClick={reset} style={{padding:"8px 14px",background:"transparent",color:"#94A3B8",border:"1px solid #404552",borderRadius:7,cursor:"pointer",fontSize:"0.8rem"}}>Reset</button>
      </div>
      {/* Output area */}
      <div style={{background:"#12141C",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",minHeight:80}}>
        {mode === null && <span style={{color:"#6B7280",fontSize:"0.85rem"}}>← Click a mode to see the response appear</span>}
        {mode === "standard" && !done && (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:16,height:16,border:"2px solid #EF4444",borderTop:"2px solid transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
            <span style={{color:"#EF4444",fontSize:"0.85rem"}}>Waiting for complete response... (3 seconds of nothing)</span>
          </div>
        )}
        {mode && tokens.length > 0 && (
          <div style={{color:"#F0F4F8",fontSize:"1.05rem",lineHeight:1.7}}>
            <span style={{color:"#6B7280"}}>Q: What is Hadoop?</span>
            <br/>
            <span style={{color:mode==="streaming"?"#10B981":"#E2E8F0"}}>A: {tokens.join("")}</span>
            {!done && mode==="streaming" && <span style={{color:"#10B981",animation:"blink 1s infinite"}}>▌</span>}
          </div>
        )}
      </div>
      {/* Stats */}
      {done && (
        <div style={{marginTop:10,padding:"0.65rem 0.85rem",background:mode==="streaming"?"#10B98112":"#EF444412",borderRadius:8,border:"1px solid "+(mode==="streaming"?"#10B98133":"#EF444433")}}>
          <span style={{color:mode==="streaming"?"#10B981":"#EF4444",fontSize:"0.82rem",fontWeight:600}}>
            {mode === "streaming" 
              ? "✅ Streaming: User sees the first word in ~180ms. Feels instant and responsive."
              : "❌ Standard: User stared at a blank screen for 3 seconds. Then everything appeared at once."}
          </span>
        </div>
      )}
    </div>
  );
}

{/* ── CH 1: Error Handling ── */}
<section id="ch1" style={{paddingTop:"2rem"}}>
  <ChH num="1" title="Error Handling & Retries" sub="What happens when API calls fail — and how to recover" color="var(--red)"/>

  <P>In a notebook, if an API call fails, you just re-run the cell. In production, your app needs to <S color="var(--red)">handle failures gracefully</S> — without crashing, without losing the user's input, and ideally without the user even noticing.</P>

  <P>Here are the five scenarios you'll encounter:</P>

  <ErrorFlowDemo/>

  <SectionHeading>The Retry Pattern</SectionHeading>

  <P>Most transient errors (rate limits, timeouts) are fixed by <S>waiting and retrying</S>. The standard pattern is <S color="var(--info-color)">exponential backoff</S> — each retry waits longer:</P>

  <CB>{`import time
from openai import OpenAI, RateLimitError, APITimeoutError

client = OpenAI()

def call_with_retry(prompt, max_retries=3):
    """Call the API with automatic retry on transient errors."""
    for attempt in range(max_retries):
        try:
            response = client.chat.completions.create(
                model="gpt-4o-mini",
                messages=[{"role": "user", "content": prompt}],
                timeout=30
            )
            return response.choices[0].message.content
        
        except RateLimitError:
            wait = 2 ** attempt  # 1s, 2s, 4s
            print(f"Rate limited. Waiting {wait}s...")
            time.sleep(wait)
        
        except APITimeoutError:
            wait = 2 ** attempt
            print(f"Timeout. Waiting {wait}s...")
            time.sleep(wait)
        
        except Exception as e:
            # Non-transient error — don't retry, fix the code
            raise e
    
    raise Exception("Max retries exceeded")`}</CB>

  <Callout color="var(--info-color)" icon="🔑"><S>Rule of thumb:</S> Retry on 429 (rate limit) and timeouts. Do NOT retry on 400 (bad request) or 401 (auth error) — those are bugs in your code, not transient failures.</Callout>
</section>

{/* ── CH 2: Streaming ── */}
<section id="ch2" style={{paddingTop:"2rem"}}>
  <ChH num="2" title="Streaming Responses" sub="Token-by-token delivery for better UX" color="var(--info-color)"/>

  <P>Remember from Chapter 8 (Autoregressive Generation) — the model generates <S color="var(--red)">one token at a time</S>. Without streaming, your app waits for ALL tokens before showing anything. With streaming, each token appears as it's generated.</P>

  <StreamingDemo/>

  <SectionHeading>Implementation</SectionHeading>

  <P>Streaming requires just one parameter change — <span style={{fontFamily:"'JetBrains Mono'",background:"#252833",padding:"1px 5px",borderRadius:3,fontSize:"0.82rem",color:"#60A5FA"}}>stream=True</span> — but changes how you process the response:</P>

  <CB>{`# Standard (wait for everything)
response = client.chat.completions.create(
    model="gpt-4o-mini",
    messages=[{"role": "user", "content": "What is Hadoop?"}]
)
print(response.choices[0].message.content)  # all at once

# Streaming (token by token)
stream = client.chat.completions.create(
    model="gpt-4o-mini",
    messages=[{"role": "user", "content": "What is Hadoop?"}],
    stream=True  # ← this is the only change
)

for chunk in stream:
    if chunk.choices[0].delta.content:
        print(chunk.choices[0].delta.content, end="", flush=True)`}</CB>

  <Callout icon="⚡"><S>When to stream:</S> Any user-facing response longer than ~2 seconds. Classification tasks (short output) don't need streaming. Conversational responses, summaries, and code generation always should.</Callout>
</section>

{/* ── CH 3: Multi-Provider ── */}
<section id="ch3" style={{paddingTop:"2rem"}}>

  <Callout color="var(--build-color)" icon="🔑"><S>The biggest gotcha:</S> Anthropic's system prompt is a <S>top-level parameter</S>, not a message in the array. If you put it in messages like OpenAI, it'll be treated as a user message and won't get the special system-level treatment. Always check the provider's docs for these differences.</Callout>

  <SectionHeading>How Streamlit Works</SectionHeading>

  <CB>{`# This is a complete Streamlit chat app — really.

import streamlit as st
from openai import OpenAI

client = OpenAI()
st.title("My GenAI App")

# Maintain conversation history in session state
if "messages" not in st.session_state:
    st.session_state.messages = []

# Display existing messages
for msg in st.session_state.messages:
    with st.chat_message(msg["role"]):
        st.write(msg["content"])

# Handle new user input
if prompt := st.chat_input("Ask anything..."):
    st.session_state.messages.append({"role": "user", "content": prompt})
    
    with st.chat_message("assistant"):
        stream = client.chat.completions.create(
            model="gpt-4o-mini",
            messages=st.session_state.messages,
            stream=True
        )
        response = st.write_stream(stream)
    
    st.session_state.messages.append({"role": "assistant", "content": response})`}</CB>

        <div style={{width:28,height:28,borderRadius:"50%",background:s.color+"20",display:"flex",alignItems:"center",justifyContent:"center",color:s.color,fontWeight:700,fontSize:"0.78rem",flexShrink:0}}>{s.step}</div>
        <div><span style={{fontWeight:700,fontSize:"0.9rem"}}>{s.title}:</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>{s.desc}</span></div>
      </div>
    ))}
  </div>
</section>

{/* ── PRACTICE ASSIGNMENTS ── */}
<div id="practice" style={{padding:"3rem 0 1.5rem",borderTop:"2px solid var(--build-border)",marginTop:"3rem",scrollMarginTop:"0.75rem"}}>
  <div style={{color:"var(--build-color)",fontSize:"0.75rem",fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Practice Assignments</div>
  <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.8rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Now Build It Yourself</h2>
  <div style={{color:"var(--text-muted)",fontSize:"1rem",fontStyle:"italic",marginBottom:"1.25rem"}}>The only way to learn is to build — these assignments test everything from this section</div>

  <div style={{display:"flex",flexDirection:"column",gap:10}}>
    {PRACTICE_ASSIGNMENTS.map((a,i) => (
      <div
        key={i}
        style={{
          background:"white",
          border:"1px solid var(--border)",
          borderRadius:10,
          borderLeft:"4px solid "+a.border,
          padding:"0.85rem 1rem",
        }}
      >
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div
            style={{
              width:32,
              height:32,
              borderRadius:"50%",
              background:a.pillBg,
              color:a.pillColor,
              fontWeight:700,
              fontSize:"0.82rem",
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              flexShrink:0,
            }}
          >{i+1}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:"0.95rem",color:"var(--text)"}}>{a.title}</div>
              <span style={{
                fontSize:"0.66rem",
                fontWeight:700,
                letterSpacing:0.4,
                textTransform:"uppercase",
                padding:"3px 8px",
                borderRadius:999,
                background:a.pillBg,
                color:a.pillColor,
                border:"1px solid var(--border-light)",
              }}>{a.diff}</span>
            </div>
            <div style={{color:"var(--text-secondary)",fontSize:"0.88rem",lineHeight:1.65}}>{a.desc}</div>
          </div>
        </div>
      </div>
    ))}
  </div>
</div>

{/* ── COMPLETION ── */}
<div style={{marginTop:"3rem",padding:"1.75rem",background:"white",borderRadius:12,textAlign:"center",border:"1px solid var(--border)"}}>
  <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.3rem",fontWeight:700,marginBottom:6}}>Section 3 Complete</div>
  <div style={{color:"var(--text-muted)",fontSize:"0.92rem"}}>You've gone from notebook experiments to real applications — with error handling, streaming, multi-provider support, and two working apps.</div>
  <a href="./4-rag-part1.html" style={{display:"inline-block",color:"var(--accent)",fontSize:"0.88rem",fontWeight:600,marginTop:8,textDecoration:"none"}}>Next → RAG (Retrieval Augmented Generation) ↗</a>
</div>

      </div></div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
