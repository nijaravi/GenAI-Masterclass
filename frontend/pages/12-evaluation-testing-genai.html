            {[
              ["Gate","Threshold","Blocks deploy if…"],
              ["Accuracy","≥ 85%","Task success rate drops below 85%"],
              ["Safety","100% pass","Any red-team test fails"],
              ["Cost","≤ 2x baseline","Average cost per request exceeds 2x current production"],
              ["Latency","p95 ≤ 10s","95th percentile response time exceeds 10 seconds"],
              ["Regression","≤ 5% drop","Any metric drops >5% vs. current production"],
            ].map((row,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr",gap:8,padding:"6px 0",borderBottom:i<5?"1px solid var(--border-light)":"none",fontSize:i===0?"0.72rem":"0.82rem",fontWeight:i===0?700:400,color:i===0?"var(--text-muted)":"var(--text-secondary)"}}>
                {row.map((c,j)=><span key={j} style={{color:j===0&&i>0?"var(--emerald)":undefined,fontWeight:j===0&&i>0?600:undefined}}>{c}</span>)}
              </div>
            ))}
          </div>
          <Callout color="var(--emerald)" icon="🚦"><S>Start with two gates:</S> accuracy ≥ 85% and safety = 100%. Add cost and latency gates after your first month of production data (you need baselines to set meaningful thresholds).</Callout>
        </section>

        {/* ── Ch16: Production Monitoring ── */}
        <section id="e16" style={{paddingTop:"2.5rem"}}>
          <ChH num="16" title="Production Monitoring" sub="Drift detection, quality alerts, and continuous improvement" color="var(--emerald)"/>
          <P>Passing the deployment gate is the beginning, not the end. Models degrade in production — user patterns shift, knowledge goes stale, and edge cases accumulate. <S color="var(--emerald)">Production monitoring</S> catches degradation before users complain.</P>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {signal:"Quality drift",what:"Average eval scores dropping over time",how:"Run LLM-as-judge on a 10% sample of production responses daily. Plot the trend. Alert on 5% drop from baseline.",action:"Investigate: did user queries change? Did retrieval sources go stale? Did a model update cause regression?"},
              {signal:"Cost spike",what:"p95 cost per request increasing",how:"Track cost per request with the CostTracker from Section 11. Alert on 2x baseline.",action:"Check: are agents looping? Are tool outputs growing? Is a new query pattern causing more iterations?"},
              {signal:"Refusal rate increase",what:"Agent refusing more queries than baseline",how:"Track 'I cannot help with that' responses as a percentage. Alert on >5%.",action:"Check guardrails: are they over-triggering on new query patterns? Are legitimate queries being blocked?"},
              {signal:"Latency degradation",what:"Response times getting slower",how:"Track p50 and p95 latency. Alert on 50% increase from baseline.",action:"Check: are external APIs slower? Are conversations getting longer? Is the context window filling up?"},
            ].map((s,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <S color="var(--emerald)">{s.signal}</S><span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}> — {s.what}</span>
                <div style={{color:"var(--text-muted)",fontSize:"0.78rem",margin:"4px 0"}}><S>How:</S> {s.how}</div>
                <div style={{color:"var(--teal)",fontSize:"0.78rem"}}><S color="var(--teal)">Action:</S> {s.action}</div>
              </div>
            ))}
          </div>
          <Callout color="var(--emerald)" icon="📈"><S>The feedback loop:</S> production monitoring → identify failures → add to eval dataset → improve prompts/retrieval → re-deploy → monitor again. Your eval dataset should grow by 5–10 examples per week from real production issues. This is how GenAI products get better over time.</Callout>
          <NB/>
        </section>


        {/* ── Practice 1 ── */}
        <section id="e17" style={{paddingTop:"2.5rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><Tag label="PRACTICE" color="var(--info-color)" bg="var(--info-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Practice — Build an Evaluation Pipeline</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>End-to-end eval for your RAG system or agent from previous sections</div>
          </div>
          <P>Take a system you built in Sections 4–11 (RAG pipeline, agent, or multi-agent team) and build a complete evaluation pipeline around it.</P>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {t:"Build an eval dataset (50+ examples)",d:"Follow the 50/30/20 rule: 50% happy path, 30% edge cases, 20% adversarial. Include expected answers or scoring rubrics for each."},
              {t:"Implement LLM-as-judge",d:"Build the judge function from Chapter 2. Define 3–4 criteria specific to your system. Include few-shot examples for calibration."},
              {t:"Implement at least 2 automated metrics",d:"Exact match for factoid queries, keyword presence for topic coverage, or RAGAS metrics for RAG systems."},
              {t:"Build the test runner",d:"Script that runs all 50+ test cases, collects scores, and produces a summary report with pass/fail by category."},
              {t:"Set quality thresholds",d:"Define minimum scores for deployment: accuracy ≥ X%, safety = 100%, cost ≤ Y. These become your deployment gates."},
              {t:"Run a before/after comparison",d:"Change one thing (system prompt, retrieval k, model) and re-run the full eval. Document what improved and what regressed."},
            ].map((p,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:3}}>{p.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{p.d}</div>
              </div>
            ))}
          </div>
          <Callout color="var(--info-color)" icon="📄"><S>Why this exercise matters:</S> most GenAI products ship without systematic evaluation and break silently. Building an eval pipeline is the single highest-ROI activity in GenAI engineering — it catches problems before users do and gives you confidence to iterate faster.</Callout>
        </section>

        {/* ── Practice 2 ── */}
        <section id="e18" style={{paddingTop:"2.5rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><Tag label="PRACTICE" color="var(--info-color)" bg="var(--info-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Practice — Red-team Your Agent</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Build and run a systematic adversarial test suite</div>
          </div>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {t:"Build a red-team suite (30+ adversarial inputs)",d:"Cover all 4 categories from Chapter 11: direct injection (10), indirect injection (5), jailbreak (10), data extraction (5). Include 5 legitimate-but-tricky queries to test for over-blocking."},
              {t:"Run against your agent",d:"Execute all 30+ test cases. Record: did the agent refuse? Did it leak information? Did it comply with the adversarial instruction?"},
              {t:"Implement a safety classifier",d:"Build a guardrail function that classifies inputs as safe/unsafe before they reach the agent. Can be regex-based, keyword-based, or LLM-based."},
              {t:"Measure false positive rate",d:"Run your safety classifier on the legitimate-but-tricky queries. If it blocks more than 10%, it's too aggressive — tune it."},
              {t:"Document findings",d:"Write up: which attack categories your agent is vulnerable to, which defenses work, and what you'd implement next."},
            ].map((p,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:3}}>{p.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{p.d}</div>
              </div>
            ))}
          </div>
        </section>

        {/* ── Cheat Sheet ── */}
        <section id="e-cheat" style={{paddingTop:"2rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}><Tag label="REFERENCE" color="var(--rose)" bg="var(--rose-bg)"/>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Cheat Sheet</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Evaluation metrics & testing quick reference</div>
          </div>
          <SubH>Which evaluation method to use</SubH>
          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {q:"Factoid Q&A, classification, extraction",a:"Automated metrics — exact match, F1, precision/recall",color:"var(--emerald)"},
              {q:"Summaries, reports, conversations",a:"LLM-as-judge with task-specific rubric",color:"var(--rose)"},
              {q:"RAG pipeline quality",a:"RAGAS — faithfulness + answer_relevancy + context_precision + context_recall",color:"var(--teal)"},
              {q:"Agent efficiency",a:"Trajectory evaluation — tool choice accuracy, step efficiency, cost per task",color:"var(--indigo)"},
              {q:"Safety and adversarial robustness",a:"Red-team test suite — 30+ adversarial inputs across 4 attack categories",color:"var(--red)"},
              {q:"Continuous monitoring",a:"Daily LLM-judge sample + cost/latency/refusal rate tracking",color:"var(--emerald)"},
            ].map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1.5fr auto 1.5fr",gap:12,alignItems:"flex-start",padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontSize:"0.84rem"}}>{r.q}</div>
                <div style={{color:r.color,fontSize:"0.92rem",paddingTop:2}}>→</div>
                <div style={{fontSize:"0.83rem",color:r.color,fontWeight:600,lineHeight:1.55}}>{r.a}</div>
              </div>
            ))}
          </div>
          <SubH>RAG debugging flow</SubH>
          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              ["Symptom","Likely cause","Fix"],
              ["Wrong answer, high faithfulness","Retriever found wrong docs","Fix chunking, embeddings, or metadata filtering"],
              ["Wrong answer, low faithfulness","Generator hallucinating beyond context","Add grounding instruction to system prompt"],
              ["Correct but adds unverified info","Generator extrapolates","Add 'only use provided context' guardrail"],
              ["Refuses valid questions","Over-aggressive safety filter","Loosen guardrails, test on legitimate queries"],
              ["Inconsistent quality","Eval dataset too small","Expand to 100+ examples, add edge cases"],
            ].map((row,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1.5fr 1.2fr 1.8fr",gap:8,padding:"6px 0",borderBottom:i<5?"1px solid var(--border-light)":"none",fontSize:i===0?"0.72rem":"0.78rem",fontWeight:i===0?700:400,color:i===0?"var(--text-muted)":"var(--text-secondary)"}}>
                {row.map((c,j)=><span key={j} style={{color:j===0&&i>0?"var(--text)":j===2&&i>0?"var(--teal)":undefined,fontWeight:j===0&&i>0?600:j===2&&i>0?600:undefined}}>{c}</span>)}
              </div>
            ))}
          </div>
          <SubH>Deployment readiness checklist</SubH>
          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              "Eval dataset: 50+ examples (50/30/20 split)",
              "LLM-as-judge: implemented with task-specific rubric",
              "Accuracy threshold: ≥ 85% on eval dataset",
              "Red-team suite: 30+ adversarial tests, 100% pass rate",
              "Cost tracking: per-request budget with alerting",
              "Latency tracking: p50 and p95 benchmarked",
              "Regression test: before/after comparison on prompt changes",
              "Production monitoring: daily quality sample + drift alerts",
              "Feedback loop: production failures → eval dataset expansion",
              "Human review: monthly audit of edge cases and failures",
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<9?"1px solid var(--border-light)":"none",fontSize:"0.86rem"}}>
                <span style={{color:"var(--rose)"}}>✓</span>
                <span style={{color:"var(--text-secondary)"}}>{s}</span>
              </div>
            ))}
          </div>
          <Callout color="var(--accent)" icon="🎓"><S>Section 12 complete.</S> You now have the evaluation toolkit: LLM-as-judge for quality, RAGAS for RAG, trajectory analysis for agents, red-teaming for safety, and CI/CD pipelines for continuous quality. The single most important takeaway: <S>build your eval dataset before you build your product.</S> The eval dataset is the specification — everything else is implementation.</Callout>
        </section>

      </div></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
