        {/* ── Ch 10: Prompt Formatting ── */}
        <section id="pe10" style={{paddingTop:"1rem"}}>
          <ChH num="10" title="Prompt Formatting" sub="Delimiters, XML tags, and structure" color="var(--info-color)"/>
          <P>When your prompt contains both instructions AND data (like a document to summarize or code to review), the model can confuse one for the other. Delimiters create clear boundaries between "what to do" and "what to do it on."</P>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"1rem 0"}}>
            <div style={{background:"#1A1D27",borderRadius:10,padding:"1rem",border:"1px solid #2E3240"}}>
              <div style={{color:"#EF4444",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>BEFORE (NO DELIMITERS)</div>
              <CB>{`Summarize this text: The quarterly report shows revenue increased by 15%.
However the team should focus on reducing churn which decreased satisfaction scores.
Also summarize means give me 2 sentences max.`}</CB>
            </div>
            <div style={{background:"#1A1D27",borderRadius:10,padding:"1rem",border:"1px solid #2E3240"}}>
              <div style={{color:"#10B981",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>AFTER (XML DELIMITERS)</div>
              <CB>{`Summarize the text between the XML tags in 2 sentences max.

<document>
The quarterly report shows revenue increased by 15%.
However the team should focus on reducing churn which decreased satisfaction scores.
</document>`}</CB>
            </div>
          </div>
          <div style={{color:"var(--text-secondary)",fontSize:"0.88rem",marginBottom:"0.85rem"}}>Problem: Did the user mean "summarize means give me 2 sentences" as an instruction, or is it part of the text to summarize? The model has to guess.</div>
          <div style={{background:"#1A1D27",borderRadius:12,padding:"1rem 1.2rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#60A5FA",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:8}}>COMMON DELIMITER PATTERNS</div>
            <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.77rem",color:"#94A3B8",lineHeight:1.9}}>
              <div>``` — for code blocks</div>
              <div>&lt;document&gt;...&lt;/document&gt; — for structured data, most reliable</div>
              <div>""" — for text passages</div>
              <div>--- — for section separators</div>
            </div>
          </div>
          <Callout color="var(--info-color)" icon="🏷️">XML tags are the most reliable delimiter — models are trained on XML/HTML, so they naturally respect tag boundaries. Use them whenever you're passing data into a prompt.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 11: Handling Uncertainty ── */}
        <section id="pe11" style={{paddingTop:"2rem"}}>
          <ChH num="11" title="Handling Uncertainty" sub="Give the model a way out" color="var(--info-color)"/>
          <P>LLMs will always generate an answer — even when they don't know. They'd rather hallucinate a confident-sounding response than admit uncertainty. In production, a wrong answer is worse than no answer.</P>
          <CB>{`Prompt: "What was TechCorp's revenue in Q3 2024?"
Model: "TechCorp reported $4.2B in Q3 2024 revenue, a 12% increase..."
Reality: TechCorp doesn't exist. The model made up everything.`}</CB>
          <CB>{`Prompt: "What was TechCorp's revenue in Q3 2024?
If you don't have reliable information, say 'I don't have that data'
instead of guessing."
Model: "I don't have that data. TechCorp's Q3 2024 financials are not
in my training data."`}</CB>
          <Callout color="var(--info-color)" icon="🛟">Always give the model an explicit escape route. Phrases like "If unsure, say I don't know", "Only answer if you're confident", or "If the information isn't in the provided text, say Not found" prevent hallucination in production systems.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 12: Step-by-Step Instructions ── */}
        <section id="pe12" style={{paddingTop:"2rem"}}>
          <ChH num="12" title="Step-by-Step Instructions" sub="Structure prompts as numbered steps" color="var(--info-color)"/>
          <P>This is NOT chain-of-thought (which makes the model reason out loud). This is about structuring YOUR instructions clearly so the model follows them in order. When a prompt has multiple things to do, numbered steps prevent the model from skipping or reordering.</P>
          <CB>{`Before:
"Read this customer email, figure out what product they're talking about,
determine if they're angry or just asking a question, classify the urgency,
and give me a JSON with all of that plus a suggested response."`}</CB>
          <div style={{color:"var(--text-secondary)",fontSize:"0.88rem",marginBottom:"0.85rem"}}>Problem: The model might skip the urgency, forget the suggested response, or jumble the format.</div>
          <CB>{`After:
"Process this customer email in order:

Step 1: Identify the product mentioned
Step 2: Classify sentiment (angry, frustrated, neutral, positive)
Step 3: Assign urgency (low, medium, high, critical)
Step 4: Draft a 2-sentence response matching the sentiment
Step 5: Return everything as JSON with keys: product, sentiment,
        urgency, response"`}</CB>
          <Callout color="var(--info-color)" icon="1️⃣">Numbered steps work because of autoregressive generation — the model processes left to right. When it sees "Step 1" completed, those tokens guide "Step 2". Each step builds on the previous one. This connects directly to why chain-of-thought works — structured preceding tokens improve subsequent tokens.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 13: Grounding with Reference Text ── */}
        <section id="pe13" style={{paddingTop:"2rem"}}>
          <ChH num="13" title="Grounding with Reference Text" sub="Answer only from provided context" color="var(--info-color)"/>
          <P>Instead of relying on the model's training data (which might be outdated or wrong), you provide the source material directly and tell the model to answer ONLY from that text. This is the core idea behind RAG (Retrieval-Augmented Generation), which we'll cover in a later section.</P>
          <CB>{`Answer the question based ONLY on the provided context.
If the answer is not in the context, say 'Not found in the provided text.'
Do NOT use your general knowledge.

<context>
The TechStore return policy allows returns within 30 days of purchase.
Items must be in original packaging. Electronics have a 15-day window.
Gift cards are non-refundable.
</context>

Question: Can I return a laptop after 20 days?`}</CB>
          <div style={{background:"white",border:"1px solid var(--border)",borderRadius:10,padding:"0.85rem 1rem",margin:"0.9rem 0"}}>
            <div style={{fontWeight:700,fontSize:"0.9rem",marginBottom:4}}>Expected output</div>
            <div style={{color:"var(--text-secondary)",fontSize:"0.86rem"}}>Based on the return policy, electronics have a 15-day return window. Since 20 days exceeds this window, the laptop cannot be returned.</div>
          </div>
          <div style={{color:"var(--text-secondary)",fontSize:"0.88rem",marginBottom:"0.85rem"}}>Without grounding, the model might answer based on generic return policy knowledge, which could be wrong for this specific store.</div>
          <Callout color="var(--info-color)" icon="📚">This pattern is a preview of RAG — you're manually providing the context. In a RAG system, the context is automatically retrieved from a vector database. The prompting technique is identical — only the source of the context changes.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 14: Self-Verification ── */}
        <section id="pe14" style={{paddingTop:"2rem"}}>
          <ChH num="14" title="Self-Verification" sub="Make the model check its own work" color="var(--info-color)"/>
          <P>You can ask the model to review its own output before finalizing. This catches errors that a single pass might miss — especially for math, code, and factual claims.</P>
          <CB>{`Pattern 1 — Inline verification:
"Solve this problem. After solving, verify your answer
by working backwards. If you find an error, correct it."

Pattern 2 — Checklist verification:
"Draft a response to this customer complaint, then check:
☐ Did I acknowledge their frustration?
☐ Did I apologize without admitting fault?
☐ Did I offer a concrete next step?
☐ Is the response under 100 words?
If any check fails, revise before outputting."

Pattern 3 — Output validation (in prompt chaining):
Step 1: Generate the response
Step 2: Send the response to the model again with
        "Check this response for factual errors, tone issues,
         or missing information. List problems found."
Step 3: If problems found, regenerate with fixes`}</CB>
          <Callout color="var(--info-color)" icon="✅">Self-verification adds tokens (and cost) but significantly improves quality for high-stakes outputs. Use it for customer-facing content, code generation, and any task where errors are expensive.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 15: Cost Optimization ── */}
        <section id="pe15" style={{paddingTop:"2rem"}}>
          <ChH num="15" title="Cost Optimization" sub="Same quality, fewer tokens" color="var(--info-color)"/>
          <P>Every token costs money. At scale (millions of API calls), small optimizations add up fast. Here are practical ways to reduce cost without reducing quality.</P>
          <div style={{display:"flex",flexDirection:"column",gap:8,margin:"1rem 0"}}>
            {[
              {t:"1. Use the smallest model that works",d:"Start with gpt-4o-mini ($0.15/1M input). Only upgrade to gpt-4o ($2.50/1M input) if mini fails your evaluation. That's a 16x cost difference for the same prompt."},
              {t:"2. Shorten system prompts",d:"A 500-token system prompt sent with every API call costs more than a 100-token one. Trim redundant instructions."},
            ].map((r,i)=>(
              <div key={i} style={{background:"white",border:"1px solid var(--border)",borderRadius:8,padding:"0.65rem 0.85rem"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem"}}>{r.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.84rem"}}>{r.d}</div>
              </div>
            ))}
            <CachePrefixesExpandableCard />
            {[
              {t:"4. Limit output length",d:"Set max_tokens to what you actually need. Classification might need 50, not 1000."},
              {t:"5. Batch when possible",d:"One call with 10 items can be cheaper than 10 separate calls due to less overhead."},
              {t:"6. Measure before optimizing",d:"Optimize the prompts that run most often first — volume beats one-off wins."},
            ].map((r,i)=>(
              <div key={"post-cache-"+i} style={{background:"white",border:"1px solid var(--border)",borderRadius:8,padding:"0.65rem 0.85rem"}}>
                <div style={{fontWeight:700,fontSize:"0.88rem"}}>{r.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.84rem"}}>{r.d}</div>
              </div>
            ))}
          </div>
          <Callout color="var(--info-color)" icon="💸">Cost optimization is an engineering discipline, not an afterthought. The best GenAI engineers track cost per prompt, cost per feature, and cost per user — just like you'd track database query performance.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 16: Combining Techniques ── */}
        <section id="pe16" style={{paddingTop:"1rem"}}>
          <ChH num="16" title="Combining Techniques" sub="The decision flow — how to pick the right approach" color="var(--purple)"/>

          <P>In practice, you'll rarely use just one technique. The best prompts <S>layer multiple techniques</S>. But how do you decide which to use?</P>

          <P>Here's the decision flow professional prompt engineers follow:</P>

          <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
            <div style={{color:"#A78BFA",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>The Prompt Engineering Decision Flow</div>
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {[
                {step:"1",question:"Is the task simple and well-defined?",yes:"Start with Zero-Shot",no:"Continue ↓",color:"#60A5FA"},
                {step:"2",question:"Can you describe the output format in words?",yes:"Add format constraints to zero-shot",no:"Use Few-Shot (show examples)",color:"#10B981"},
                {step:"3",question:"Does the task need specific expertise?",yes:"Add Role / System Prompt",no:"Continue ↓",color:"#A78BFA"},
                {step:"4",question:"Does it require multi-step reasoning?",yes:"Add Chain-of-Thought",no:"Continue ↓",color:"#FBBF24"},
                {step:"5",question:"Will code parse the output?",yes:"Add Structured Output (JSON mode)",no:"Continue ↓",color:"#F97316"},
                {step:"6",question:"Does the model add unwanted fluff?",yes:"Add Negative Prompting",no:"Continue ↓",color:"#EC4899"},
                {step:"7",question:"Is the task too complex for one prompt?",yes:"Use Prompt Chaining",no:"You're done!",color:"#EF4444"},
              ].map((s,i)=>(
                <div key={i}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 0"}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:s.color+"25",display:"flex",alignItems:"center",justifyContent:"center",color:s.color,fontWeight:700,fontSize:"0.78rem",flexShrink:0}}>{s.step}</div>
                    <div style={{flex:1}}>
                      <div style={{color:"#F0F4F8",fontWeight:600,fontSize:"0.9rem",marginBottom:4}}>{s.question}</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        <span style={{color:"#10B981",fontSize:"0.78rem"}}>Yes → {s.yes}</span>
                        <span style={{color:"#6B7280",fontSize:"0.78rem"}}>No → {s.no}</span>
                      </div>
                    </div>
                  </div>
                  {i<6 && <div style={{borderLeft:"2px solid #2E3240",height:12,marginLeft:14}}/>}
                </div>
              ))}
            </div>
          </div>

          <Callout color="var(--purple)" icon="🔑"><S>The golden rule:</S> Start simple, add techniques only when needed. A zero-shot prompt that works is better than a few-shot + CoT + role prompt that's over-engineered. Test first, complicate later.</Callout>

          <P><S>The scenario:</S> Your platform has user-generated content. You need an automated moderation system that classifies content, explains its reasoning, and provides confidence scores — all while being resistant to prompt injection.</P>

          <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:300,background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)"}}>
              <div style={{fontWeight:700,marginBottom:8,fontSize:"0.95rem"}}>What the System Must Do</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {[
                  "Classify content: safe, borderline, unsafe (with subcategories)",
                  "Provide confidence score (0.0 to 1.0)",
                  "Explain reasoning for the classification",
                  "Handle edge cases (sarcasm, context-dependent content)",
                  "Resist prompt injection from user content",
                  "Output as JSON with classification, confidence, and explanation",
                ].map((item,i) => (
                  <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                    <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0}}>{i+1}.</span>
                    <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>{item}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{flex:1,minWidth:250,background:"var(--purple-bg)",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--purple)22"}}>
              <div style={{color:"var(--purple)",fontWeight:700,marginBottom:8,fontSize:"0.95rem"}}>Techniques You'll Need</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {["System Prompt","Few-Shot","JSON Mode","Chain-of-Thought","Prompt Security"].map(t=>(
                  <span key={t} style={{background:"white",padding:"4px 10px",borderRadius:5,fontSize:"0.78rem",fontWeight:600,color:"var(--purple)",border:"1px solid var(--purple)33"}}>{t}</span>
                ))}
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",marginTop:10}}>
                This is the most complex challenge — it combines almost every technique. The system prompt must be hardened against injection because the user content being moderated could itself be an attack.
              </div>
            </div>
          </div>
          <NotebookDemoLink />
        </section>

        {/* ═══════════════════════════════════════════
            METHODOLOGY
            ═══════════════════════════════════════════ */}

        <div style={{padding:"3rem 0 1.5rem",borderTop:"2px solid var(--orange)33",marginTop:"3rem"}}>
          <div style={{color:"var(--orange)",fontSize:"0.75rem",fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>Methodology</div>
          <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.8rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>From Hobbyist to Professional</h2>
          <div style={{color:"var(--text-muted)",fontSize:"1rem",fontStyle:"italic"}}>The skills that separate prompt tinkering from prompt engineering</div>
        </div>

        {/* ── Ch 22: Prompt Evaluation ── */}
        <section id="pe22" style={{paddingTop:"1rem"}}>
          <ChH num="22" title="Prompt Evaluation" sub="Systematically measure prompt quality" color="var(--orange)"/>

          <P>How do you know if Prompt A is better than Prompt B? Not by running it once and "feeling" the output is better. You need <S color="var(--orange)">systematic evaluation</S> — the same rigor you'd apply to testing code.</P>

          <Callout color="var(--orange)" icon="🎯"><S>The professional approach:</S> Create a test set, run both prompts against it, measure accuracy, consistency, format compliance, and cost. Then decide with data, not intuition.</Callout>

          <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
            <div style={{color:"#F97316",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Prompt Evaluation Framework</div>
            <div style={{display:"flex",gap:0,alignItems:"stretch",flexWrap:"wrap"}}>
              {[
                {step:"1",title:"Build Test Set",desc:"20+ examples with known expected outputs. Cover edge cases, not just happy paths.",color:"#60A5FA"},
                {step:"2",title:"Run Both Prompts",desc:"Execute Prompt A and Prompt B against the entire test set. Record every output.",color:"#A78BFA"},
                {step:"3",title:"Measure",desc:"Accuracy (correct answers), consistency (same format every time), cost (token count per call).",color:"#FBBF24"},
                {step:"4",title:"Decide",desc:"Pick the winner based on data. Document what you changed and why. Version your prompts.",color:"#10B981"},
              ].map((s,i)=>(
                <div key={i} style={{flex:1,minWidth:150,background:"#12141C",borderRadius:i===0?"10px 0 0 10px":i===3?"0 10px 10px 0":0,border:"1px solid #2E3240",padding:"1rem",borderRight:i<3?"none":"1px solid #2E3240",position:"relative"}}>
                  <div style={{color:s.color,fontSize:"0.65rem",fontWeight:700,letterSpacing:1,marginBottom:4}}>STEP {s.step}</div>
                  <div style={{color:s.color,fontWeight:700,fontSize:"0.88rem",marginBottom:4}}>{s.title}</div>
                  <div style={{color:"#6B7280",fontSize:"0.75rem",lineHeight:1.5}}>{s.desc}</div>
                  {i<3&&<div style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",zIndex:2,color:"#4B5563",fontSize:"1rem"}}>→</div>}
                </div>
              ))}
            </div>
          </div>

          <P>What to measure for each prompt:</P>
          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            {[
              {metric:"Accuracy",desc:"Does it produce the correct answer? Measure against your labeled test set.",icon:"🎯"},
              {metric:"Consistency",desc:"Does it produce the same FORMAT every time? Run 10 times, check structure matches.",icon:"🔄"},
              {metric:"Format Compliance",desc:"Is the JSON valid? Are all required fields present? Can your code parse it?",icon:"📋"},
              {metric:"Cost (Tokens)",desc:"How many input + output tokens per call? Fewer tokens = cheaper at scale.",icon:"💰"},
              {metric:"Latency",desc:"How long does it take? Matters for real-time applications.",icon:"⏱️"},
            ].map((m,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:i<4?"1px solid var(--border-light)":"none"}}>
                <span style={{fontSize:"1.1rem",flexShrink:0}}>{m.icon}</span>
                <div><span style={{fontWeight:700,fontSize:"0.9rem"}}>{m.metric}:</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>{m.desc}</span></div>
              </div>
            ))}
          </div>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 23: Iteration Methodology ── */}
        <section id="pe23" style={{paddingTop:"2rem"}}>
          <ChH num="23" title="Iteration Methodology" sub="The professional prompt development workflow" color="var(--orange)"/>

          <P>Professional prompt engineering follows a <S>systematic iteration cycle</S>, not random trial and error:</P>

          <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0",textAlign:"center"}}>
            <div style={{color:"#F97316",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>The Prompt Development Cycle</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem"}}>
              {[
                {label:"Start Simple",desc:"Zero-shot first",color:"#60A5FA"},
                {label:"Test",desc:"Run against test set",color:"#A78BFA"},
                {label:"Identify Failures",desc:"Where does it break?",color:"#EF4444"},
                {label:"Add Technique",desc:"Few-shot? CoT? Role?",color:"#FBBF24"},
                {label:"Test Again",desc:"Did it improve?",color:"#10B981"},
                {label:"Document",desc:"Version + changelog",color:"#F97316"},
              ].map((s,i)=>(
                <React.Fragment key={i}>
                  <div style={{background:s.color+"15",border:"1px solid "+s.color+"33",borderRadius:8,padding:"10px 14px",minWidth:110}}>
                    <div style={{color:s.color,fontWeight:700,fontSize:"0.82rem"}}>{s.label}</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:2}}>{s.desc}</div>
                  </div>
                  {i<5 && <span style={{color:"#4B5563",fontSize:"1.1rem"}}>→</span>}
                </React.Fragment>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"center",marginTop:10}}>
              <div style={{color:"#6B7280",fontSize:"0.75rem",background:"#252833",padding:"4px 12px",borderRadius:4}}>↻ Repeat until accuracy target is met</div>
            </div>
          </div>

          <Callout color="var(--orange)" icon="📝"><S>Document everything:</S> What you changed, why you changed it, what the accuracy was before and after. This is how you build institutional knowledge — so when a prompt breaks 3 months from now, you know exactly why each decision was made.</Callout>

          <P>Common mistakes in prompt iteration:</P>
          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"1rem 0"}}>
            {[
              {bad:"Change 5 things at once",good:"Change ONE thing, test, then change the next",icon:"❌"},
              {bad:"Test on 1-2 examples",good:"Test on 20+ examples covering edge cases",icon:"❌"},
              {bad:"Assume more tokens = better",good:"Track cost per variant — simpler prompts often work as well",icon:"❌"},
              {bad:"Delete old versions",good:"Version prompts like code: v1.0, v1.1, v2.0 with changelogs",icon:"❌"},
            ].map((m,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"6px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
                <span style={{fontSize:"0.9rem",flexShrink:0}}>{m.icon}</span>
                <div><span style={{color:"var(--red)",fontSize:"0.88rem",textDecoration:"line-through"}}>{m.bad}</span> <span style={{color:"var(--text-muted)",fontSize:"0.82rem"}}>→</span> <span style={{color:"var(--accent)",fontSize:"0.88rem",fontWeight:600}}>{m.good}</span></div>
              </div>
            ))}
          </div>
          <NotebookDemoLink />
        </section>

        {/* ── Ch 24: Building a Prompt Library ── */}
        <section id="pe24" style={{paddingTop:"2rem"}}>
          <ChH num="24" title="Building a Prompt Library" sub="Reusable, tested, versioned prompt templates" color="var(--orange)"/>

          <P>Professional teams don't start from scratch every time. They maintain a <S color="var(--orange)">prompt library</S> — a collection of tested, versioned prompt templates that anyone on the team can use.</P>

          <P>Every prompt template in the library should include:</P>

          <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
            <div style={{color:"#F97316",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Prompt Template Structure</div>
            <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.8rem",lineHeight:1.9}}>
              {[
                {field:"template_id",value:"\"email-classifier\"",color:"#60A5FA"},
                {field:"description",value:"\"Classifies support emails into category + priority\"",color:"#60A5FA"},
                {field:"versions",value:"[each version stores full prompts + what happened]",color:"#94A3B8"},
                {field:"  ├── v1",value:"",color:"#94A3B8"},
                {field:"  │   system_prompt",value:"\"You classify support emails.\"",color:"#10B981"},
                {field:"  │   user_template",value:"\"Classify this email: {email}\"",color:"#10B981"},
                {field:"  │   result",value:"\"70% — model invented its own categories\"",color:"#FBBF24"},
                {field:"  │   fix",value:"\"Define explicit categories\"",color:"#F97316"},
                {field:"  ├── v2",value:"",color:"#94A3B8"},
                {field:"  │   system_prompt",value:"\"You classify into: BILLING, TECHNICAL...\"",color:"#10B981"},
                {field:"  │   user_template",value:"(same)",color:"#10B981"},
                {field:"  │   result",value:"\"85% — priority still inconsistent\"",color:"#FBBF24"},
                {field:"  │   fix",value:"\"Add priority guidelines\"",color:"#F97316"},
                {field:"  └── v3",value:"",color:"#94A3B8"},
                {field:"      system_prompt",value:"(+ priority guidelines added)",color:"#10B981"},
                {field:"      user_template",value:"(+ few-shot examples added)",color:"#10B981"},
                {field:"      result",value:"\"94% — solid across all categories\"",color:"#FBBF24"},
                {field:"      fix",value:"\"Multi-category emails still weak\"",color:"#F97316"},
                {field:"known_weaknesses",value:"[\"Sarcasm\", \"Multi-issue emails\", \"Non-English\"]",color:"#EF4444"},
              ].map((f,i)=>(
                <div key={i} style={{display:"flex",gap:8}}>
                  <span style={{color:f.color,width:220,flexShrink:0}}>{f.value === "" ? f.field : `${f.field}:`}</span>
                  <span style={{color:"#6B7280"}}>{f.value}</span>
                </div>
              ))}
            </div>
          </div>

          <Callout color="var(--orange)" icon="💼">Your prompt library stores the prompts and their evolution story — what you tried, what broke, what you fixed. Test cases live in your test notebook. Model and temperature are runtime config. Keep the template lean, version it like code.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Cheat Sheet ── */}
        <section id="pe-cheat" style={{paddingTop:"2rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}>
            <div style={{display:"inline-block",padding:"3px 12px",background:"var(--accent)15",borderRadius:5,marginBottom:10,border:"1px solid var(--accent)25"}}>
              <span style={{color:"var(--accent)",fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>REFERENCE</span>
            </div>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Prompt Engineering Cheat Sheet</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Which technique to use when — your quick reference</div>
          </div>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0",overflowX:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:"150px 1fr 1fr 80px",gap:0,fontSize:"0.82rem"}}>
              <div style={{padding:"8px 10px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>Technique</div>
              <div style={{padding:"8px 10px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>What it does</div>
              <div style={{padding:"8px 10px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>When to use it</div>
              <div style={{padding:"8px 10px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>Cost</div>
              {[
                {t:"Zero-Shot",w:"Just describe the task",u:"Simple, well-defined tasks",c:"Low"},
                {t:"Few-Shot",w:"Show examples of desired output",u:"Specific formats, subtle patterns",c:"Medium"},
                {t:"Role/System",w:"Set model's persona & rules",u:"Apps needing consistent behavior",c:"Low"},
                {t:"Chain-of-Thought",w:"Force step-by-step reasoning",u:"Complex reasoning, math, analysis",c:"Medium"},
                {t:"Structured Output",w:"Get reliable JSON/format",u:"Every production application",c:"Low"},
                {t:"Negative Prompting",w:"Suppress unwanted behaviors",u:"Clean output for user-facing apps",c:"Low"},
                {t:"Prompt Chaining",w:"Multi-step pipelines",u:"Complex workflows, long documents",c:"High"},
                {t:"ReAct",w:"Reasoning + tool actions",u:"Agents, real-time data needs",c:"High"},
              ].map((r,i)=>(
                <React.Fragment key={i}>
                  <div style={{padding:"8px 10px",fontWeight:600,borderBottom:"1px solid var(--border-light)"}}>{r.t}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{r.w}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{r.u}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)",fontFamily:"'JetBrains Mono'",fontSize:"0.75rem"}}>{r.c}</div>
                </React.Fragment>
              ))}
              {[
                {t:"Combining",w:"Layer multiple techniques",u:"Every real production prompt",c:"Varies"},
                {t:"Evaluation",w:"Systematic prompt testing",u:"Before deploying any prompt",c:"Medium"},
                {t:"Prompt Library",w:"Versioned, tested templates",u:"Team collaboration, maintenance",c:"Low"},
              ].map((r,i)=>(
                <React.Fragment key={"extra"+i}>
                  <div style={{padding:"8px 10px",fontWeight:600,borderBottom:"1px solid var(--border-light)"}}>{r.t}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{r.w}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{r.u}</div>
                  <div style={{padding:"8px 10px",color:"var(--text-muted)",borderBottom:"1px solid var(--border-light)",fontFamily:"'JetBrains Mono'",fontSize:"0.75rem"}}>{r.c}</div>
                </React.Fragment>
              ))}
            </div>
          </div>

          <Callout color="var(--accent)" icon="🚀"><S>What's next:</S> In the upcoming sections, we'll apply these techniques in real-world scenarios — building with APIs, creating RAG pipelines, and designing AI agents. Every concept from this point forward builds on the prompt engineering foundation you've just learned.</Callout>
          <NotebookDemoLink />
        </section>

        <div style={{marginTop:"3rem",padding:"1.75rem",background:"white",borderRadius:12,textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.3rem",fontWeight:700,marginBottom:6}}>You've completed Prompt Engineering</div>
          <div style={{color:"var(--text-muted)",fontSize:"0.92rem"}}>You now have both the theoretical understanding (how LLMs work) and the practical skills (how to control them) to build GenAI applications.</div>
          <div style={{color:"var(--accent)",fontSize:"0.88rem",fontWeight:600,marginTop:8}}>Next → APIs, RAG & Agents</div>
        </div>

      </div></div>
    </div>
  );
}
