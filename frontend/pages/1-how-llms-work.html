                ))}
                <div style={{marginTop:"0.45rem",color:"var(--text-muted)",fontSize:"0.72rem",lineHeight:1.5}}>
                  Attention uses surrounding tokens as evidence to choose a sense for ambiguous words like “bank”.
                </div>
              </div>
            </div>
            <div style={{padding:"1rem 1.25rem",background:"var(--accent-light)",border:"1px solid var(--work-border)",borderRadius:10,borderLeft:"4px solid var(--accent)"}}>
              <div style={{color:"var(--accent)",fontWeight:700,marginBottom:4,fontSize:"0.95rem"}}>Feed-Forward Weights</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Absorb factual knowledge. "Paris is the capital of France" gets encoded in these weights through repeated exposure.</div>
              <div style={{marginTop:"0.75rem",background:"#FFF7ED",border:"1px solid #FCD34D",borderRadius:10,padding:"0.6rem 0.75rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#4B5563",marginBottom:"0.45rem"}}>
                  <span>Activated features (example)</span>
                  <span>Activation</span>
                </div>
                {[
                  { id:"F-12", v:0.91, c:"#10B981" },
                  { id:"F-33", v:0.18, c:"#F59E0B" },
                  { id:"F-07", v:0.12, c:"#6B7280" },
                  { id:"F-90", v:0.05, c:"#6B7280" },
                ].map((r, i) => (
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<3?6:0}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#94A3B8",width:64}}>{r.id}</span>
                    <div style={{flex:1,height:7,background:"#FDE68A",borderRadius:999,overflow:"hidden"}}>
                      <div style={{width:(r.v*100)+"%",height:"100%",background:r.c,transition:"width 0.3s ease",borderRadius:999}}/>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#111827",width:46,textAlign:"right"}}>{r.v.toFixed(2)}</span>
                  </div>
                ))}
                <div style={{marginTop:"0.45rem",color:"var(--text-muted)",fontSize:"0.72rem",lineHeight:1.5}}>
                  Higher activation means the network has learned a stronger association for the current context.
                </div>
              </div>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>The Scale of Training</div>

          <P>This process is not something you run on a laptop. Training a frontier LLM is one of the most computationally expensive tasks humans have ever attempted.</P>

          <div style={{display:"flex",gap:12,flexWrap:"wrap",margin:"1.25rem 0"}}>
            {[
              {icon:"📚", label:"Training Data", value:"~15T tokens", sub:"Books, web, code, Wikipedia, papers", color:"var(--info-color)", bg:"var(--info-bg)"},
              {icon:"🖥️", label:"Hardware", value:"10,000+ GPUs", sub:"Running in parallel for months", color:"var(--purple)", bg:"var(--purple-bg)"},
              {icon:"⏱️", label:"Duration", value:"3 – 6 months", sub:"Of continuous computation", color:"var(--build-color)", bg:"var(--build-bg)"},
              {icon:"💰", label:"Cost", value:"$10M – $100M+", sub:"For a frontier model", color:"var(--red)", bg:"var(--red-bg)"},
            ].map((s, i) => (
              <div key={i} style={{flex:"1 1 140px",minWidth:140,padding:"1rem",background:s.bg,border:"1px solid "+s.color+"22",borderRadius:10,textAlign:"center"}}>
                <div style={{fontSize:"1.5rem",marginBottom:4}}>{s.icon}</div>
                <div style={{color:s.color,fontWeight:700,fontSize:"0.82rem",marginBottom:2}}>{s.label}</div>
                <div style={{color:"var(--text)",fontWeight:700,fontSize:"1.05rem",fontFamily:"'JetBrains Mono',monospace"}}>{s.value}</div>
                <div style={{color:"var(--text-muted)",fontSize:"0.75rem",marginTop:2}}>{s.sub}</div>
              </div>
            ))}
          </div>

          <Callout color="var(--build-color)" icon="⚠️">What goes in shapes what comes out. Trained mostly on English? The model is better at English. Trained on lots of code? It can write code. This is why <S>training data quality and bias</S> are critical concerns.</Callout>

          <div style={{margin:"1.5rem 0 1.1rem"}}>
            <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.18rem",fontWeight:700,color:"var(--orange)",marginBottom:"0.55rem"}}>Reality Check: Compute Alone Is Not Enough</div>
            <P style={{margin:"0.35rem 0 0.85rem"}}>Many people assume bigger GPUs and more pre-training data automatically produce a helpful assistant. <S color="var(--red)">Surprise:</S> they do not. Pre-training gives language capability, but assistant behavior requires <S color="var(--orange)">alignment with human preferences</S>.</P>

            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"stretch"}}>
              <div style={{flex:1,minWidth:260,background:"#FFF7ED",border:"1px solid #F6D3A6",borderRadius:10,padding:"0.85rem"}}>
                <div style={{fontWeight:700,color:"#B45309",fontSize:"0.86rem",marginBottom:6}}>❌ Only Pre-training + Compute</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.65,color:"#7C2D12",display:"flex",flexDirection:"column",gap:2}}>
                  <div>Internet text + massive compute</div>
                  <div>+ Next-token objective</div>
                  <div>→ Strong text completer</div>
                  <div>→ Inconsistent assistant behavior</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-muted)",fontSize:"1.15rem",padding:"0 2px"}}>→</div>
              <div style={{flex:1,minWidth:260,background:"#ECFDF5",border:"1px solid #BBF7D0",borderRadius:10,padding:"0.85rem"}}>
                <div style={{fontWeight:700,color:"#047857",fontSize:"0.86rem",marginBottom:6}}>✅ Add Alignment Signals</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.65,color:"#065F46",display:"flex",flexDirection:"column",gap:2}}>
                  <div>Pre-training model</div>
                  <div>+ Human preference data</div>
                  <div>+ Teacher-model data (human-supervised)</div>
                  <div>→ Helpful, safer assistant behavior</div>
                </div>
              </div>
            </div>

            <div style={{marginTop:8,fontSize:"0.8rem",color:"var(--text-secondary)",background:"#F8FAFC",border:"1px solid var(--border)",borderRadius:8,padding:"0.55rem 0.7rem"}}>
              <S>Practical note:</S> Most recent frontier models use a blend of human-created data and model-generated data reviewed or guided by human standards.
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>From Text Predictor to Helpful Assistant</div>

          <P>Everything above is <S color="var(--build-color)">pre-training</S>: next-token prediction over massive text and massive compute. That creates a powerful language engine, but mostly a <S>text completer</S>. It can continue patterns ("The capital of France is" → "Paris"), yet still fail to consistently <S>follow instructions</S>, refuse harmful requests correctly, or hold a clean assistant-style conversation.</P>

          <P>So how does ChatGPT or Claude move from "autocomplete" to "helpful assistant"? Through additional alignment stages often grouped under <S color="var(--info-color)">fine-tuning</S>:</P>

          <div style={{display:"flex",flexDirection:"column",gap:0,margin:"1.25rem 0"}}>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--build-border)",padding:"1.2rem",borderLeft:"4px solid var(--build-color)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>📚</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--build-color)",fontWeight:700}}>Stage 1: Pre-training</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Learn language from trillions of tokens. Next-token prediction on the entire internet.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--build-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--build-color)",fontWeight:600}}>Output: Raw text predictor</div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.2rem",padding:"4px 0"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--info-border)",padding:"1.2rem",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>📋</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--info-color)",fontWeight:700}}>Stage 2: Instruction Tuning (SFT)</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Instruction-response examples teach the model the format of being helpful. In practice, this data is often a mix of human-written and model-generated examples filtered by human quality checks.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--info-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--info-color)",fontWeight:600}}>Output: Helpful but rough</div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.2rem",padding:"4px 0"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--work-border)",padding:"1.2rem",borderLeft:"4px solid var(--accent)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>👍</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--accent)",fontWeight:700}}>Stage 3: RLHF</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Preference signals (human rankings, and sometimes model-judged rankings calibrated by human standards) teach the model which responses are better.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--work-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--accent)",fontWeight:600}}>Output: ChatGPT / Claude</div>
            </div>
          </div>

          <Callout color="var(--build-color)" icon="🎓"><S>Analogy:</S> Pre-training is like getting a medical degree — you absorb everything in the textbooks. Fine-tuning is residency — you learn bedside manner, how to talk to patients, when to refer to a specialist. Same knowledge, but now you know how to <S>apply it helpfully</S>.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Stage 2: Instruction Tuning (SFT)</div>

          <P>The pre-trained model is like a brilliant person who has read every book in the library - but has <S>never had a job</S>. It knows everything about language but doesn't know the <S color="var(--build-color)">format</S> of being helpful.</P>

          <P>If you type "Summarize this article," the pre-trained model might continue your sentence with <span style={{fontFamily:"'JetBrains Mono'",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#EF4444",fontSize:"0.88rem"}}>"...in 3 paragraphs for my homework"</span> instead of actually summarizing. It's still in autocomplete mode - it doesn't understand that you're giving it a <S>task</S>.</P>

          <P><S color="var(--build-color)">Supervised Fine-Tuning (SFT)</S> fixes this. Human trainers - often hundreds of them - write thousands of example conversations: "When a user asks X, here's what a good response looks like." The model is then trained on these curated examples.</P>

          <Callout color="var(--build-color)" icon="💼"><S>Analogy:</S> Pre-training is like reading every book in the library. SFT is like <S>doing an internship</S> where a mentor shows you: "here's how we actually talk to customers, here's how we handle complaints, here's how we politely decline."</Callout>

          <SFTExamplesDemo/>

          <P>Notice the variety: the model learns to answer questions, follow tasks precisely, refuse harmful requests politely, and show creativity. Each example teaches the model a different <S>behavior pattern</S>.</P>

          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:"0.95rem"}}>SFT - Key Facts</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Training data</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>10,000-100,000+ curated (instruction, response) pairs</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Method</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Same next-token prediction - but on curated conversations, not random internet text</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Duration</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Days to weeks (much faster than pre-training)</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>What changes</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>The model's weights are slightly adjusted - it doesn't learn new knowledge, it learns new <strong>behavior</strong></span>
              </div>
            </div>
          </div>

          <Callout icon="⚠️"><S>Important:</S> SFT doesn't add new knowledge - the model already knows everything from pre-training. It just learns the <S>format</S> of being helpful: start with the answer, be concise, show your reasoning, cite sources when possible.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Stage 3: RLHF - Learning Human Preferences</div>

          <P>SFT gets the model 80% of the way there. But there's a problem: for any given question, there are <S>many possible good answers</S>. Some are verbose, some concise. Some are formal, some casual. Some are cautious, some confident. Which style should the model use?</P>

          <P>You can't capture this in written examples alone. What you need is <S color="var(--purple)">human judgment</S> - thousands of comparisons saying "this response is better than that one, and here's why."</P>

          <P>That's <S color="var(--purple)">RLHF: Reinforcement Learning from Human Feedback</S>. Instead of showing the model the "right answer," you show it two options and tell it which one humans prefer.</P>

          <Callout color="var(--purple)" icon="📝"><S>Analogy:</S> SFT is a teacher giving you the <S>answer key</S>. RLHF is a teacher <S>grading your essays</S> and saying "this one's better than that one" - over and over - until you internalize what "good" means.</Callout>

          <RLHFDemo/>

          <P>Through thousands of these comparisons, the model learns nuanced preferences that are hard to write down explicitly: be helpful but not sycophantic, be honest even when the truth is uncomfortable, admit uncertainty rather than guess, match the tone of the question.</P>

          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:"0.95rem"}}>RLHF - Key Facts</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Training data</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Thousands of human-ranked response pairs ("B is better than A")</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Method</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Train a reward model on rankings, then optimize the main model to maximize reward scores</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Duration</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Days to weeks - iterative process with ongoing human feedback</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>What changes</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>The model learns <strong>preferences</strong> - which response style humans consider better, safer, more helpful</span>
              </div>
            </div>
          </div>

          <Callout color="var(--purple)" icon="🎯"><S>Why this matters for you as a user:</S> RLHF is why ChatGPT and Claude feel different from each other even though they're both LLMs. They were trained with <S>different human preferences</S>. The personality, tone, and judgment you experience is shaped by RLHF.</Callout>

          <Callout color="var(--info-color)" icon="🔒">After training — both pre-training and fine-tuning — everything is <S>frozen</S>. The model never learns again. When you use ChatGPT or Claude, you're running a frozen snapshot. The weights are locked in place forever.</Callout>
        </section>

        <SectionDivider part="2" title="How the Model Works" sub="The Inference Story" color="var(--work-color)"/>

        <section id="ch4"><ChH num="4" title="Text to Tokens" sub="The tokenizer converts your text into numbers" color="var(--work-color)"/>
          <P>The <S>tokenizer</S> applies its pre-learned merge rules, then looks up each token in the vocabulary table.</P>
          <CB>{`"Hello, how are you?"
  → Tokenizer applies merge rules
  → ["Hello", ",", " how", " are", " you", "?"]
  → Vocabulary lookup
  → [15339, 11, 1268, 527, 499, 30]`}</CB>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:"1.25rem",padding:"8px 16px 8px 12px",background:"#FFF7ED",borderRadius:20,border:"1px solid #FDBA74"}}>
            <span style={{fontSize:"0.95rem",lineHeight:1}}>📓</span>
            <span style={{color:"#9A3412",fontSize:"0.78rem",fontWeight:500}}>Hands-on in <strong>live notebook demo</strong></span>
          </div>
        </section>

        <section id="ch5"><ChH num="5" title="Tokens to Meaning" sub="Embedding lookup gives each token its meaning" color="var(--work-color)"/>
          <P>Token IDs are just numbers. The <S>embedding table</S> maps each to a meaning vector — a simple fetch.</P>
          <CB>{`15339 → [0.23, -0.45, 0.12, ...]  "Hello" general meaning
11    → [0.01,  0.78, -0.33, ...]  "," general meaning
1268  → [0.56,  0.12,  0.89, ...]  " how" general meaning`}</CB>
          <Callout icon="⚠️">These are <S>general</S> meanings. "bank" gets the same vector whether about rivers or money. Context comes from self-attention.</Callout>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:"1.25rem",padding:"8px 16px 8px 12px",background:"#FFF7ED",borderRadius:20,border:"1px solid #FDBA74"}}>
            <span style={{fontSize:"0.95rem",lineHeight:1}}>📓</span>
            <span style={{color:"#9A3412",fontSize:"0.78rem",fontWeight:500}}>Hands-on in <strong>live notebook demo</strong></span>
          </div>
        </section>

        <section id="ch6"><ChH num="6" title="Understanding Context" sub="Self-attention connects words to build meaning" color="var(--work-color)"/>

          <P>After the embedding lookup, every token has a <S>general meaning vector</S> — but no awareness of context. "Bank" doesn't know if it's near "river" or "money".</P>

          <div style={{background:"#F6F7F5",border:"1px solid #E5E7EB",borderRadius:12,padding:"1rem 1rem 0.75rem",margin:"1rem 0 1.1rem"}}>
            <div style={{position:"relative",height:170}}>
              {/* Left cluster: finance meaning */}
              <div style={{position:"absolute",left:"14%",top:"22%",width:10,height:10,borderRadius:"50%",background:"#F59E0B"}} />
              <div style={{position:"absolute",left:"9%",top:"44%",width:9,height:9,borderRadius:"50%",background:"#F3C98A"}} />
              <div style={{position:"absolute",left:"20%",top:"38%",width:9,height:9,borderRadius:"50%",background:"#EAB676"}} />
              <div style={{position:"absolute",left:"24%",top:"56%",width:8,height:8,borderRadius:"50%",background:"#E5B77C"}} />
              <div style={{position:"absolute",left:"16%",top:"17%",color:"#6B4A1E",fontSize:"2rem"}}>•</div>
              <div style={{position:"absolute",left:"19%",top:"18%",color:"#6B4A1E",fontSize:"1.05rem"}}>bank</div>
              <div style={{position:"absolute",left:"24%",top:"39%",color:"#6B4A1E",fontSize:"0.95rem"}}>finance</div>
              <div style={{position:"absolute",left:"11%",top:"52%",color:"#6B4A1E",fontSize:"0.95rem"}}>money</div>
              <div style={{position:"absolute",left:"27%",top:"61%",color:"#6B4A1E",fontSize:"0.95rem"}}>loan</div>

              {/* Right cluster: river meaning */}
              <div style={{position:"absolute",right:"27%",top:"23%",width:10,height:10,borderRadius:"50%",background:"#2F9E83"}} />
              <div style={{position:"absolute",right:"24%",top:"43%",width:9,height:9,borderRadius:"50%",background:"#7DBDAB"}} />
              <div style={{position:"absolute",right:"17%",top:"35%",width:9,height:9,borderRadius:"50%",background:"#5BAF98"}} />
              <div style={{position:"absolute",right:"19%",top:"62%",width:8,height:8,borderRadius:"50%",background:"#8CBFAF"}} />
              <div style={{position:"absolute",right:"26%",top:"18%",color:"#1E6B59",fontSize:"1.05rem"}}>river</div>
              <div style={{position:"absolute",right:"18%",top:"39%",color:"#1E6B59",fontSize:"0.95rem"}}>stream</div>
              <div style={{position:"absolute",right:"22%",top:"55%",color:"#1E6B59",fontSize:"0.95rem"}}>shore</div>
              <div style={{position:"absolute",right:"18%",top:"67%",color:"#1E6B59",fontSize:"0.95rem"}}>lake</div>

              {/* Center ambiguous token */}
              <div style={{position:"absolute",left:"44%",top:"39%",width:20,height:20,borderRadius:"50%",background:"#D97198",border:"2px solid #B14973"}} />
