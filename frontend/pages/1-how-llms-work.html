              {/* Dashed links */}
              <div style={{position:"absolute",left:"28%",top:"35%",width:"18%",borderTop:"2px dashed #D8D3CE",transform:"rotate(7deg)"}} />
              <div style={{position:"absolute",left:"52%",top:"35%",width:"18%",borderTop:"2px dashed #D8D3CE",transform:"rotate(-7deg)"}} />
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"0.82rem"}}>Sits between both clusters — context decides where it truly belongs</div>
          </div>

          <P>Self-attention fixes this. Every word looks at every other word and asks: <S color="var(--purple)">"how relevant are you for understanding me?"</S></P>

          <Callout color="var(--purple)" icon="🪑"><S>Meeting room analogy:</S> Every word in your sentence is sitting around a table. When it's your turn to speak, you look at everyone else and decide who to listen to most carefully. "bank" looks around, sees "river" → <S>very relevant, listen closely</S>. Sees "the" → <S>not very useful</S>. Based on these scores, "bank" absorbs information from the most relevant words and becomes "river bank" specifically.</Callout>

          <P>The key: <S>every word does this simultaneously</S>. While "bank" is looking at everyone, "river" is also looking at everyone, "sat" is looking at everyone. The entire sentence develops contextual understanding in one shot.</P>

          <AttentionDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>How Self-Attention Works: Query, Key, Value</div>

          <P>At this point we have tokens and their embedding vectors. Each vector gets multiplied by <S>three different weight matrices</S> (W_Q, W_K, W_V) to create three new vectors with different purposes:</P>

          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>From One Embedding → Three Purpose-Specific Vectors</div>
            <div style={{textAlign:"center",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem"}}>
              <div style={{color:"#94A3B8",marginBottom:8}}>"bank" embedding = <span style={{color:"#F0F4F8"}}>[0.5, 0.3, 0.8, 0.2]</span></div>
              <div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:4}}>
                <span style={{color:"#6B7280"}}>│</span>
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:30,flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_Q</div>
                  <div style={{color:"#60A5FA",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#60A5FA15",border:"1px solid #60A5FA33",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#60A5FA",fontWeight:700,fontSize:"0.82rem"}}>Q (Query)</div>
                    <div style={{color:"#60A5FA",fontSize:"0.72rem"}}>[0.12, -0.45, 0.33, 0.67]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What am I<br/>looking for?"</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_K</div>
                  <div style={{color:"#FBBF24",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#FBBF2415",border:"1px solid #FBBF2433",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#FBBF24",fontWeight:700,fontSize:"0.82rem"}}>K (Key)</div>
                    <div style={{color:"#FBBF24",fontSize:"0.72rem"}}>[0.89, 0.23, -0.11, 0.44]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What do I<br/>have to offer?"</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_V</div>
                  <div style={{color:"#10B981",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#10B98115",border:"1px solid #10B98133",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#10B981",fontWeight:700,fontSize:"0.82rem"}}>V (Value)</div>
                    <div style={{color:"#10B981",fontSize:"0.72rem"}}>[0.34, 0.56, 0.78, -0.22]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What info<br/>do I carry?"</div>
                  </div>
                </div>
              </div>
            </div>
            <div style={{color:"#6B7280",fontSize:"0.72rem",textAlign:"center",marginTop:10}}>It's just matrix multiplication — embedding × weight matrix → new vector with a new purpose</div>
          </div>

          <P>These weight matrices (W_Q, W_K, W_V) are the <S>same ones learned during training</S> — frozen into the model, just like the embedding table.</P>

          <Callout color="var(--info-color)" icon="📚"><S>Library analogy:</S> Imagine walking into a library. <S color="#60A5FA">Query (Q)</S> is your question — "I need information about river geography." <S color="#FBBF24">Key (K)</S> is the label on each book — "Financial Systems," "River Ecosystems," "Cooking Recipes." <S color="#10B981">Value (V)</S> is the actual content inside each book. You <S>match your Query against every Key</S> to find relevant books, then <S>read the Values</S> of the ones that scored highest.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Step by Step: How "bank" Figures Out Its Meaning</div>

          <P>Sentence: <S>"I sat by the river bank"</S>. Let's trace exactly how self-attention helps "bank" understand it means "river bank" — click through each step:</P>

          <QKVWalkthroughDemo/>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>The Complete Self-Attention Process</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                {step:"1",label:"Create Q, K, V",desc:"Each word's embedding × W_Q, W_K, W_V → three purpose-specific vectors",color:"#A78BFA"},
                {step:"2",label:"Score relevance",desc:"Each word's Query is compared against every other word's Key → dot product → scores",color:"#60A5FA"},
                {step:"3",label:"Weighted sum",desc:"Each word collects everyone's Values, weighted by relevance scores → context vector",color:"#10B981"},
                {step:"4",label:"Residual add",desc:"Context vector is ADDED to the original embedding — identity preserved, context gained",color:"#FBBF24"},
              ].map(s => (
                <div key={s.step} style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:s.step!=="4"?"1px solid var(--border-light)":"none"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:s.color+"20",display:"flex",alignItems:"center",justifyContent:"center",color:s.color,fontWeight:700,fontSize:"0.72rem",flexShrink:0}}>{s.step}</div>
                  <div><span style={{fontWeight:600,fontSize:"0.88rem"}}>{s.label}:</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>{s.desc}</span></div>
                </div>
              ))}
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Multi-Head Attention: Multiple Perspectives at Once</div>

          <P>Everything above was <S>one</S> attention computation — one way of asking "what should I pay attention to?" But a single computation can only capture one type of relationship.</P>

          <P>The model runs <S color="var(--purple)">multiple self-attention operations in parallel</S> — called <S color="var(--purple)">heads</S>. Each head has its own W_Q, W_K, W_V and learns to ask different questions. Click each head to see:</P>

          <MultiHeadDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Where Do These Weights Live?</div>

          <CB>{`Model weights on disk:
├── embedding_table          (token ID → embedding vector)
├── layer_1/
│   ├── W_Q, W_K, W_V        (attention weights)
│   └── W_1, W_2             (feed-forward weights)
├── layer_2/
│   ├── W_Q, W_K, W_V        (DIFFERENT from layer 1!)
│   └── W_1, W_2
├── ...
└── layer_120/
    ├── W_Q, W_K, W_V
    └── W_1, W_2`}</CB>

          <Callout color="var(--purple)"><S>Every layer has its OWN set of W_Q, W_K, W_V.</S> Layer 1's matrices are different from Layer 2's. This is why different layers capture different types of relationships — each layer learned different transformations during training. This connects directly to the Layer-by-Layer demo in Part 1.</Callout>

        </section>

        <section id="ch7"><ChH num="7" title="Activating Knowledge" sub="Feed-forward applies stored facts" color="var(--work-color)"/>

          <P>Self-attention gave the model <S color="var(--purple)">context</S> — "bank" now knows it's near "river." But knowing context and knowing <S>what to do with it</S> are different things.</P>

          <div style={{background:"#1A1D27",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid #2E3240",margin:"1rem 0",fontFamily:"'JetBrains Mono'",fontSize:"0.88rem",lineHeight:1.9}}>
            <div><span style={{color:"#A78BFA"}}>Self-Attention:</span> <span style={{color:"#94A3B8"}}>"What does this word mean in THIS sentence?"</span></div>
            <div><span style={{color:"#10B981"}}>Feed-Forward:</span>  <span style={{color:"#94A3B8"}}>"What do I KNOW about this topic?"</span></div>
          </div>

          <Callout color="var(--accent)" icon="💼"><S>Analogy:</S> Self-attention is a <S>meeting</S> where every word discusses with every other word. Feed-forward is each word going to its <S>private desk</S> to think and apply what it knows. Self-attention gives you the discussion; feed-forward gives you the expertise.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>What is the Feed-Forward Network?</div>

          <P>It's a simple two-layer neural network that processes each word <S>independently</S>. After self-attention, each word has a context-enriched vector. The feed-forward network takes this vector and transforms it, activating relevant <S color="var(--accent)">knowledge</S> stored in its weights.</P>

          <P>The critical point: <S>self-attention lets words talk to each other. Feed-forward lets each word think on its own.</S></P>

          <CB>{`Self-Attention:  "bank" talks to "river," "sat," "by," "the," "I"
                 → now knows it's "river bank"

Feed-Forward:    "river bank" goes into a private room to think
                 → activates knowledge: geography, erosion, flooding,
                   things found near river banks, etc.`}</CB>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>How It Works: Expand → Filter → Compress</div>

          <P>The mechanics are simpler than self-attention. Three steps:</P>

          <div style={{display:"flex",flexDirection:"column",gap:10,margin:"1rem 0"}}>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--info-border)",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--info-color)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.8rem",flexShrink:0}}>1</div>
                <div>
                  <div style={{color:"var(--info-color)",fontWeight:700}}>EXPAND (× W_1)</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>1536 dims → 6144 dims (4× bigger). Projects into a larger space to <S>activate knowledge areas</S>. Like opening all the filing cabinets.</div>
                </div>
              </div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"0.9rem"}}>↓</div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--red)33",borderLeft:"4px solid var(--red)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.8rem",flexShrink:0}}>2</div>
                <div>
                  <div style={{color:"var(--red)",fontWeight:700}}>FILTER (ReLU activation)</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>If value {"<"} 0, set to 0. <S>Turns OFF irrelevant knowledge</S> and keeps relevant knowledge ON. Like slamming shut the filing cabinets you don't need.</div>
                </div>
              </div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"0.9rem"}}>↓</div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--accent)33",borderLeft:"4px solid var(--accent)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.8rem",flexShrink:0}}>3</div>
                <div>
                  <div style={{color:"var(--accent)",fontWeight:700}}>COMPRESS (× W_2)</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>6144 dims → back to 1536 dims. Only the <S>active</S> knowledge contributes (zero × anything = zero). The output is the same size as the input, but now enriched.</div>
                </div>
              </div>
            </div>
          </div>

          <P>Click through each step to see the actual numbers:</P>

          <FeedForwardDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Why Does This Work? The ReLU Trick</div>

          <P>The magic is in <S color="var(--red)">ReLU zeroing out irrelevant dimensions</S> before compression. When W_2 compresses the vector, it multiplies every dimension by a weight row. But zero times anything is zero — so the rows in W_2 corresponding to irrelevant knowledge contribute <S>nothing</S> to the output.</P>

          <Callout color="var(--accent)" icon="🔑"><S>This is how relevant knowledge survives compression.</S> ReLU decides which knowledge areas are relevant by zeroing out the irrelevant ones. Then W_2 compression naturally carries forward only the active dimensions. The output is smaller in size but contains only the knowledge that matters for this specific word in this specific context.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Different Words Activate Different Knowledge</div>

          <P>The same W_1 and W_2 weight matrices store knowledge about <S>millions of topics</S>. Different input vectors activate different neurons — that's how one network handles everything from geography to cooking to code:</P>

          <KnowledgeActivationDemo/>

          <Callout color="var(--build-color)" icon="📦"><S>Where is the knowledge stored?</S> In W_1 and W_2. During training, the model saw trillions of tokens — Wikipedia, books, code, papers. The patterns and facts got encoded as numerical patterns in these weight matrices. This is why <S>larger models know more</S> — bigger W_1 and W_2 = more neurons = more storage for knowledge.</Callout>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0",overflowX:"auto"}}>
            <div style={{fontWeight:700,marginBottom:10,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>Self-Attention vs Feed-Forward</div>
            <div style={{display:"grid",gridTemplateColumns:"140px 1fr 1fr",gap:0,fontSize:"0.85rem"}}>
              <div style={{padding:"8px 10px",background:"var(--bg)",fontWeight:700,borderBottom:"2px solid var(--border)"}}></div>
              <div style={{padding:"8px 10px",background:"var(--purple-bg)",fontWeight:700,color:"var(--purple)",borderBottom:"2px solid var(--border)",textAlign:"center"}}>Self-Attention</div>
              <div style={{padding:"8px 10px",background:"var(--accent-light)",fontWeight:700,color:"var(--accent)",borderBottom:"2px solid var(--border)",textAlign:"center"}}>Feed-Forward</div>
              
              <div style={{padding:"8px 10px",fontWeight:600,borderBottom:"1px solid var(--border-light)"}}>Purpose</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>Understand context between words</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>Apply stored knowledge to each word</div>
              
              <div style={{padding:"8px 10px",fontWeight:600,borderBottom:"1px solid var(--border-light)"}}>How words interact</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>Every word talks to every other word</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>Each word processed independently</div>
              
              <div style={{padding:"8px 10px",fontWeight:600,borderBottom:"1px solid var(--border-light)"}}>What it stores</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>How to compute relevance (W_Q, W_K, W_V)</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>Factual knowledge and patterns (W_1, W_2)</div>
              
              <div style={{padding:"8px 10px",fontWeight:600}}>Analogy</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)"}}>A meeting where everyone discusses</div>
              <div style={{padding:"8px 10px",color:"var(--text-secondary)"}}>Each person goes to their desk to think</div>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>One Transformer Layer = Attention + Feed-Forward</div>

          <P>Self-attention and feed-forward always work as a pair. Together they form one <S>Transformer layer</S>. The model repeats this pattern:</P>

          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0",textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,flexWrap:"wrap",fontFamily:"'JetBrains Mono'",fontSize:"0.85rem"}}>
              <div style={{background:"#A78BFA20",border:"1px solid #A78BFA44",borderRadius:8,padding:"10px 16px"}}>
                <div style={{color:"#A78BFA",fontWeight:700}}>Self-Attention</div>
                <div style={{color:"#6B7280",fontSize:"0.7rem"}}>understand context</div>
              </div>
              <span style={{color:"#6B7280",fontSize:"1.2rem"}}>→</span>
              <div style={{background:"#10B98120",border:"1px solid #10B98144",borderRadius:8,padding:"10px 16px"}}>
                <div style={{color:"#10B981",fontWeight:700}}>Feed-Forward</div>
                <div style={{color:"#6B7280",fontSize:"0.7rem"}}>apply knowledge</div>
              </div>
              <span style={{color:"#6B7280",fontSize:"1.2rem"}}>→</span>
              <div style={{background:"#F59E0B20",border:"1px solid #F59E0B44",borderRadius:8,padding:"10px 16px"}}>
                <div style={{color:"#F59E0B",fontWeight:700}}>Repeat</div>
                <div style={{color:"#6B7280",fontSize:"0.7rem"}}>32 to 120+ times</div>
              </div>
            </div>
            <div style={{color:"#6B7280",fontSize:"0.75rem",marginTop:10}}>Each layer has its OWN weights. Deeper layers capture more abstract patterns.</div>
          </div>

          <Callout icon="📊"><S>GPT-2:</S> 12 layers, 124M parameters. <S>GPT-4:</S> ~120 layers, ~1.7 trillion parameters. More layers = more refined understanding. More parameters = more knowledge stored in W_1, W_2.</Callout>

        </section>

        <section id="ch8"><ChH num="8" title="Generating the Response" sub="One token at a time — the autoregressive loop" color="var(--work-color)"/>

          <P>We've now covered all the building blocks: tokenization (text → numbers), embeddings (numbers → meaning), self-attention (meaning → context), and feed-forward (context → knowledge). Now let's see how they work together to generate a response.</P>

          <P>Here's the fact that surprises most people:</P>

          <div style={{background:"var(--red-bg)",borderRadius:12,padding:"1.5rem",margin:"1.25rem 0",border:"1px solid var(--red)33",textAlign:"center"}}>
            <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.4rem",color:"var(--red)",fontWeight:700,marginBottom:6}}>LLMs generate text ONE TOKEN AT A TIME.</div>
            <div style={{color:"var(--text-secondary)",fontSize:"0.95rem"}}>Not a sentence. Not a paragraph. One. Single. Token. Then repeat.</div>
          </div>

          <P>The model doesn't "think" about the entire answer and write it out. It predicts <S color="var(--red)">one next token</S>, appends it to the input, and runs the <S>entire pipeline again</S> from scratch — tokenize, embed, attention, feed-forward, all 96+ layers — just to predict the next single token. Then again. And again.</P>

          <Callout icon="✍️">It's like writing an essay where you can only think about the <S>very next word</S>. You write one word, read everything you've written so far, then decide the next word. You can never go back and change what you already wrote.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Watch It Happen: Token by Token</div>

          <P>Prompt: <S>"What is Hadoop?"</S> — click "Generate Next Token" to step through each iteration:</P>

          <AutoregressiveDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Why the Last Token's Vector?</div>

          <P>You might wonder: the model processes all input tokens simultaneously — why does it only use the <S>last token's vector</S> to predict what comes next?</P>

          <P>Because in self-attention, each token can only attend to tokens <S>before it and itself</S>. By the time the model reaches the last position, that vector has absorbed information from <S>every preceding token</S> through 96+ layers of attention. It's the most information-rich vector in the sequence.</P>

          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Why the Last Token Carries Full Context</div>
            <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.8rem",lineHeight:1.9}}>
              <div style={{color:"#94A3B8"}}>Input: "What is Hadoop?"</div>
              <div style={{marginTop:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                  <span style={{color:"#60A5FA",width:80}}>Position 0:</span>
                  <span style={{color:"#94A3B8"}}>"What"</span>
                  <span style={{color:"#6B7280"}}>→ can see: itself only</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                  <span style={{color:"#60A5FA",width:80}}>Position 1:</span>
                  <span style={{color:"#94A3B8"}}>"is"</span>
                  <span style={{color:"#6B7280"}}>→ can see: "What" + itself</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                  <span style={{color:"#60A5FA",width:80}}>Position 2:</span>
                  <span style={{color:"#94A3B8"}}>"Hadoop"</span>
                  <span style={{color:"#6B7280"}}>→ can see: "What" + "is" + itself</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",padding:"6px 0",background:"#EF444410",borderRadius:6,paddingLeft:8}}>
                  <span style={{color:"#EF4444",width:80,fontWeight:700}}>Position 3:</span>
                  <span style={{color:"#F0F4F8",fontWeight:700}}>"?"</span>
                  <span style={{color:"#EF4444",fontWeight:600}}>→ can see: ALL tokens → used for prediction</span>
                </div>
              </div>
              <div style={{marginTop:10,color:"#94A3B8",fontSize:"0.75rem"}}>
                💡 Think of it like reading left to right. By the time you reach "?", you've absorbed the full meaning of "What is Hadoop?" — you don't need to go back to "What" separately.
              </div>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>When Does It Stop?</div>

          <P>The model stops generating when one of two things happens:</P>

          <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:250,background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--accent)33",borderLeft:"4px solid var(--accent)"}}>
              <div style={{color:"var(--accent)",fontWeight:700,marginBottom:4}}>End-of-Sequence Token</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>The model itself predicts a special "I'm done" token. This means the model decided the response is complete.</div>
            </div>
            <div style={{flex:1,minWidth:250,background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--info-color)33",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{color:"var(--info-color)",fontWeight:700,marginBottom:4}}>Maximum Token Limit</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>You set <span style={{fontFamily:"'JetBrains Mono'",background:"#252833",padding:"1px 6px",borderRadius:3,fontSize:"0.82rem"}}>max_tokens=500</span> in your API call, forcing the model to stop at 500 tokens regardless.</div>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Why This Matters For Your Career</div>

          <P>Understanding autoregressive generation explains real-world behaviors you'll encounter daily:</P>

          <div style={{display:"flex",flexDirection:"column",gap:10,margin:"1rem 0"}}>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>⏱️</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.95rem",marginBottom:2}}>Why LLMs are slow for long outputs</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>A 500-token response = 500 iterations, each running through all 96+ layers. That's 500 complete passes through the entire model.</div>
              </div>
            </div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>📡</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.95rem",marginBottom:2}}>Why streaming exists in ChatGPT and Claude</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Each token is sent to you as it's generated, rather than waiting for all 500 iterations to finish. That's why you see words appearing one by one.</div>
              </div>
            </div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>💰</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.95rem",marginBottom:2}}>Why longer responses cost more money</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Each token consumes compute. 500 output tokens costs ~500× the compute of generating 1 token. This is why APIs charge separately for input and output tokens, with output tokens usually more expensive.</div>
              </div>
            </div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>🚫</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.95rem",marginBottom:2}}>Why models can't "go back and fix" mistakes</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Once a token is generated, it becomes part of the input for the next iteration. The model can't undo it. If it generates a wrong word early, all subsequent tokens are influenced by that mistake. This is why <S>prompt engineering matters so much</S>.</div>
              </div>
            </div>
            <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>📏</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.95rem",marginBottom:2}}>Why context window limits matter</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>With each iteration, the input grows by one token. By iteration 500, the model processes your entire prompt PLUS 500 generated tokens. If this total exceeds the context window (e.g. 128K tokens), the model can't continue. Your prompt <S>shares</S> the context window with the response.</div>
              </div>
            </div>
          </div>

          <Callout color="var(--red)" icon="⚡"><S>The bottom line:</S> Every token you see appearing in ChatGPT represents a complete forward pass through the entire model — billions of parameters, dozens of layers. The model is doing an enormous amount of work for each single word. Next, we'll see how it decides <S>which</S> token to pick from the 100K+ options available.</Callout>

        </section>

        <section id="ch9"><ChH num="9" title="Controlling Creativity" sub="Temperature, Top-P, Top-K — how the model picks its words" color="var(--work-color)"/>

          <P>In the autoregressive loop, the model produces a score for every token in the vocabulary (~100K scores) at each iteration, then picks one. But <S>how</S> does it pick?</P>

          <P>The simplest approach: always pick the highest-scoring token. This is called <S color="var(--info-color)">greedy decoding</S>.</P>

          <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:250,background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--red)33",borderLeft:"4px solid var(--red)"}}>
              <div style={{color:"var(--red)",fontWeight:700,marginBottom:4}}>The Problem with Greedy</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Same input = same output, every time. "What is Hadoop?" asked 10 times → identical response 10 times. Output tends to be repetitive, boring, and sometimes gets stuck in loops.</div>
            </div>
            <div style={{flex:1,minWidth:250,background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--red)33",borderLeft:"4px solid var(--red)"}}>
              <div style={{color:"var(--red)",fontWeight:700,marginBottom:4}}>The Problem with Pure Random</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Picking randomly from all 100K tokens → nonsense: "What is Hadoop? Banana quantum purple seventeen."</div>
            </div>
          </div>

          <P>You need <S color="var(--accent)">controlled randomness</S> — creative enough to be interesting and natural, but not so random that it's garbage. That's what temperature, top-p, and top-k control.</P>

          <Callout color="var(--build-color)" icon="🎯"><S>This is the most practical topic for your career.</S> Every time you call the OpenAI or Claude API, you'll set these parameters. Understanding them means you can tune outputs for different use cases — precise for code, creative for brainstorming, balanced for Q&A.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>The Probability Distribution</div>

          <P>At each step, the model produces a probability distribution — a list of ~100K tokens, each with a probability of being the next token:</P>

          <CB>{`After processing "What is Hadoop? Hadoop is a"

Token probabilities:
  "distributed"  → 0.25    ← most likely
  "framework"    → 0.12
  "popular"      → 0.10
  "powerful"     → 0.08
  "open"         → 0.07
  "software"     → 0.05
  "big"          → 0.04
  ...
  "banana"       → 0.00001 ← almost impossible
  "purple"       → 0.000001`}</CB>

          <P>All three parameters control how the model picks from this list:</P>

          <div style={{display:"flex",flexDirection:"column",gap:8,margin:"1rem 0"}}>
            <div style={{display:"flex",gap:10,alignItems:"center",padding:"8px 12px",background:"var(--orange-bg)",borderRadius:8,border:"1px solid var(--orange)22"}}>
              <span style={{color:"var(--orange)",fontWeight:700,fontSize:"0.92rem",width:100,flexShrink:0}}>Temperature</span>
              <span style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Reshapes the entire distribution — makes it sharper (confident) or flatter (random)</span>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",padding:"8px 12px",background:"var(--orange-bg)",borderRadius:8,border:"1px solid var(--orange)22"}}>
              <span style={{color:"#F97316",fontWeight:700,fontSize:"0.92rem",width:100,flexShrink:0}}>Top-K</span>
              <span style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Cuts off after the top K tokens — fixed number, ignores the rest</span>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",padding:"8px 12px",background:"var(--purple-bg)",borderRadius:8,border:"1px solid var(--purple)22"}}>
              <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.92rem",width:100,flexShrink:0}}>Top-P</span>
              <span style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Keeps tokens until cumulative probability reaches P — adaptive, adjusts to confidence</span>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Temperature: Reshaping Confidence</div>

          <P><S>Temperature</S> is a single number that controls how "confident" or "spread out" the probability distribution is. To understand it, you need to know that the model doesn't output probabilities directly — it outputs <S>raw scores</S> (called logits), which are then converted into probabilities. Temperature intervenes in between.</P>

          <P>Here's the process, with real numbers. It has three parts: raw scores, softmax, and where temperature fits in.</P>

          {/* ── Step 1: Raw scores ── */}
          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#94A3B8",fontSize:"0.7rem",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Step 1 — The Model Outputs Raw Scores (Logits)</div>
            <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:10}}>The final layer of the model produces one number per token in its vocabulary. These are <S color="#F87171">not</S> probabilities — they're raw scores called <S color="#F0F4F8">logits</S>. They can be any number: positive, negative, large, small. Higher means "the model thinks this token fits better here."</div>
            <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:"4px 12px",fontFamily:"'JetBrains Mono'",fontSize:"0.78rem"}}>
              <div style={{color:"#6B7280",fontWeight:700}}>Token</div>
              <div style={{color:"#6B7280",fontWeight:700}}>Raw Score (logit)</div>
              {[
                {t:"\"distributed\"",s:"4.0",c:"#F0F4F8"},
                {t:"\"framework\"",s:"3.0",c:"#94A3B8"},
                {t:"\"popular\"",s:"2.5",c:"#94A3B8"},
                {t:"\"banana\"",s:"0.5",c:"#6B7280"},
              ].map((r,i) => (
                <React.Fragment key={i}>
                  <div style={{color:r.c}}>{r.t}</div>
                  <div style={{color:r.c,fontWeight:i===0?700:400}}>{r.s}</div>
                </React.Fragment>
              ))}
            </div>
            <div style={{color:"#6B7280",fontSize:"0.72rem",marginTop:8}}>These numbers don't sum to 100 or to 1 — they're just the model's raw opinion. We need to convert them into probabilities. That's what softmax does.</div>
          </div>

          {/* ── Step 2: Converting Scores to Probabilities ── */}
          <div style={{background:"#F8FAFC",borderRadius:10,padding:"1.25rem",border:"1px solid var(--border)",margin:"1rem 0"}}>
            <div style={{fontWeight:700,fontSize:"1rem",marginBottom:8,fontFamily:"'Libre Baskerville',serif"}}>Step 2 — Converting Scores to Probabilities</div>
            <P style={{marginBottom:12}}>We can't pick a random token from raw scores — we need proper probabilities. The function that does this conversion is called <S>softmax</S>. It takes any list of numbers and turns them into <S>probabilities that always sum to exactly 100%.</S> It does two things:</P>
            <div style={{paddingLeft:8,borderLeft:"3px solid var(--primary)",marginBottom:12}}>
              <P style={{marginBottom:4}}><S>1. Exponentiate</S> — raise <em>e</em> (≈ 2.718) to the power of each score. This makes all values positive and amplifies differences.</P>
              <P style={{marginBottom:0}}><S>2. Normalize</S> — divide each result by the sum of all results. This forces them to sum to exactly 1.0 (100%).</P>
            </div>

            <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:8}}>Worked Example — Softmax on Our Four Scores</div>
            <div style={{background:"#1A1D27",borderRadius:8,padding:"1rem",border:"1px solid #2E3240"}}>
              <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.72rem",lineHeight:2,color:"#94A3B8"}}>
                <div style={{color:"#6B7280",fontWeight:700,marginBottom:2}}>Raw scores: [4.0, 3.0, 2.5, 0.5]</div>
                <div><span style={{color:"#6B7280"}}>Step A:</span> Exponentiate each score</div>
                <div style={{paddingLeft:14}}>e<sup>4.0</sup> = <span style={{color:"#F0F4F8"}}>54.6</span> &nbsp; e<sup>3.0</sup> = <span style={{color:"#F0F4F8"}}>20.1</span> &nbsp; e<sup>2.5</sup> = <span style={{color:"#F0F4F8"}}>12.2</span> &nbsp; e<sup>0.5</sup> = <span style={{color:"#F0F4F8"}}>1.6</span></div>
                <div><span style={{color:"#6B7280"}}>Step B:</span> Sum them up</div>
                <div style={{paddingLeft:14}}>54.6 + 20.1 + 12.2 + 1.6 = <span style={{color:"#F0F4F8"}}>88.5</span></div>
                <div><span style={{color:"#6B7280"}}>Step C:</span> Divide each by the sum</div>
                <div style={{paddingLeft:14}}>
                  "distributed" = 54.6 ÷ 88.5 = <span style={{color:"#2563EB",fontWeight:700}}>62%</span> &nbsp;&nbsp;
                  "framework" = 20.1 ÷ 88.5 = <span style={{color:"#059669",fontWeight:700}}>23%</span>
                </div>
                <div style={{paddingLeft:14}}>
                  "popular" = 12.2 ÷ 88.5 = <span style={{color:"#059669",fontWeight:700}}>14%</span> &nbsp;&nbsp;
                  "banana" = 1.6 ÷ 88.5 = <span style={{color:"#DC2626",fontWeight:700}}>2%</span>
                </div>
                <div style={{marginTop:6,borderTop:"1px solid #2E3240",paddingTop:6}}>
                  <span style={{color:"#F0F4F8",fontWeight:700}}>Total: 62% + 23% + 14% + 2% = 100% ✓</span> &nbsp; <span style={{color:"#94A3B8"}}>Always. Guaranteed by the division step.</span>
                </div>
              </div>
            </div>
            <div style={{marginTop:10,fontSize:"0.82rem",color:"var(--text-muted)"}}>
              <S>Key property:</S> Because we divide by the sum of <em>all</em> values, the results must add up to exactly 100%. This is what makes the output a valid probability distribution. It's not a coincidence — it's a mathematical guarantee.
            </div>
          </div>

          {/* ── Step 3: Temperature + Softmax ── */}
          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#94A3B8",fontSize:"0.7rem",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Step 3 — Where Temperature Fits In</div>
            <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:6}}>Temperature inserts one tiny step <S color="#F0F4F8">before</S> softmax: <span style={{fontFamily:"'JetBrains Mono'",color:"#F0F4F8"}}>divide every logit by the temperature value, then apply softmax.</span></div>
            <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:12}}>The softmax still guarantees 100% — but dividing first changes <S color="#F0F4F8">how spread out</S> the probabilities are.</div>

            <div style={{display:"grid",gridTemplateColumns:"120px 1fr 1fr 1fr",gap:"6px 10px",fontFamily:"'JetBrains Mono'",fontSize:"0.72rem"}}>
              {/* Header row */}
              <div style={{color:"#6B7280",fontWeight:700}}>Token</div>
              <div style={{color:"#2563EB",fontWeight:700,textAlign:"center"}}>temp=0.5<br/><span style={{fontWeight:400,fontSize:"0.65rem"}}>score÷0.5 → softmax</span></div>
              <div style={{color:"#059669",fontWeight:700,textAlign:"center"}}>temp=1.0<br/><span style={{fontWeight:400,fontSize:"0.65rem"}}>score÷1.0 → softmax</span></div>
              <div style={{color:"#DC2626",fontWeight:700,textAlign:"center"}}>temp=2.0<br/><span style={{fontWeight:400,fontSize:"0.65rem"}}>score÷2.0 → softmax</span></div>

              {/* distributed */}
              <div style={{color:"#F0F4F8"}}>"distributed"</div>
              <div style={{color:"#2563EB",textAlign:"center"}}>4.0÷0.5=8.0 → <span style={{fontWeight:700}}>84%</span></div>
              <div style={{color:"#059669",textAlign:"center"}}>4.0÷1.0=4.0 → <span style={{fontWeight:700}}>62%</span></div>
              <div style={{color:"#DC2626",textAlign:"center"}}>4.0÷2.0=2.0 → <span style={{fontWeight:700}}>44%</span></div>

              {/* framework */}
              <div style={{color:"#94A3B8"}}>"framework"</div>
              <div style={{color:"#2563EB",textAlign:"center"}}>3.0÷0.5=6.0 → 11%</div>
              <div style={{color:"#059669",textAlign:"center"}}>3.0÷1.0=3.0 → 23%</div>
              <div style={{color:"#DC2626",textAlign:"center"}}>3.0÷2.0=1.5 → 27%</div>

              {/* popular */}
              <div style={{color:"#94A3B8"}}>"popular"</div>
              <div style={{color:"#2563EB",textAlign:"center"}}>2.5÷0.5=5.0 → 4%</div>
              <div style={{color:"#059669",textAlign:"center"}}>2.5÷1.0=2.5 → 14%</div>
              <div style={{color:"#DC2626",textAlign:"center"}}>2.5÷2.0=1.25 → 21%</div>

              {/* banana */}
              <div style={{color:"#6B7280"}}>"banana"</div>
              <div style={{color:"#2563EB",textAlign:"center"}}>0.5÷0.5=1.0 → <span style={{fontWeight:700}}>&lt;1%</span></div>
              <div style={{color:"#059669",textAlign:"center"}}>0.5÷1.0=0.5 → 2%</div>
              <div style={{color:"#DC2626",textAlign:"center"}}>0.5÷2.0=0.25 → <span style={{fontWeight:700}}>8%</span></div>

              {/* totals */}
              <div style={{color:"#F0F4F8",fontWeight:700,borderTop:"1px solid #2E3240",paddingTop:6}}>Total</div>
              <div style={{color:"#2563EB",textAlign:"center",fontWeight:700,borderTop:"1px solid #2E3240",paddingTop:6}}>100%</div>
              <div style={{color:"#059669",textAlign:"center",fontWeight:700,borderTop:"1px solid #2E3240",paddingTop:6}}>100%</div>
              <div style={{color:"#DC2626",textAlign:"center",fontWeight:700,borderTop:"1px solid #2E3240",paddingTop:6}}>100%</div>
            </div>

            {/* Bottom annotations */}
            <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:140,padding:"6px 10px",background:"#2563EB12",borderRadius:6,border:"1px solid #2563EB22"}}>
                <div style={{color:"#2563EB",fontSize:"0.72rem",fontWeight:700}}>Low temp (0.5)</div>
                <div style={{color:"#94A3B8",fontSize:"0.68rem"}}>Dividing by a small number makes scores <S color="#93C5FD">bigger</S> and further apart → softmax concentrates almost everything on the winner (84%)</div>
              </div>
              <div style={{flex:1,minWidth:140,padding:"6px 10px",background:"#05966912",borderRadius:6,border:"1px solid #05966922"}}>
                <div style={{color:"#059669",fontSize:"0.72rem",fontWeight:700}}>Normal temp (1.0)</div>
                <div style={{color:"#94A3B8",fontSize:"0.68rem"}}>Scores unchanged → the model's natural confidence (62% for the top pick)</div>
              </div>
              <div style={{flex:1,minWidth:140,padding:"6px 10px",background:"#DC262612",borderRadius:6,border:"1px solid #DC262622"}}>
                <div style={{color:"#DC2626",fontSize:"0.72rem",fontWeight:700}}>High temp (2.0)</div>
                <div style={{color:"#94A3B8",fontSize:"0.68rem"}}>Dividing by a big number makes scores <S color="#FCA5A5">smaller</S> and closer together → softmax spreads probability around, giving "banana" an 8% chance</div>
              </div>
            </div>
          </div>

          <Callout color="var(--orange)" icon="🧮"><S>The intuition:</S> Temperature doesn't change what the model thinks is best — "distributed" always has the highest raw score. It changes <S>how dramatically the winner dominates</S> after softmax converts scores to probabilities. Low temperature = the winner takes almost everything. High temperature = everyone gets a more equal share, including bad options like "banana". Either way, probabilities always sum to exactly 100%.</Callout>

          <P>Try it yourself — drag the slider to see how temperature reshapes the distribution in real time:</P>

          <TemperatureDemo/>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>When to Use What Temperature</div>
            {[
              {range:"0 – 0.3",use:"Code generation, data extraction, factual Q&A",why:"You want the CORRECT answer, not a creative one",color:"#2563EB"},
              {range:"0.4 – 0.7",use:"Conversation, summarization, analysis",why:"Balanced — mostly accurate with some natural variety",color:"#059669"},
              {range:"0.8 – 1.2",use:"Creative writing, brainstorming, storytelling",why:"You WANT variety and surprise",color:"#D97706"},
              {range:"1.5+",use:"Experimental, wild ideas",why:"High chance of nonsense — use with caution",color:"#DC2626"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
                <span style={{color:r.color,fontFamily:"'JetBrains Mono'",fontSize:"0.82rem",fontWeight:700,width:70,flexShrink:0}}>{r.range}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:"0.88rem"}}>{r.use}</div>
                  <div style={{color:"var(--text-muted)",fontSize:"0.78rem"}}>{r.why}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Top-K: Fixed Cutoff</div>

          <P>Top-K is simpler: <S color="#F97316">"Only consider the K most probable tokens. Ignore everything else."</S></P>

          <P>If K = 3, the model can only choose from the top 3 tokens. If K = 50, it can choose from 50. The rest are eliminated completely — "banana" never has a chance regardless of temperature.</P>

          <Callout icon="⚠️">Top-K has a limitation: K is <S>fixed</S>. Sometimes only 2 tokens make sense, sometimes 50 do. A fixed K can't adapt to the model's confidence at each step. This is why <S color="var(--purple)">Top-P</S> was invented.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Top-P (Nucleus Sampling): Adaptive Cutoff</div>

          <P>Top-P solves the fixed-K problem. Instead of keeping a fixed number of tokens, it says: <S color="var(--purple)">"Keep adding tokens from most probable to least probable until their combined probability reaches P."</S></P>

          <P><S>Why Top-P is better than Top-K:</S> It adapts automatically. When the model is very confident (one token has 0.9 probability), Top-P = 0.9 keeps just that one token. When the model is uncertain (many tokens around 0.05), Top-P = 0.9 keeps many tokens. It <S>naturally adjusts</S> to the model's confidence at each step.</P>

          <P>Try both and see the difference — drag the slider to adjust:</P>

          <TopKTopPDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>How They Work Together</div>

          <P>In practice, APIs let you set temperature and top-p together. They apply <S>in sequence</S>:</P>

          <SamplingPipelineViz/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Practical Defaults — What to Use When</div>

          <P>These are parameters you'll set in <S>every API call</S> you make as a GenAI Engineer. There's no single "right" setting — it depends on what you're building:</P>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            {[
              {use:"Code generation",temp:"0",topP:"1.0",desc:"Deterministic. Always picks the most likely token. Same input = same output.",color:"var(--info-color)",icon:"💻"},
              {use:"Factual Q&A / Summarization",temp:"0.3",topP:"0.9",desc:"Mostly picks likely tokens with slight variety. Accurate and reliable.",color:"#0E7490",icon:"📋"},
              {use:"General conversation",temp:"0.7",topP:"0.9",desc:"Good balance of coherence and naturalness. The sweet spot for most apps.",color:"var(--accent)",icon:"💬"},
              {use:"Creative writing / Brainstorming",temp:"1.0",topP:"0.95",desc:"More variety, surprising word choices. Good for idea generation.",color:"var(--build-color)",icon:"✨"},
            ].map((r,i)=>(
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
                <span style={{fontSize:"1.3rem",flexShrink:0}}>{r.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:"0.92rem",color:r.color}}>{r.use}</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.85rem",marginTop:2}}>{r.desc}</div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.78rem",background:"var(--bg)",padding:"2px 8px",borderRadius:4}}>temp={r.temp}</span>
                  <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.78rem",background:"var(--bg)",padding:"2px 8px",borderRadius:4}}>top_p={r.topP}</span>
                </div>
              </div>
            ))}
          </div>

          <Callout color="var(--accent)" icon="🔑"><S>The key insight:</S> Temperature, Top-K, and Top-P don't change what the model <S>knows</S> — they only change what it <S>chooses</S>. The same model with the same knowledge produces completely different outputs depending on these settings. A code assistant needs temperature 0. A story generator needs temperature 1.0. Knowing when to use what is part of the engineering skill.</Callout>

        </section>

        <div style={{marginTop:"3rem",padding:"1.75rem",background:"white",borderRadius:12,textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.3rem",fontWeight:700,marginBottom:6}}>Section 1 Complete</div>
          <div style={{color:"var(--text-muted)",fontSize:"0.92rem"}}>You now understand the complete journey — from training data to the response you see in ChatGPT.</div>
          <div style={{color:"var(--accent)",fontSize:"0.88rem",fontWeight:600,marginTop:8}}>Next → Prompt Engineering</div>
        </div>

                <div style={{marginTop:"2rem",padding:"1.5rem",background:"var(--accent-light)",borderRadius:12,border:"1px solid var(--work-border)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",fontWeight:700,marginBottom:4}}>Section 2 is on a separate page</div>
            <div style={{color:"var(--text-muted)",fontSize:"0.9rem"}}>Open Prompt Engineering in its own page for focused learning.</div>
          </div>
          <button onClick={()=>window.location.href="./2-prompt-engineering.html#pe-intro"} style={{background:"var(--accent)",color:"white",border:"none",borderRadius:8,padding:"10px 14px",fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>Open Section 2 ↗</button>
        </div>

      </div></div>
    </div>
  );
