// ============================================================
// DEMO 1: Decision Tree — which approach should you use?
// ============================================================
function DecisionTreeDemo() {
  const [answers, setAnswers] = useState({});
  const [step, setStep] = useState(0);

  const questions = [
    { id:"need", q:"What do you actually need from the model?",
      opts:[
        {v:"facts", l:"Up-to-date facts or info from my data", icon:"📚"},
        {v:"format", l:"A specific output format or style", icon:"🎨"},
        {v:"classify", l:"Classification or tagging at scale", icon:"🏷️"},
        {v:"reason", l:"Better reasoning on a task", icon:"🧠"},
      ]},
    { id:"data", q:"How many high-quality labeled examples do you have?",
      opts:[
        {v:"few", l:"Under 50", icon:"🤏"},
        {v:"some", l:"50 to 500", icon:"📦"},
        {v:"many", l:"500 to 10,000", icon:"📚"},
        {v:"lots", l:"More than 10,000", icon:"🗄️"},
      ]},
    { id:"volume", q:"How often will this run in production?",
      opts:[
        {v:"rare", l:"Occasional / one-off", icon:"🐢"},
        {v:"moderate", l:"~1k requests/day", icon:"🚶"},
        {v:"high", l:"~100k+ requests/day", icon:"🏃"},
      ]},
  ];

  const verdicts = {
    "facts-*-*": { answer:"RAG", color:"#1E6091", icon:"📚",
      why:"You need facts the model doesn't know. Use RAG: pull the right documents into each request. Don't fine-tune for this — trained models forget specific facts and can make things up more confidently." },
    "format-few-*": { answer:"Prompt engineering + few-shot", color:"#1A6B4E", icon:"✍️",
      why:"With little data, put 3–5 good examples in the prompt. That usually works better than fine-tuning. Try prompts first; only fine-tune if you still need more at high volume." },
    "format-some-rare": { answer:"Prompt engineering + few-shot", color:"#1A6B4E", icon:"✍️",
      why:"Low traffic + format task: keep it simple. Few-shot prompts are cheap to build, easy to change, and cheap to run." },
    "format-some-moderate": { answer:"Fine-tuning (worth trying)", color:"#6D28D9", icon:"🎯",
      why:"Format and style at real volume is a strong fine-tuning case. You may move from GPT-4o to a fine-tuned mini model and cut cost 5–10× with similar quality." },
    "format-many-*": { answer:"Fine-tuning", color:"#6D28D9", icon:"🎯",
      why:"You have enough data and a clear goal. Train a smaller model on your style — often cheaper, faster, and more consistent. Start with OpenAI fine-tuning; use LoRA on open models if cost or privacy matters." },
    "format-lots-*": { answer:"Fine-tuning (probably LoRA)", color:"#6D28D9", icon:"🎯",
      why:"With 10k+ examples and high volume, LoRA on an open model often costs less overall. You also keep the model yourself — no vendor lock-in." },
    "classify-few-*": { answer:"Prompt + few-shot", color:"#1A6B4E", icon:"✍️",
      why:"Under 50 examples, a good prompt with those examples usually beats fine-tuning. Work on the prompt first." },
    "classify-some-*": { answer:"Fine-tuning is competitive here", color:"#6D28D9", icon:"🎯",
      why:"With 100+ labeled examples, fine-tuning often wins on classification — a small tuned model can match a big prompted model at much lower cost. Worth comparing both." },
    "classify-many-*": { answer:"Fine-tuning (definitely)", color:"#6D28D9", icon:"🎯",
      why:"Classification is where fine-tuning shines. A small tuned model often beats GPT-4o on your exact task, costs less, and responds faster." },
    "classify-lots-*": { answer:"Fine-tuning (open source + LoRA)", color:"#6D28D9", icon:"🎯",
      why:"At this scale, OpenAI fine-tuning gets expensive. LoRA on Llama 3.2 3B or Phi-3 is often the best balance of cost and quality." },
    "reason-*-*": { answer:"Better prompting first; consider o1/Sonnet", color:"#B45309", icon:"🧠",
      why:"Fine-tuning rarely improves reasoning — it mainly changes style and format. Try clearer prompts, step-by-step reasoning, and a stronger base model before you train." },
  };

  function pickVerdict() {
    const k1 = answers.need || "*";
    const k2 = answers.data || "*";
    const k3 = answers.volume || "*";
    const tryKeys = [
      `${k1}-${k2}-${k3}`,
      `${k1}-${k2}-*`,
      `${k1}-*-${k3}`,
      `${k1}-*-*`,
    ];
    for (const k of tryKeys) {
      if (verdicts[k]) return verdicts[k];
    }
    return null;
  }

  const verdict = step >= questions.length ? pickVerdict() : null;
  const q = step < questions.length ? questions[step] : null;

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#FBBF24",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Decision Tree</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Should You Actually Fine-Tune?</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Answer three questions. The honest answer is often "not yet."</div>

      <div style={{display:"flex",gap:4,marginBottom:"1rem"}}>
        {questions.map((qq,i)=>(
          <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?"#A78BFA":"#2E3240"}}/>
        ))}
      </div>

      {q && (
        <div style={{animation:"slideIn 0.25s"}}>
          <div style={{color:"#A78BFA",fontSize:"0.72rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>QUESTION {step+1} of {questions.length}</div>
          <div style={{color:"#F0F4F8",fontSize:"1rem",fontWeight:600,marginBottom:12}}>{q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.opts.map(o=>(
              <button key={o.v} onClick={()=>{setAnswers({...answers, [q.id]:o.v}); setStep(step+1);}}
                style={{textAlign:"left",padding:"10px 14px",background:"#252833",border:"1px solid #3F4555",borderRadius:8,color:"#E2E8F0",cursor:"pointer",fontSize:"0.88rem",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="#2E3240";e.currentTarget.style.borderColor="#A78BFA";}}
                onMouseLeave={e=>{e.currentTarget.style.background="#252833";e.currentTarget.style.borderColor="#3F4555";}}>
                <span style={{fontSize:"1.1rem"}}>{o.icon}</span>
                <span>{o.l}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {verdict && (
        <div style={{animation:"slideIn 0.3s"}}>
          <div style={{background:verdict.color+"22",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid "+verdict.color+"55",marginBottom:10}}>
            <div style={{color:verdict.color,fontSize:"0.72rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>RECOMMENDED APPROACH</div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontSize:"1.5rem"}}>{verdict.icon}</span>
              <span style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700}}>{verdict.answer}</span>
            </div>
            <div style={{color:"#C9CDD3",fontSize:"0.85rem",lineHeight:1.7}}>{verdict.why}</div>
          </div>
          <button onClick={()=>{setAnswers({});setStep(0);}} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.8rem",fontWeight:600,background:"#252833",color:"#94A3B8"}}>↺ Start over</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// LoRA deep dive — collapsible
// ============================================================
function LoRAWhyCollapsible() {
  const [open, setOpen] = useState(false);
  const stepH = (n, title) => (
    <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--work-color)",fontWeight:700,margin:n===1?"1rem 0 0.65rem":"1.75rem 0 0.65rem",paddingTop:n===1?0:"0.75rem",borderTop:n===1?"none":"1px solid var(--border-light)"}}>
      Step {n}: {title}
    </div>
  );
  const flowBox = (children) => (
    <div style={{background:"var(--work-bg)",border:"1px solid var(--work-border)",borderRadius:8,padding:"0.85rem 1rem",margin:"0.75rem 0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.8rem",lineHeight:1.65,color:"var(--text)"}}>{children}</div>
  );

  return (
    <div style={{borderRadius:10,border:"1px solid var(--border)",background:"white",margin:"1.25rem 0",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
      <button type="button" onClick={()=>setOpen(!open)} aria-expanded={open}
        style={{width:"100%",textAlign:"left",padding:"12px 14px",border:"none",background:open?"var(--work-bg)":"#fafaf8",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,borderRadius:open?"10px 10px 0 0":"10px"}}>
        <span style={{fontSize:"0.95rem",color:"var(--text)",fontWeight:700,fontFamily:"'Libre Baskerville',serif",lineHeight:1.45}}>🔍 Why does LoRA work?</span>
        <span style={{color:"var(--work-color)",fontSize:"0.72rem",fontWeight:700,flexShrink:0,letterSpacing:0.5}}>{open?"▲ Hide":"▼ Show"}</span>
      </button>
      {open&&(
        <div style={{padding:"0 14px 18px",borderTop:"1px solid var(--border-light)"}}>
          {stepH(1,"What is this giant matrix W?")}
          <p style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8,margin:"0.65rem 0 0.85rem"}}>Inside a transformer, every layer contains weight matrices. For example:</p>
          {flowBox(<>
            Input Vector (4096 numbers)<br/>↓<br/>W (4096 × 4096)<br/>↓<br/>Output Vector
          </>)}
          <P>The matrix <Code>W</Code> contains:</P>
          <CB>{`4096 × 4096 = 16,777,216 parameters`}</CB>
          <P>When traditional fine-tuning happens:</P>
          <CB>{`W_old  →  W_new

All 16.8 million values are updated.`}</CB>

          {stepH(2,"What actually changes during fine-tuning?")}
          <P>Suppose you fine-tune Llama to become a banking assistant. The model already knows English, grammar, reasoning, and math. You don't need to rewrite everything — only a small adjustment:</P>
          <CB>{`W_new = W_old + ΔW

ΔW = the change needed`}</CB>
          <P>The key discovery behind LoRA:</P>
          <Callout color="var(--work-color)" icon="💡"><S>Most useful changes are much simpler than the original matrix.</S> The change matrix ΔW often contains a lot of redundancy.</Callout>

          {stepH(3,"Understanding rank")}
          <P>This is the part that confuses everyone. Imagine a spreadsheet: 10 rows × 10 columns = 100 numbers.</P>
          <P>But suppose every row is actually derived from one pattern:</P>
          <CB>{`Row1 = [1  2  3]
Row2 = 2 × Row1
Row3 = 3 × Row1
...`}</CB>
          <P>All rows come from one pattern. Although there are 100 numbers, the real information is tiny. We say <S>Rank = 1</S> — one direction explains everything.</P>
          <P>Another example: Row1 = pattern A, Row2 = pattern B, and all other rows are combinations. Then <S>Rank = 2</S> — only two independent patterns exist.</P>
          <P><S>Think of rank as:</S> the number of independent ideas needed to describe a matrix.</P>

          {stepH(4,"Why does LoRA use rank?")}
          <P>Researchers observed that during fine-tuning, <Code>ΔW</Code> does not need all 4096 dimensions. The useful updates often live in a much smaller subspace — maybe only 8, 16, or 32 dimensions. LoRA exploits this.</P>

          {stepH(5,"The two tiny matrices")}
          <P>Instead of learning the full change matrix:</P>
          <CB>{`ΔW  (4096 × 4096)`}</CB>
          <P>LoRA learns two smaller matrices:</P>
          <CB>{`A  (4096 × r)
B  (r × 4096)

r = rank

ΔW = A × B`}</CB>
          <P>Suppose <Code>r = 8</Code>:</P>
          <CB>{`A = 4096 × 8

// DEMO 3: Cost calculator — when does fine-tuning pay off?
// ============================================================
function CostCalcDemo() {
  const [volume, setVolume] = useState(10000);
  const [tokensPerCall, setTokensPerCall] = useState(500);
  const [days, setDays] = useState(90);

  // Rough public-API rates (per 1M tokens, input+output blend)
  const gpt4oCost = 5.0;
  const gpt4oMiniCost = 0.2;
  const ftMiniCost = 1.0;  // higher per-token, but smaller prompts because the task is "baked in"
  const ftTrainingCost = 50; // typical small-job training cost
  const promptReduction = 0.3; // fine-tuned models need ~30% of the original prompt

  const totalCalls = volume * days;
  const baseTokens = (totalCalls * tokensPerCall) / 1e6;
  const ftTokens = (totalCalls * tokensPerCall * promptReduction) / 1e6;

  const gpt4oTotal = baseTokens * gpt4oCost;
  const miniTotal = baseTokens * gpt4oMiniCost;
  const ftTotal = ftTokens * ftMiniCost + ftTrainingCost;

  const breakEvenCalls = ftTrainingCost / ((gpt4oCost - ftMiniCost*promptReduction) * tokensPerCall / 1e6);
  const breakEvenDays = breakEvenCalls / volume;

  const bestOption = ftTotal < miniTotal && ftTotal < gpt4oTotal ? "ft" : miniTotal < gpt4oTotal ? "mini" : "gpt4o";

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#FBBF24",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Cost Calculator</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>When Does Fine-Tuning Pay For Itself?</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Adjust your expected volume and see the break-even point.</div>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:"#94A3B8",fontSize:"0.78rem",fontWeight:600}}>REQUESTS PER DAY</span>
            <span style={{color:"#A78BFA",fontFamily:"'JetBrains Mono'",fontSize:"0.88rem",fontWeight:700}}>{volume.toLocaleString()}</span>
          </div>
          <input type="range" min="100" max="500000" step="100" value={volume} onChange={e=>setVolume(parseInt(e.target.value))} style={{width:"100%",accentColor:"#A78BFA"}}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:"#94A3B8",fontSize:"0.78rem",fontWeight:600}}>AVG TOKENS PER REQUEST</span>
            <span style={{color:"#A78BFA",fontFamily:"'JetBrains Mono'",fontSize:"0.88rem",fontWeight:700}}>{tokensPerCall}</span>
          </div>
          <input type="range" min="100" max="4000" step="100" value={tokensPerCall} onChange={e=>setTokensPerCall(parseInt(e.target.value))} style={{width:"100%",accentColor:"#A78BFA"}}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{color:"#94A3B8",fontSize:"0.78rem",fontWeight:600}}>TIME HORIZON (DAYS)</span>
            <span style={{color:"#A78BFA",fontFamily:"'JetBrains Mono'",fontSize:"0.88rem",fontWeight:700}}>{days}</span>
          </div>
          <input type="range" min="7" max="365" value={days} onChange={e=>setDays(parseInt(e.target.value))} style={{width:"100%",accentColor:"#A78BFA"}}/>
        </div>
      </div>

      <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:8}}>
        {[
          {k:"gpt4o", l:"GPT-4o (no FT)", total:gpt4oTotal, note:"Highest quality baseline", color:"#94A3B8"},
          {k:"mini", l:"GPT-4o-mini (no FT)", total:miniTotal, note:"Cheap, often good enough", color:"#60A5FA"},
          {k:"ft", l:"Fine-tuned mini", total:ftTotal, note:`Includes $${ftTrainingCost} training`, color:"#A78BFA"},
        ].map(o=>(
          <div key={o.k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:8,background:bestOption===o.k?o.color+"22":"#12141C",border:"1px solid "+(bestOption===o.k?o.color+"55":"#2E3240")}}>
            <div>
              <div style={{color:o.color,fontWeight:700,fontSize:"0.88rem"}}>{o.l}{bestOption===o.k && <span style={{marginLeft:8,color:"#FBBF24",fontSize:"0.72rem"}}>● cheapest</span>}</div>
              <div style={{color:"#6B7280",fontSize:"0.74rem"}}>{o.note}</div>
            </div>
            <div style={{color:"#F0F4F8",fontFamily:"'JetBrains Mono'",fontSize:"1rem",fontWeight:700}}>${o.total.toFixed(0)}</div>
          </div>
        ))}
      </div>

      <div style={{marginTop:14,padding:"0.85rem 1rem",background:"#A78BFA12",borderRadius:8,border:"1px solid #A78BFA33"}}>
        <div style={{color:"#A78BFA",fontSize:"0.72rem",fontWeight:700,letterSpacing:1,marginBottom:4}}>BREAK-EVEN POINT</div>
        {breakEvenDays > 0 && breakEvenDays < 365*5 ? (
          <div style={{color:"#C9CDD3",fontSize:"0.85rem",lineHeight:1.6}}>
            Fine-tuned mini beats GPT-4o after ~<S color="#A78BFA">{Math.ceil(breakEvenDays)} days</S> ({Math.ceil(breakEvenCalls).toLocaleString()} requests). Below that, the training cost isn't worth it.
          </div>
        ) : (
          <div style={{color:"#C9CDD3",fontSize:"0.85rem"}}>Volume too low — training cost dominates at this scale.</div>
        )}
      </div>

      <div style={{marginTop:8,fontSize:"0.72rem",color:"#6B7280",fontStyle:"italic"}}>
        Rough estimates only. Real prices change; check current OpenAI/Anthropic pricing pages.
      </div>
    </div>
  );
}

[... 5 more examples ...]

Classify: {ticket}\"\"\"

response = client.chat.completions.create(
    model="gpt-4o",
    messages=[{"role":"user","content":prompt}],
    temperature=0
)`,
    metrics:{accuracy:"91%", costPerCall:"$0.012", latency:"850ms", tokensIn:420, tokensOut:5},
    notes:"Big prompt (420 tokens) sent every time. Quality is good. Cost adds up at scale.",
  };

  const ftApproach = {
    label:"Fine-Tuned Model", color:"#A78BFA", icon:"🎯",
    code:`# Trained gpt-4o-mini on 200 examples — prompt now stripped down
prompt = ticket  # ← just the ticket, nothing else

response = client.chat.completions.create(
    model="ft:gpt-4o-mini:org:tickets:abc123",  # your model
    messages=[{"role":"user","content":prompt}],
    temperature=0
)`,
    metrics:{accuracy:"94%", costPerCall:"$0.0008", latency:"310ms", tokensIn:35, tokensOut:5},
    notes:"Tiny prompt — categories baked into the model's weights. Higher accuracy, 15× cheaper, 3× faster.",
  };

  const a = view === "prompt" ? promptApproach : ftApproach;

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>

      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Support-ticket classification with 5 categories. Click each approach to compare.</div>

      <div style={{display:"flex",gap:8,marginBottom:"1.25rem"}}>
        <button onClick={()=>setView("prompt")} style={{padding:"8px 16px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.85rem",fontWeight:600,background:view==="prompt"?"#10B981":"#252833",color:view==="prompt"?"#fff":"#94A3B8"}}>✍️ Prompt Engineering</button>
        <button onClick={()=>setView("ft")} style={{padding:"8px 16px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.85rem",fontWeight:600,background:view==="ft"?"#A78BFA":"#252833",color:view==="ft"?"#fff":"#94A3B8"}}>🎯 Fine-Tuned</button>
      </div>

      <div style={{background:"#12141C",borderRadius:10,padding:"1rem",border:"1px solid "+a.color+"33",marginBottom:10}}>
        <div style={{color:a.color,fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>{a.label.toUpperCase()}</div>
        <pre style={{color:"#E2E8F0",fontSize:"0.76rem",fontFamily:"'JetBrains Mono'",lineHeight:1.6,whiteSpace:"pre-wrap",margin:0}}>{a.code}</pre>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
        {[
          {l:"ACCURACY", v:a.metrics.accuracy},
          {l:"COST / CALL", v:a.metrics.costPerCall},
          {l:"LATENCY", v:a.metrics.latency},
          {l:"TOKENS IN", v:a.metrics.tokensIn},
        ].map((m,i)=>(
          <div key={i} style={{background:"#12141C",padding:"8px 10px",borderRadius:8,border:"1px solid #2E3240",textAlign:"center"}}>
            <div style={{color:"#6B7280",fontSize:"0.62rem",fontWeight:700,letterSpacing:1}}>{m.l}</div>
            <div style={{color:a.color,fontFamily:"'JetBrains Mono'",fontSize:"0.95rem",fontWeight:700,marginTop:2}}>{m.v}</div>
          </div>
        ))}
      </div>

      <div style={{padding:"0.65rem 0.85rem",background:a.color+"12",borderRadius:8,border:"1px solid "+a.color+"22"}}>
        <span style={{color:a.color,fontSize:"0.78rem",fontWeight:600}}>Notes: </span>
        <span style={{color:"#C9CDD3",fontSize:"0.82rem"}}>{a.notes}</span>
      </div>
    </div>
  );
}

function JsonlDemo() {
  const [show, setShow] = useState("raw");

  const raw = `[
  {"ticket": "My WiFi keeps dropping every 10 min", "category": "Network"},
  {"ticket": "Refund request for order #4521", "category": "Billing"},
  {"ticket": "Can't reset my password", "category": "Account"},
  {"ticket": "Excel keeps crashing", "category": "Software"},
  {"ticket": "Mouse not working at all", "category": "Hardware"}
]`;

  const jsonl = `{"messages":[{"role":"system","content":"Classify the support ticket into one of: Hardware, Software, Network, Account, Billing. Respond with only the category."},{"role":"user","content":"My WiFi keeps dropping every 10 min"},{"role":"assistant","content":"Network"}]}
{"messages":[{"role":"system","content":"Classify the support ticket into one of: Hardware, Software, Network, Account, Billing. Respond with only the category."},{"role":"user","content":"Refund request for order #4521"},{"role":"assistant","content":"Billing"}]}
{"messages":[{"role":"system","content":"Classify the support ticket into one of: Hardware, Software, Network, Account, Billing. Respond with only the category."},{"role":"user","content":"Can't reset my password"},{"role":"assistant","content":"Account"}]}
{"messages":[{"role":"system","content":"Classify the support ticket into one of: Hardware, Software, Network, Account, Billing. Respond with only the category."},{"role":"user","content":"Excel keeps crashing"},{"role":"assistant","content":"Software"}]}
{"messages":[{"role":"system","content":"Classify the support ticket into one of: Hardware, Software, Network, Account, Billing. Respond with only the category."},{"role":"user","content":"Mouse not working at all"},{"role":"assistant","content":"Hardware"}]}`;

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#FBBF24",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Format Transformation</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Your Data → JSONL</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>The format OpenAI's fine-tuning API expects. One JSON object per line — no array.</div>

      <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
        <button onClick={()=>setShow("raw")} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.82rem",fontWeight:600,background:show==="raw"?"#60A5FA":"#252833",color:show==="raw"?"#fff":"#94A3B8"}}>1️⃣ Your raw data</button>
        <button onClick={()=>setShow("jsonl")} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.82rem",fontWeight:600,background:show==="jsonl"?"#A78BFA":"#252833",color:show==="jsonl"?"#fff":"#94A3B8"}}>2️⃣ OpenAI JSONL</button>
      </div>

      <div style={{background:"#12141C",borderRadius:10,padding:"1rem",border:"1px solid #2E3240",marginBottom:8,maxHeight:340,overflow:"auto"}}>
        <pre style={{color:"#E2E8F0",fontSize:"0.74rem",fontFamily:"'JetBrains Mono'",lineHeight:1.6,whiteSpace:"pre",margin:0}}>{show==="raw"?raw:jsonl}</pre>
      </div>

      {show==="jsonl" && (
        <div style={{padding:"0.65rem 0.85rem",background:"#A78BFA12",borderRadius:8,border:"1px solid #A78BFA33"}}>
          <span style={{color:"#A78BFA",fontSize:"0.78rem",fontWeight:600}}>What changed: </span>
          <span style={{color:"#C9CDD3",fontSize:"0.82rem"}}>Each row became a full chat conversation — system prompt + user message + the assistant reply you want the model to learn. The system prompt is identical for every row, which is fine; OpenAI deduplicates it internally.</span>
        </div>
      )}
    </div>
  );
}

          </div>

          <P>If you remember one sentence from this entire section, make it this one:</P>

          <Callout color="var(--purple)" icon="🎯"><S>Fine-tuning teaches the model HOW to behave, not WHAT to know.</S></Callout>

          <P>This one idea explains most fine-tuning mistakes. Here's a simple way to think about it.</P>

          <SubH>The intern analogy</SubH>

          <P>Imagine you hire a brilliant, well-read intern. They've read every book, can write in any style, and reason about almost anything. But on day one at your company, they don't know:</P>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>

          <P>Two different ways to bring them up to speed:</P>

          <div style={{display:"flex",gap:14,margin:"1rem 0",flexWrap:"wrap"}}>

              <div style={{color:"var(--purple)",fontSize:"0.8rem",fontWeight:700,marginBottom:6}}>🎓 Send them through onboarding (fine-tuning)</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.85rem",lineHeight:1.7}}>Six weeks shadowing senior staff. They absorb tone, classification habits, the rhythm of how your team works. Best for <S>style and behavior</S>.</div>
            </div>
          </div>

          <P>You wouldn't onboard a new intern by drilling them on this week's pricing — by next week the prices will have changed. You'd onboard them on <S>how your team thinks</S>. That's exactly the right intuition for fine-tuning.</P>

          <Callout color="var(--info-color)" icon="🔑">Model missing facts about your data? Use RAG, not fine-tuning. Model doesn't sound like your brand, or can't label your categories reliably? Fine-tuning may be the right fix.</Callout>

        {/* ── When to Fine-Tune ── */}

            <div style={{display:"inline-block",padding:"3px 12px",background:"var(--info-bg)",borderRadius:5,marginBottom:10,border:"1px solid var(--info-border)"}}>
              <span style={{color:"var(--info-color)",fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>FOUNDATION</span>
            </div>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>When to Fine-Tune</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>Four situations where fine-tuning is worth it</div>
          </div>

          <P>Fine-tuning makes sense for only four types of problems. Learn to spot them.</P>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:12}}>

              {n:"2", icon:"🎨", color:"#A78BFA",
                title:"Brand Voice & House Style",
                example:"Marketing copy that sounds like your brand. Customer-facing replies that match your support team's voice. Code generation in your team's idioms.",

                title:"Domain-Specific Language",

              {n:"4", icon:"💰", color:"#A78BFA",
                title:"Cost Reduction at High Volume",
                example:"You've shipped a feature on GPT-4o. It works. Volume is 500k calls/day. The bill is hurting.",

          <Callout color="var(--purple)" icon="🎯">Not on this list: "the model gets facts wrong" and "I want it to be smarter." Fine-tuning won't fix those — use RAG, better prompts, or a stronger model instead.</Callout>
        </section>

        {/* ── When NOT to Fine-Tune ── */}
        <section id="ft-not" style={{paddingTop:"2rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}>
            <div style={{display:"inline-block",padding:"3px 12px",background:"#FEF2F2",borderRadius:5,marginBottom:10,border:"1px solid #FECACA"}}>
              <span style={{color:"#B91C1C",fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>FOUNDATION</span>
            </div>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>When NOT to Fine-Tune</h3>
            <div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>When fine-tuning wastes time and makes things worse</div>
          </div>

          <P>Many tutorials skip this part. In several common cases, fine-tuning will <S>hurt</S> your system. Spotting them early saves weeks of work.</P>

        {/* ── Chapter 1: Closed vs Open ── */}
        <section id="ft1" style={{paddingTop:"2rem"}}>
          <ChH num="1" title="Closed vs Open Source" sub="What changed in the last two years" color="var(--info-color)"/>

          <P>Two years ago, "open-source LLMs" were a curiosity. GPT-3.5 outclassed almost everything you could download. Today, the gap has closed remarkably — and in many narrow tasks, open-source models <S>win</S>.</P>

          <SubH>The shift, in one table</SubH>

          <div style={{margin:"1rem 0",overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.86rem"}}>

          <SubH>The practical rule</SubH>

          <P>Use closed models when you need the best reasoning available and can't host your own. Use open-source models when you need privacy, customization, or you've identified a narrow task where a fine-tuned small model wins on cost.</P>

          <Callout color="var(--info-color)" icon="🌊"><S>The state of play (late 2025):</S> the best closed models still lead on the very hardest reasoning tasks. But for ~80% of production use cases — classification, extraction, summarization, formatting — a well-chosen open-source model is competitive.</Callout>
        </section>

        {/* ── Chapter 5: How OpenAI FT works ── */}
        <section id="ft5" style={{paddingTop:"2rem"}}>
          <ChH num="5" title="How OpenAI Fine-Tuning Works" sub="Under the hood, in plain English" color="var(--build-color)"/>

          <P>OpenAI's fine-tuning is the easy entry point. You upload examples; OpenAI handles the GPUs, the training loop, the hyperparameters, the artifact storage. You get back a new model ID you call like any other.</P>

          <SubH>The flow</SubH>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {n:"1", t:"Prepare a JSONL file of example conversations", d:"Each line is a complete chat — system prompt + user message + the assistant reply you want the model to learn."},
              {n:"2", t:"Upload the file", d:"OpenAI returns a file_id. Your data stays in your account; OpenAI uses it only to train your model."},
              {n:"3", t:"Start a fine-tuning job", d:"Pick a base model (typically gpt-4o-mini), pass the file_id, optionally set hyperparameters. Training runs on OpenAI's hardware."},
              {n:"4", t:"Wait", d:"Small jobs (100–500 examples) finish in 10–30 minutes. Larger jobs can take hours. You're emailed when it's done."},
              {n:"5", t:"Call your model", d:"You get a model ID like ft:gpt-4o-mini-2024-07-18:your-org::abc123. Use it in any chat.completions.create call exactly like a stock model."},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{width:28,height:28,borderRadius:7,background:"var(--build-bg)",color:"var(--build-color)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:"0.85rem",flexShrink:0}}>{s.n}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:2}}>{s.t}</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{s.d}</div>
                </div>
              </div>
            ))}
          </div>

          <SubH>What's actually happening on OpenAI's side</SubH>

          <P>Behind the scenes, OpenAI is running <S>supervised fine-tuning (SFT)</S> on the base model. Each line in your JSONL becomes a training example: the model sees the system + user messages, predicts the assistant message token by token, and gets corrected when it predicts wrong. After enough examples, the corrections shape the weights toward your desired behavior.</P>

          <P>OpenAI is almost certainly running this with LoRA or a similar parameter-efficient method under the hood (they don't publish details). What you store and serve is small adapter weights, not a full new model.</P>

          <Callout color="var(--build-color)" icon="💡">OpenAI fine-tuning is best when you want results in an afternoon, don't want to manage GPUs, and the privacy story (your data with OpenAI) is acceptable. For everything else, LoRA on open-source is the alternative.</Callout>
        </section>

        {/* ── Chapter 6: JSONL ── */}
        <section id="ft6" style={{paddingTop:"2rem"}}>
          <ChH num="6" title="The JSONL Format" sub="Preparing your data the way OpenAI wants it" color="var(--build-color)"/>

          <P>JSONL stands for "JSON Lines": one JSON object per line, no surrounding array, no commas between lines. Each line is a complete training example — a full chat conversation.</P>

          <JsonlDemo />

          <SubH>The rules that trip people up</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"8px 12px",background:"var(--build-bg)",borderRadius:6,borderLeft:"3px solid var(--build-color)",fontSize:"0.86rem"}}><S color="var(--build-color)">No outer array.</S> Don't write <Code>[ {`{...}`}, {`{...}`} ]</Code> — write one object per line, no brackets at all.</div>
            <div style={{padding:"8px 12px",background:"var(--build-bg)",borderRadius:6,borderLeft:"3px solid var(--build-color)",fontSize:"0.86rem"}}><S color="var(--build-color)">Same system prompt across all rows</S> (recommended). OpenAI's tooling deduplicates this internally and trains more efficiently.</div>
            <div style={{padding:"8px 12px",background:"var(--build-bg)",borderRadius:6,borderLeft:"3px solid var(--build-color)",fontSize:"0.86rem"}}><S color="var(--build-color)">Quality &gt; quantity.</S> 200 carefully reviewed examples beats 2,000 noisy ones. Mislabeled examples actively teach the model the wrong thing.</div>
            <div style={{padding:"8px 12px",background:"var(--build-bg)",borderRadius:6,borderLeft:"3px solid var(--build-color)",fontSize:"0.86rem"}}><S color="var(--build-color)">Balance your classes.</S> If 80% of your training data is one category, the model will overpredict that category. Aim for rough parity.</div>
            <div style={{padding:"8px 12px",background:"var(--build-bg)",borderRadius:6,borderLeft:"3px solid var(--build-color)",fontSize:"0.86rem"}}><S color="var(--build-color)">Hold out a test set.</S> Split your data 80/20 before training. Use the held-out 20% only for evaluation — never for training.</div>
          </div>

          <SubH>The Python that builds it</SubH>

          <CB>{`import json

with open("training_data.jsonl", "w") as f:
    for example in your_dataset:
        line = {
            "messages": [
                {"role": "system", "content": SYSTEM_PROMPT},
                {"role": "user", "content": example["input"]},
                {"role": "assistant", "content": example["output"]},
            ]
        }
        f.write(json.dumps(line) + "\\n")  # ← one object per line

# Validate before uploading — OpenAI rejects malformed files
with open("training_data.jsonl") as f:
    for i, line in enumerate(f):
        obj = json.loads(line)
        assert "messages" in obj
        assert len(obj["messages"]) >= 2
print("✅ JSONL valid")`}</CB>
          <NotebookDemoLink />
        </section>


        {/* ── Chapter 7: Running the Job ── */}
        <section id="ft7" style={{paddingTop:"2rem"}}>
          <ChH num="7" title="Running a Fine-Tuning Job" sub="End to end with the OpenAI API" color="var(--build-color)"/>

          <P>Once your JSONL is ready, the actual training is three API calls: upload the file, start the job, poll for completion.</P>

          <CB>{`from openai import OpenAI
client = OpenAI()

# 1. Upload the training file
training_file = client.files.create(
    file=open("training_data.jsonl", "rb"),
    purpose="fine-tune"
)
print(f"Uploaded: {training_file.id}")

# 2. (Optional) Upload a validation file — OpenAI uses it during training
#    to compute eval loss every epoch, helping you spot overfitting
validation_file = client.files.create(
    file=open("validation_data.jsonl", "rb"),
    purpose="fine-tune"
)

# 3. Kick off the fine-tuning job
job = client.fine_tuning.jobs.create(
    training_file=training_file.id,
    validation_file=validation_file.id,
    model="gpt-4o-mini-2024-07-18",   # the base model to fine-tune
    suffix="support-classifier-v1",    # appears in your model's name
    hyperparameters={
        "n_epochs": 3,                 # 'auto' usually works fine
    }
)
print(f"Job started: {job.id}")`}</CB>

          <SubH>Monitoring the job</SubH>

          <CB>{`# Poll until done — or check the OpenAI dashboard
import time

while True:
    job = client.fine_tuning.jobs.retrieve(job.id)
    print(f"Status: {job.status}")
    if job.status in ["succeeded", "failed", "cancelled"]:
        break
    time.sleep(60)

if job.status == "succeeded":
    print(f"\\nYour fine-tuned model: {job.fine_tuned_model}")
    # e.g. ft:gpt-4o-mini-2024-07-18:your-org:support-classifier-v1:abc123`}</CB>

          <SubH>Calling your model</SubH>

          <CB>{`# Use it exactly like any other model
response = client.chat.completions.create(
    model=job.fine_tuned_model,
    messages=[
        {"role": "system", "content": SYSTEM_PROMPT},
        {"role": "user", "content": "My WiFi keeps dropping every 10 minutes"},
    ]
)
print(response.choices[0].message.content)  # → "Network"`}</CB>

          <Callout color="var(--build-color)" icon="💸"><S>Cost reality check:</S> A typical small fine-tuning job (200 examples, gpt-4o-mini) costs around $5–$20 in training. Inference costs are roughly 2× the base model price per token — but because your prompts shrink dramatically (the task is now "baked in"), total per-call cost usually drops 5–10×.</Callout>
          <NotebookDemoLink />
        </section>

        {/* ── Chapter 8: Evaluating ── */}
        <section id="ft8" style={{paddingTop:"2rem"}}>
          <ChH num="8" title="Did It Actually Help?" sub="Evaluating your fine-tuned model" color="var(--build-color)"/>

          <P>The most common fine-tuning failure mode is shipping a model that <S>seems</S> better because the loss curve looked nice — but actually performs worse than the prompt-engineered baseline. Evaluation is non-negotiable.</P>

          <SubH>The three checks every fine-tune needs</SubH>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:10}}>
            {[
              {n:"1", t:"Held-out accuracy", c:"#10B981",
                desc:"Run your fine-tuned model on the 20% you held out from training. Compare against the prompt-engineered baseline on the same examples. If the fine-tune isn't clearly better, you've gained nothing.",
                code:`# Same 100 examples through both
ft_correct = sum(predict_ft(x) == y for x, y in test_set)
baseline_correct = sum(predict_baseline(x) == y for x, y in test_set)

print(f"Fine-tuned: {ft_correct}/100")
print(f"Baseline:   {baseline_correct}/100")`},
              {n:"2", t:"Out-of-distribution check", c:"#F59E0B",
                desc:"Test on examples that don't look like your training data — slightly weird phrasing, edge cases, adversarial inputs. A model that memorized your training set often falls apart here.",
                code:`# Try inputs that are NOT in your training distribution
weird_inputs = [
    "Hi I have a question regarding my account thx",  # informal
    "URGENT: SYSTEM DOWN ENTIRE TEAM AFFECTED",        # all caps
    "我无法登录我的账户",                                 # different language
]
for x in weird_inputs:
    print(f"{x[:40]}... → {predict_ft(x)}")`},
              {n:"3", t:"Latency & cost", c:"#A78BFA",
                desc:"Real per-call cost (in dollars) and latency (in milliseconds) on production-shaped inputs. The whole point of fine-tuning is usually that these go down.",
                code:`import time
start = time.time()
preds = [predict_ft(x) for x in test_set[:50]]
elapsed = time.time() - start
print(f"Avg latency: {elapsed/50*1000:.0f}ms")
print(f"Avg cost:    ~$0.0008 / call (vs $0.012 baseline)")`},

        {/* ── Chapter 9: Why full FT fails ── */}
        <section id="ft9" style={{paddingTop:"2rem"}}>
          <ChH num="9" title="Why Full Fine-Tuning Fails (For Most Of Us)" sub="The 8 billion weight problem" color="var(--work-color)"/>

          <P>OpenAI hides the GPU complexity behind their API. Once you move to open-source models, you face it directly. Let's understand the problem before seeing the elegant solution.</P>

          <SubH>The math</SubH>

          <P>Take Llama 3.1 8B. That's <S>8 billion weights</S>, each typically stored as a 16-bit number (2 bytes). To <S>load</S> the model for inference: 16 GB of GPU memory.</P>

          <P>To <S>train</S> it via standard backpropagation, you need to keep around, for every weight:</P>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>The weight itself</S> — 16 GB</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>The gradient</S> — another 16 GB</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Optimizer state</S> (Adam keeps 2 moments per weight, in fp32) — 64 GB</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Activations</S> (intermediate values needed for backprop) — 10–40 GB depending on batch size</div>
          </div>

          <P>Total: <S color="var(--red)">~120+ GB of GPU memory</S> for an 8B model. That's a multi-GPU server costing tens of dollars an hour. To fine-tune a 70B model: hundreds of GB. To fine-tune the 405B: a data center.</P>

          <SubH>The realization</SubH>

          <P>Here's the question that changed everything: do we really need to update <S>all</S> 8 billion weights to teach a new behavior? Most fine-tuning tasks change the model only a little — adjusting tone, learning a few new categories, picking up a domain's terminology.</P>

          <P>What if we could update just <S>0.1% of the weights</S> — and somehow get most of the benefit? That's what LoRA does.</P>

          <Callout color="var(--work-color)" icon="💡">The intuition that motivates LoRA: fine-tuning isn't building a new model. It's nudging an existing one. Nudges live in a much smaller space than the full weight matrix.</Callout>
        </section>

        {/* ── Chapter 10: LoRA ── */}
        <section id="ft10" style={{paddingTop:"2rem"}}>
          <ChH num="10" title="LoRA — The Trick That Made Fine-Tuning Accessible" sub="Low-Rank Adaptation, visually" color="var(--work-color)"/>

          <P>LoRA (Low-Rank Adaptation) was published in 2021 and changed the economics of fine-tuning permanently. The math is simpler than the name suggests.</P>

          <SubH>The setup</SubH>

          <P>Inside a transformer, the "weights" are mostly giant matrices — for an 8B model, many of them are 4096 × 4096 (about 16 million numbers each). Fine-tuning normally means updating these matrices directly.</P>

          <P>LoRA's trick: <S>freeze the original matrix W, and learn a small "patch" alongside it</S>. The patch is the product of two thin matrices A and B, where the inner dimension (called the <S>rank</S>) is small — typically 8 or 16.</P>

          <LoRARankDemo />

          <LoRAWhyCollapsible />

          <P>In practice, LoRA fine-tunes match or come within 1–2% of full fine-tuning quality on most tasks, while training <S>~100× fewer parameters</S> and using <S>~10× less memory</S>.</P>

          <SubH>What you store and serve</SubH>

          <P>The final artifact is a tiny file (often under 100 MB) containing just the A and B matrices for each layer. At inference time, you load the original model once and apply any of dozens of different LoRA adapters on top — switching tasks without reloading the base model.</P>

          <Callout color="var(--work-color)" icon="🎯">LoRA's significance: in 2020, fine-tuning a 7B model required a $10k/month server. In 2024, the same task runs on a $1.50/hour rented GPU. Same model, same quality — the math just got smarter.</Callout>
        </section>

        {/* ── Chapter 11: QLoRA ── */}
        <section id="ft11" style={{paddingTop:"2rem"}}>
          <ChH num="11" title="QLoRA — LoRA + Quantization" sub="Fine-tuning on your laptop" color="var(--work-color)"/>

          <P>LoRA freezes the base weights, but they still have to live in GPU memory. For a 70B model, that's 140 GB. <S>Quantization</S> compresses the frozen weights to 4-bit precision — cutting memory ~4× — without losing much quality during inference.</P>

          <SubH>The full pipeline</SubH>

          <div style={{margin:"1rem 0",display:"flex",alignItems:"stretch",gap:8,flexWrap:"wrap"}}>
            {[
              {step:"1", t:"Load model in 4-bit", d:"Base weights compressed 4×. 70B fits in ~35 GB instead of 140.", color:"#3B82F6"},
              {step:"2", t:"Freeze the base", d:"Don't compute gradients for it. No optimizer state needed.", color:"#3B82F6"},
              {step:"3", t:"Attach LoRA adapters", d:"Small trainable matrices in fp16 alongside the frozen base.", color:"#A78BFA"},
              {step:"4", t:"Train", d:"Only the LoRA weights update. Memory + compute drops dramatically.", color:"#10B981"},
            ].map((s,i)=>(
              <div key={i} style={{flex:"1 1 200px",padding:"12px 14px",background:"white",borderRadius:10,border:"1px solid "+s.color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{width:26,height:26,borderRadius:6,background:s.color+"22",color:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:"0.85rem"}}>{s.step}</div>
                  <span style={{fontWeight:700,fontSize:"0.86rem"}}>{s.t}</span>
                </div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.78rem",lineHeight:1.6}}>{s.d}</div>
              </div>
            ))}
          </div>

          <SubH>What QLoRA lets you do</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"8px 12px",background:"var(--work-bg)",borderRadius:6,borderLeft:"3px solid var(--work-color)",fontSize:"0.86rem"}}>Fine-tune a <S>3B model on a free Colab T4</S> (16 GB)</div>
            <div style={{padding:"8px 12px",background:"var(--work-bg)",borderRadius:6,borderLeft:"3px solid var(--work-color)",fontSize:"0.86rem"}}>Fine-tune a <S>7B model on a single RTX 4090</S> (24 GB)</div>
            <div style={{padding:"8px 12px",background:"var(--work-bg)",borderRadius:6,borderLeft:"3px solid var(--work-color)",fontSize:"0.86rem"}}>Fine-tune a <S>70B model on a single A100</S> (80 GB) — was previously impossible without a cluster</div>
          </div>

          <Callout color="var(--work-color)" icon="🔬">QLoRA was the breakthrough that made fine-tuning truly democratized. The paper came out in May 2023, and within months, every serious open-source fine-tuning project moved to it. It's now the default approach.</Callout>
        </section>

        {/* ── Chapter 12: PEFT in 20 lines ── */}
        <section id="ft12" style={{paddingTop:"2rem"}}>
          <ChH num="12" title="PEFT — LoRA in 20 Lines" sub="What the code actually looks like" color="var(--work-color)"/>

          <P>The <Code>peft</Code> library from Hugging Face wraps LoRA into a clean API. Adding LoRA to any Hugging Face model is genuinely about 20 lines.</P>

          <CB>{`from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training
import torch

MODEL_ID = "meta-llama/Llama-3.2-3B-Instruct"

# 1. Quantization config — load the base model in 4-bit
bnb_config = BitsAndBytesConfig(
    load_in_4bit=True,
    bnb_4bit_compute_dtype=torch.float16,
    bnb_4bit_quant_type="nf4",          # the QLoRA paper's recommended scheme
)

# 2. Load model + tokenizer
tokenizer = AutoTokenizer.from_pretrained(MODEL_ID)
model = AutoModelForCausalLM.from_pretrained(
    MODEL_ID,
    quantization_config=bnb_config,
    device_map="auto",
)

# 3. Prepare for training (handles fp32 layer norms, gradient checkpointing, etc.)
model = prepare_model_for_kbit_training(model)

# 4. Configure LoRA
lora_config = LoraConfig(
    r=16,                                  # rank — how thin the trainable matrices are
    lora_alpha=32,                         # scaling factor (rule of thumb: 2 × r)
    target_modules=["q_proj", "v_proj"],   # which layers to attach LoRA to
    lora_dropout=0.05,
    bias="none",
    task_type="CAUSAL_LM",
)

# 5. Wrap the model
model = get_peft_model(model, lora_config)
model.print_trainable_parameters()
# → "trainable params: 6,815,744 || all params: 3,213,815,808 || trainable%: 0.21%"`}</CB>

          <P>That's it. The model is now ready for training — only the LoRA adapters will update. Six million trainable parameters out of three billion total — a 99.79% reduction in what needs to fit in memory as gradients and optimizer state.</P>

          <SubH>The training loop is unchanged</SubH>

          <P>Once you call <Code>get_peft_model</Code>, the result acts like any Hugging Face model. You can use the standard <Code>Trainer</Code> API, or write your own training loop. The framework handles which parameters need gradients automatically.</P>

          <CB>{`from transformers import Trainer, TrainingArguments

trainer = Trainer(
    model=model,
    tokenizer=tokenizer,
    train_dataset=train_data,
    eval_dataset=val_data,
    args=TrainingArguments(
        output_dir="./out",
        per_device_train_batch_size=4,
        num_train_epochs=3,
        learning_rate=2e-4,    # higher than full FT — LoRA prefers larger steps
        fp16=True,
        logging_steps=10,
        save_steps=200,
    ),
)
trainer.train()

# Save the adapter (small — maybe 50 MB)
model.save_pretrained("./my-lora-adapter")`}</CB>
          <NotebookDemoLink />
        </section>

        {/* ── Chapter 13: Loading open models ── */}
        <section id="ft13" style={{paddingTop:"2rem"}}>
          <ChH num="13" title="Loading Open-Source Models" sub="From the Hub to your GPU" color="var(--build-color)"/>

          <P>Before fine-tuning anything, you need to load and run a model. The Transformers library makes this remarkably uniform — the same three lines work across Llama, Mistral, Phi, Qwen, and Gemma.</P>

          <CB>{`from transformers import AutoModelForCausalLM, AutoTokenizer
import torch

# Pick a model — the Hub ID is the only thing that changes between families
MODEL_ID = "meta-llama/Llama-3.2-3B-Instruct"
# Could also be:
#   "mistralai/Mistral-7B-Instruct-v0.3"
#   "microsoft/Phi-3-mini-4k-instruct"
#   "Qwen/Qwen2.5-7B-Instruct"
#   "google/gemma-2-9b-it"

tokenizer = AutoTokenizer.from_pretrained(MODEL_ID)
model = AutoModelForCausalLM.from_pretrained(
    MODEL_ID,
    torch_dtype=torch.float16,   # half precision halves memory
    device_map="auto",            # put it on GPU if available
)

# Run inference
prompt = "Explain RAG in one sentence."
inputs = tokenizer(prompt, return_tensors="pt").to(model.device)
outputs = model.generate(**inputs, max_new_tokens=100, do_sample=False)
print(tokenizer.decode(outputs[0], skip_special_tokens=True))`}</CB>

huggingface-cli login
# Paste your access token from huggingface.co/settings/tokens`}</CB>

        {/* ── Chapter 14: Pipeline API ── */}
        <section id="ft14" style={{paddingTop:"2rem"}}>
          <ChH num="14" title="The Transformers Pipeline API" sub="Inference in three lines" color="var(--build-color)"/>

          <P>For inference-only use cases, Hugging Face's <Code>pipeline</Code> API hides almost all the boilerplate. It's the equivalent of OpenAI's client for open-source models.</P>

          <CB>{`from transformers import pipeline

# One line — auto-loads model, tokenizer, picks GPU, sets up generation config
pipe = pipeline(
    "text-generation",
    model="meta-llama/Llama-3.2-3B-Instruct",
    torch_dtype="float16",
    device_map="auto",
)

# Chat-style messages, just like OpenAI
messages = [
    {"role": "system", "content": "You are a helpful assistant."},
    {"role": "user", "content": "What's the capital of France?"},
]

result = pipe(messages, max_new_tokens=100, do_sample=False)
print(result[0]["generated_text"][-1]["content"])
# → "The capital of France is Paris."`}</CB>

            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.84rem"}}><Code>text-classification</Code> — sentiment, topic, intent</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.84rem"}}><Code>token-classification</Code> — named-entity recognition, POS tagging</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.84rem"}}><Code>summarization</Code>, <Code>translation</Code>, <Code>question-answering</Code></div>

          <Callout color="var(--build-color)" icon="🛠️">For production, you'll usually outgrow the pipeline API — you'll want explicit control over batching, streaming, and GPU memory. But for prototyping and quick benchmarks, <Code>pipeline()</Code> is unbeatable.</Callout>

        {/* ── Chapter 15: Model Cards ── */}
        <section id="ft15" style={{paddingTop:"2rem"}}>
          <ChH num="15" title="Reading Model Cards" sub="What to look for before you commit" color="var(--build-color)"/>

          <P>Every model on the Hub has a "card" — a markdown document on its model page. The good cards tell you everything you need to know in 60 seconds. The bad cards bury landmines. Knowing what to scan for matters.</P>

          <SubH>The five things to check, in order</SubH>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:10}}>
            {[
              {n:"1", t:"License", color:"#EF4444",
                why:"Apache 2.0 and MIT are the most permissive — use for almost anything. Llama's license restricts use by very large companies and some named use cases. Some research models have non-commercial licenses. Read this first — it's a deal-breaker if wrong."},
              {n:"2", t:"Intended use", color:"#F59E0B",
                why:"Is this a base model (raw next-token predictor, awkward to chat with) or an instruct model (chat-tuned)? Use instruct variants unless you're doing your own SFT from scratch. Look for '-Instruct' or '-it' (instruction-tuned) in the name."},
              {n:"3", t:"Training data summary", color:"#A78BFA",
                why:"Was it trained on web crawl, on code, on multilingual data, on a curated synthetic corpus? This tells you what the model is good at out of the box. Phi-3 is trained on curated 'textbook-quality' data; Llama is trained on broad web data. Different strengths."},
              {n:"4", t:"Benchmarks", color:"#10B981",
                why:"Most cards list MMLU, GSM8K, HumanEval scores. These are useful for sanity-checking — a 'small but mighty' model claiming to beat GPT-4 on MMLU is probably overstating things. Compare against the model's stated peers."},
              {n:"5", t:"Limitations & biases", color:"#1E6091",
                why:"Reputable cards list known failure modes — refusal behavior, language gaps, hallucination tendencies. If this section is empty or generic, the model has likely had less safety scrutiny than peers."},
            ].map(c=>(
              <div key={c.n} style={{padding:"12px 16px",background:"white",borderRadius:10,border:"1px solid "+c.color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <div style={{width:28,height:28,borderRadius:7,background:c.color+"22",color:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:"0.85rem"}}>{c.n}</div>
                  <span style={{fontWeight:700,fontSize:"0.95rem"}}>{c.t}</span>
                </div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.7}}>{c.why}</div>
              </div>
            ))}
          </div>

          <Callout color="var(--build-color)" icon="📋"><S>Red flag:</S> a model card with no license listed, no training data description, and no benchmarks. That's an unreviewed dump — possibly fine, possibly broken, possibly not what it claims to be. Stick to models from labs with reputation (Meta, Mistral, Microsoft, Google, Alibaba, Qwen) unless you have time to evaluate carefully.</Callout>
        </section>

        {/* ── Chapter 16: Capstone ── */}
        <section id="ft16" style={{paddingTop:"2rem"}}>
          <ChH num="16" title="Capstone — Fine-Tune Llama 3.2 with LoRA" sub="Customer-support ticket classifier" color="var(--purple)"/>

          <P>Everything in this section comes together now. You'll fine-tune Llama 3.2 3B on a customer-support classification task using QLoRA, then evaluate it against the prompt-engineered baseline from Section 2.</P>

          <SubH>The setup</SubH>

          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"var(--purple-bg)",borderRadius:10,border:"1px solid var(--purple-border)"}}>
            <div style={{fontWeight:700,fontSize:"0.9rem",color:"var(--purple)",marginBottom:8}}>What we're building</div>
            <div style={{fontSize:"0.86rem",color:"var(--text)",lineHeight:1.7}}>A model that takes a customer-support ticket and outputs one of five categories: <S>Hardware, Software, Network, Account, Billing</S>. The fine-tuned version should match or beat a prompt-engineered baseline at a fraction of the cost.</div>
          </div>

          <SubH>The dataset</SubH>

          <CB>{`# tickets.jsonl — 200 examples, ~40 per class, hand-labeled
# Each line:
{"ticket": "Excel crashes when I open large files", "category": "Software"}
{"ticket": "WiFi disconnects every 10 minutes", "category": "Network"}
{"ticket": "Wrong charge appeared on my statement", "category": "Billing"}
# ... 197 more

# Split into train / validation / test (60/20/20)
import json, random
data = [json.loads(l) for l in open("tickets.jsonl")]
random.seed(42)
random.shuffle(data)
n = len(data)
train_data = data[:int(0.6*n)]
val_data   = data[int(0.6*n):int(0.8*n)]
test_data  = data[int(0.8*n):]`}</CB>

          <SubH>Format for training</SubH>

          <CB>{`SYSTEM = "Classify the support ticket. Respond with exactly one of: Hardware, Software, Network, Account, Billing."

def format_example(row):
    return tokenizer.apply_chat_template([
        {"role": "system", "content": SYSTEM},
        {"role": "user", "content": row["ticket"]},
        {"role": "assistant", "content": row["category"]},
    ], tokenize=False)

train_texts = [format_example(r) for r in train_data]`}</CB>

          <SubH>Setup the model with LoRA (chapter 12 recap)</SubH>

          <CB>{`from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
from peft import LoraConfig, get_peft_model, prepare_model_for_kbit_training
import torch

MODEL_ID = "meta-llama/Llama-3.2-3B-Instruct"

bnb_config = BitsAndBytesConfig(
    load_in_4bit=True,
    bnb_4bit_compute_dtype=torch.float16,
    bnb_4bit_quant_type="nf4",
)
tokenizer = AutoTokenizer.from_pretrained(MODEL_ID)
tokenizer.pad_token = tokenizer.eos_token
model = AutoModelForCausalLM.from_pretrained(MODEL_ID, quantization_config=bnb_config, device_map="auto")
model = prepare_model_for_kbit_training(model)

model = get_peft_model(model, LoraConfig(
    r=16, lora_alpha=32, target_modules=["q_proj","v_proj"],
    lora_dropout=0.05, task_type="CAUSAL_LM",
))
model.print_trainable_parameters()`}</CB>

          <SubH>Train it</SubH>

          <CB>{`from transformers import Trainer, TrainingArguments
from datasets import Dataset

train_ds = Dataset.from_dict({"text": train_texts})
train_ds = train_ds.map(lambda x: tokenizer(x["text"], truncation=True, padding="max_length", max_length=256), batched=True)

trainer = Trainer(
    model=model,
    train_dataset=train_ds,
    tokenizer=tokenizer,
    args=TrainingArguments(
        output_dir="./out",
        per_device_train_batch_size=4,
        gradient_accumulation_steps=2,
        num_train_epochs=3,
        learning_rate=2e-4,
        fp16=True,
        logging_steps=10,
        save_strategy="epoch",
    ),
)
trainer.train()
model.save_pretrained("./llama32-tickets-lora")`}</CB>

          <SubH>What to expect</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"7px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}>Training time: <S>~15–25 minutes on a free Colab T4 GPU</S> for 200 examples × 3 epochs</div>
            <div style={{padding:"7px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}>Memory: <S>~7–9 GB</S> — fits comfortably in any 16 GB GPU</div>
            <div style={{padding:"7px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}>Output: <S>a ~50 MB adapter file</S> — not a 6 GB model checkpoint</div>
          </div>

        {/* ── Chapter 17: Bake-Off ── */}
        <section id="ft17" style={{paddingTop:"2rem"}}>
          <ChH num="17" title="The Bake-Off — Prompt vs Fine-Tune" sub="Same task, measured fairly" color="var(--purple)"/>

          <P>The capstone isn't done until you've measured. Let's compare the fine-tuned model against a well-engineered prompt baseline on the same held-out 40 test tickets.</P>

          <BakeOffDemo />

          <SubH>How to read the results</SubH>

          <P>The numbers above are representative of what you'll actually see on a task like this. A few patterns worth noticing:</P>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--purple)">Accuracy is similar.</S> A good prompt with few-shot examples on a strong model is genuinely hard to beat. Fine-tuning usually adds 1–4 percentage points on narrow tasks.</div>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--purple)",fontSize:"0.86rem"}}><S color="var(--purple)">Cost is where fine-tuning wins.</S> The prompt approach sends 400+ tokens every call (system + few-shot examples + ticket). The fine-tuned model only needs the ticket. At 100k calls/day, that's tens of dollars saved daily.</div>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--purple)">Latency improves meaningfully.</S> Shorter prompts mean fewer tokens to process. 3× speedup is common.</div>
          </div>

          <SubH>The verdict</SubH>

          <P>If volume is low, the prompt-engineered baseline is the right answer — simpler, no training step, easy to update. If volume is high, fine-tuning starts paying for itself within weeks. The exact break-even depends on your traffic — chapter 19 has the math.</P>
          <NotebookDemoLink />
        </section>


        {/* ── Chapter 18: Deployment ── */}
        <section id="ft18" style={{paddingTop:"2rem"}}>
          <ChH num="18" title="Deployment Options" sub="Once you have a fine-tuned model, where do you run it?" color="var(--orange)"/>

          <P>Fine-tuning an open-source model leaves you with a question: how do you actually serve it in production? Three common paths, very different tradeoffs.</P>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:10}}>
            {[
              {icon:"☁️", name:"Managed inference APIs", color:"#60A5FA",
                examples:"Together AI, Fireworks, Replicate, Anyscale",
                pros:["No infrastructure work","Pay per token, like OpenAI","Most have one-click deployment for popular LoRAs"],
                cons:["Limited model selection","Cold starts on smaller deployments","Still sending data to a third party"],
                bestFor:"Most teams — fastest path to production"},
              {icon:"⚡", name:"Self-hosted with vLLM", color:"#A78BFA",
                examples:"vLLM, TGI (Text Generation Inference), SGLang",
                pros:["Full control over latency and batching","Best $/token at scale","Data stays in your VPC"],
                cons:["Requires GPU infrastructure","Operational overhead","Need to handle scaling, monitoring, updates"],
                bestFor:"Teams with platform engineering and scale to justify it"},
              {icon:"🏠", name:"On-device / edge", color:"#10B981",
                examples:"Ollama, llama.cpp, MLX (Apple), ONNX Runtime",
                pros:["Zero per-call cost","Complete data privacy","Works offline"],
                cons:["Only small models (≤8B) are practical","Quality lower than cloud","Distribution and updates are hard"],
                bestFor:"Privacy-critical apps, mobile, latency-bound use cases"},
            ].map(d=>(
              <div key={d.name} style={{padding:"12px 16px",background:"white",borderRadius:10,border:"1px solid "+d.color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <span style={{fontSize:"1.4rem"}}>{d.icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:"0.95rem",color:d.color}}>{d.name}</div>
                    <div style={{color:"var(--text-muted)",fontSize:"0.76rem"}}>{d.examples}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,margin:"6px 0",fontSize:"0.8rem"}}>
                  <div>
                    <div style={{color:"#10B981",fontWeight:700,fontSize:"0.72rem",marginBottom:3}}>✓ PROS</div>
                    {d.pros.map((p,i)=>(<div key={i} style={{color:"var(--text-secondary)",padding:"2px 0"}}>• {p}</div>))}
                  </div>
                  <div>
                    <div style={{color:"#EF4444",fontWeight:700,fontSize:"0.72rem",marginBottom:3}}>✗ CONS</div>
                    {d.cons.map((c,i)=>(<div key={i} style={{color:"var(--text-secondary)",padding:"2px 0"}}>• {c}</div>))}
                  </div>
                </div>
                <div style={{padding:"6px 10px",background:d.color+"15",borderRadius:6,borderLeft:"3px solid "+d.color,fontSize:"0.82rem"}}>
