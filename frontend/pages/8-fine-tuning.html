                </div>
              </div>
            ))}
          </div>

          <Callout color="var(--orange)" icon="🚀">For most teams shipping their first fine-tuned model, <S>Together AI or Fireworks</S> is the right starting point. They accept your LoRA adapter, serve it via an OpenAI-compatible API, and bill per token. You can migrate to self-hosting later if economics demand.</Callout>
        </section>

        {/* ── Chapter 19: Cost Analysis ── */}
        <section id="ft19" style={{paddingTop:"2rem"}}>
          <ChH num="19" title="Cost Analysis — When Does Fine-Tuning Pay Off?" sub="The break-even math" color="var(--orange)"/>

          <P>Fine-tuning costs money upfront (training) and yields savings per call (smaller prompts). The math is simple — adjust the sliders below and see where the lines cross.</P>

          <CostCalcDemo />

          <SubH>The patterns that emerge</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--orange)">Below ~1k calls/day:</S> training cost dominates. Don't fine-tune unless quality or privacy demands it.</div>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--orange)">1k–10k calls/day:</S> break-even within weeks. Worth doing if accuracy improves meaningfully.</div>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--orange)">10k+ calls/day:</S> fine-tuning almost always wins on cost. Often by 5–15×.</div>
            <div style={{padding:"8px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S color="var(--orange)">100k+ calls/day:</S> consider open-source + self-hosting. Per-token costs drop another 5–10×.</div>
          </div>

          <Callout color="var(--orange)" icon="💰">Don't forget the hidden costs: <S>data labeling</S> (often the biggest line item), <S>evaluation infrastructure</S>, and <S>maintenance</S> when requirements drift. Budget for these explicitly before committing to fine-tuning.</Callout>
        </section>

        {/* ── Chapter 20: Maintenance ── */}
        <section id="ft20" style={{paddingTop:"2rem"}}>
          <ChH num="20" title="Maintenance & Drift" sub="What goes wrong over time" color="var(--orange)"/>

          <P>Shipping a fine-tuned model isn't the end — it's the start of a new operational responsibility. Three failure modes show up over months and years.</P>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:10}}>
            {[
              {n:"1", t:"Distribution drift", color:"#F59E0B", icon:"🌊",
                desc:"The data your model sees in production shifts away from your training data. New product categories appear, customer language evolves, edge cases multiply.",
                signal:"Accuracy on recent production traffic drops while accuracy on the original test set stays high.",
                fix:"Sample production logs monthly. Add the hard cases to your training set. Retrain quarterly."},
              {n:"2", t:"Label drift", color:"#F59E0B", icon:"🏷️",
                desc:"Your team changes how it labels things. 'Hardware' issues that used to include peripherals now exclude them. The model is now correct by yesterday's rules, wrong by today's.",
                signal:"Disagreement between model and human reviewers increases — but the model isn't getting worse, the ground truth is moving.",
                fix:"Re-label a sample of recent data quarterly. If labels have shifted, retrain. If they shift often, your taxonomy is too granular."},
              {n:"3", t:"Base model deprecation", color:"#F59E0B", icon:"🪦",
                desc:"For OpenAI fine-tunes: the underlying base model gets deprecated. For open-source: a newer, better base model is released, and your old fine-tune is now obsolete.",
                signal:"OpenAI emails you. Or you notice newer base models outperform your fine-tune even without retraining.",
                fix:"Rerun your fine-tuning recipe on the newer base. The same data, different starting point — usually 1-day turnaround."},
            ].map(d=>(
              <div key={d.n} style={{padding:"12px 16px",background:"white",borderRadius:10,border:"1px solid "+d.color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <span style={{fontSize:"1.4rem"}}>{d.icon}</span>
                  <span style={{fontWeight:700,fontSize:"0.95rem",color:d.color}}>{d.t}</span>
                </div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.84rem",marginBottom:6,lineHeight:1.7}}>{d.desc}</div>
                <div style={{color:"var(--text)",fontSize:"0.82rem",padding:"6px 10px",background:d.color+"12",borderRadius:6,borderLeft:"3px solid "+d.color,marginBottom:6}}><S color={d.color}>Signal: </S>{d.signal}</div>
                <div style={{color:"#15803D",fontSize:"0.82rem",padding:"6px 10px",background:"#F0FDF4",borderRadius:6,border:"1px solid #BBF7D0"}}><S color="#15803D">Fix: </S>{d.fix}</div>
              </div>
            ))}
          </div>

          <SubH>The maintenance loop</SubH>

          <P>A healthy production fine-tuning practice looks like:</P>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Daily:</S> log every prediction with confidence + input + timestamp.</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Weekly:</S> review a sample of low-confidence predictions and disagreements.</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Monthly:</S> rerun the test set; alert if accuracy drops &gt; 2%.</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}><S>Quarterly:</S> retrain with augmented data; redo the bake-off against the latest base models.</div>
          </div>

          <Callout color="var(--orange)" icon="🔄">Fine-tuning is a commitment, not a project. Budget time for ongoing evaluation and retraining — typically 10-20% of the original effort, indefinitely. Teams that skip this end up with a model that silently degrades for months before someone notices.</Callout>
        </section>

        {/* ── Chapter 21: Practice OpenAI FT ── */}
        <section id="ft21" style={{paddingTop:"2rem"}}>
          <ChH num="21" title="Practice — Fine-Tune GPT-4o-mini" sub="Classification challenge" color="var(--purple)"/>

          <P><S>Goal:</S> Fine-tune <Code>gpt-4o-mini</Code> on a real classification task of your choosing. Compare against a few-shot prompt baseline.</P>

          <SubH>Dataset ideas</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"8px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}><S>Customer review sentiment</S> with custom categories (e.g., 'shipping', 'quality', 'support', 'pricing')</div>
            <div style={{padding:"8px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}><S>Email priority classification</S> (urgent / soon / fyi / spam)</div>
            <div style={{padding:"8px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}><S>Code review tagging</S> (bug / style / question / approval)</div>
            <div style={{padding:"8px 12px",background:"var(--purple-bg)",borderRadius:6,fontSize:"0.86rem"}}><S>News headline classification</S> by topic</div>
          </div>

          <SubH>Requirements</SubH>

          <div style={{display:"flex",flexDirection:"column",gap:6,margin:"0.85rem 0 1.25rem"}}>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}>✓ Minimum 150 labeled training examples, balanced across classes</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}>✓ Separate 30-example test set, never seen during training</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}>✓ Few-shot prompt baseline (8 examples in the prompt) measured on the same test set</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}>✓ Compare: accuracy, cost per call, latency</div>
            <div style={{padding:"7px 12px",background:"white",borderRadius:6,border:"1px solid var(--border)",fontSize:"0.86rem"}}>✓ One paragraph: would you ship the fine-tune? Why or why not?</div>
          </div>

          <Callout color="var(--purple)" icon="📝">The honest answer might be <S>"no, the prompt baseline is fine"</S>. That's a perfectly valid result — and arguably the most useful one. The skill is making the call with data.</Callout>
        </section>

        {/* ── Chapter 22: Decision Framework ── */}
        <section id="ft22" style={{paddingTop:"2rem"}}>
          <ChH num="22" title="Practice — Your Own Decision Framework" sub="Write the guide you wish existed" color="var(--purple)"/>

          <P><S>Goal:</S> Write a 1–2 page decision framework that someone on your team could use to decide whether to fine-tune. Include real examples from your work.</P>

          <SubH>What to include</SubH>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {t:"A flowchart or decision tree", d:"Visual representation of the questions someone should ask, in order. Yours can build on (or improve) the one earlier in this section."},
              {t:"Three real scenarios from your work", d:"For each, walk through the decision tree. Show what tool you'd recommend and why. At least one should end in 'don't fine-tune'."},
              {t:"Cost thresholds for your context", d:"What's the call volume at which fine-tuning makes economic sense for your team? Use real numbers from your stack."},
              {t:"Your taxonomy of common mistakes", d:"What are the ways your team or domain typically misuses fine-tuning? E.g., 'we keep trying to teach it our product specs — it's RAG, not FT'."},
              {t:"An evaluation playbook", d:"How will you know if a fine-tune actually helped? What's your test set, your baselines, your kill criteria?"},
            ].map((p,i)=>(
              <div key={i} style={{padding:"10px 14px",background:"white",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontWeight:700,fontSize:"0.92rem",marginBottom:4}}>{p.t}</div>
                <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",lineHeight:1.6}}>{p.d}</div>
              </div>
            ))}
          </div>

          <Callout color="var(--purple)" icon="📄"><S>Why this exercise matters:</S> Six months from now, you'll forget half of this section. Future-you will benefit enormously from a personal decision framework written in your own words, with your own examples. This is the real deliverable.</Callout>
        </section>

        {/* ── Cheat Sheet ── */}
        <section id="ft-cheat" style={{paddingTop:"2rem"}}>
          <div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}}>
            <div style={{display:"inline-block",padding:"3px 12px",background:"var(--accent-light)",borderRadius:5,marginBottom:10,border:"1px solid var(--work-border)"}}>
              <span style={{color:"var(--accent)",fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>REFERENCE</span>
            </div>
            <h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>Cheat Sheet</h3>

          </div>

          <SubH>Decision flow</SubH>

          <div style={{margin:"1rem 0",display:"flex",flexDirection:"column",gap:8}}>
            {[
              {q:"Need facts the model doesn't have?", a:"RAG — never fine-tuning", color:"#1E6091"},
              {q:"Need a specific output format or tone?", a:"Few-shot prompting first; fine-tune if volume justifies", color:"#1A6B4E"},
              {q:"High-volume narrow classification (1k+/day)?", a:"Fine-tuning — likely big wins on cost", color:"#6D28D9"},
              {q:"Brand voice, house style?", a:"Fine-tuning, with 200+ examples", color:"#6D28D9"},
              {q:"Need better reasoning?", a:"Bigger base model, not fine-tuning", color:"#B45309"},
              {q:"Have under 50 labeled examples?", a:"Few-shot prompting", color:"#1A6B4E"},

              {q:"Requirements still changing weekly?", a:"Stay in prompting — fine-tune later", color:"#1A6B4E"},
              {q:"Hosting an 8B model yourself?", a:"vLLM or Together AI", color:"#C2410C"},
            ].map((r,i)=>(

          <SubH>Open-source model picker</SubH>

          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              ["General-purpose default", "Llama 3.1 8B Instruct"],
              ["Edge / mobile / on-device", "Phi-3 mini (3.8B)"],
              ["Multilingual / non-English", "Qwen 2.5 7B"],
              ["European / GDPR", "Mistral 7B"],

                <span style={{color:"var(--purple)",fontFamily:"'JetBrains Mono'",fontWeight:600}}>{model}</span>
              </div>

          </div>

          <SubH>Fine-tuning hyperparameter starting points</SubH>

          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              ["LoRA rank (r)", "8 or 16 — start with 8, bump to 16 if quality plateaus"],
              ["LoRA alpha", "2 × r (so 16 or 32) — controls the strength of the adapter"],
              ["Target modules", "q_proj, v_proj — the bare minimum. Add k_proj, o_proj for harder tasks"],
              ["Learning rate", "2e-4 (LoRA tolerates higher LRs than full FT)"],
              ["Epochs", "3 — start here, monitor validation loss for overfitting"],
              ["Batch size", "4-8 on a single GPU, with gradient accumulation if needed"],
              ["Dataset size", "Minimum ~150 examples; 500-2000 is the sweet spot"],
            ].map(([k,v],i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12,padding:"6px 0",borderBottom:i<6?"1px solid var(--border-light)":"none",fontSize:"0.86rem"}}>
                <span style={{color:"var(--purple)",fontWeight:600,fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>{k}</span>
                <span style={{color:"var(--text-secondary)"}}>{v}</span>
              </div>
            ))}
          </div>

          <SubH>Production checklist</SubH>

          <div style={{margin:"1rem 0",padding:"1rem 1.25rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
            {[
              "Prompt-engineered baseline measured on test set",
              "Fine-tuned model beats baseline by a clear margin (not 1-2%)",
              "Out-of-distribution test cases evaluated",
              "Cost per call measured at expected production volume",
              "Latency measured under realistic load",
              "Held-out test set frozen — never used for training",
              "Logging in place: input + prediction + confidence + timestamp",
              "Drift detection: monthly accuracy check vs. baseline",
              "Retraining cadence agreed (quarterly is typical)",
              "Decision framework documented for future similar projects",
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:i<9?"1px solid var(--border-light)":"none",fontSize:"0.86rem"}}>

          </div>

          <Callout color="var(--accent)" icon="🎓"><S>Section 8 complete.</S> You can now make informed decisions about fine-tuning — when it's the right tool, when it isn't, and how to actually do it end-to-end with both managed and open-source approaches. The next section moves into evaluation and observability — how to know whether any of this is actually working.</Callout>
        </section>

      </div></div>
    </div>
  );
