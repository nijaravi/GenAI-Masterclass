<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG — Retrieval Augmented Generation (Part 1) — GenAI Decoded by Nij</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--sidebar-bg:#FFFFFF;--card-bg:#FFFFFF;--border:#E8E5E0;--border-light:#F0EDE8;--text:#2D2B28;--text-secondary:#6B6560;--text-muted:#9C9690;--accent:#1A6B4E;--accent-light:#E8F5EE;--accent-hover:#15573F;--build-color:#B45309;--build-bg:#FEF3C7;--build-border:#FCD34D;--work-color:#1A6B4E;--work-bg:#E8F5EE;--work-border:#6EE7B7;--info-color:#1E6091;--info-bg:#EFF6FF;--info-border:#93C5FD;--purple:#6D28D9;--purple-bg:#F3F0FF;--orange:#C2410C;--orange-bg:#FFF7ED;--red:#B91C1C;--red-bg:#FEF2F2;--demo-bg:#1A1D27;--demo-border:#2E3240;--demo-text:#E2E8F0;--sidebar-w:260px;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.7;}::selection{background:#1A6B4E33;}pre{white-space:pre-wrap;word-wrap:break-word;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;z-index:50;padding:0.75rem 0;scrollbar-width:thin;}.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px;}
.sidebar-logo{padding:0 1rem 0.85rem;border-bottom:1px solid var(--border);margin-bottom:0.5rem;}.sidebar-logo h2{font-family:'Libre Baskerville',serif;font-size:0.92rem;color:var(--text);line-height:1.35;}.sidebar-logo p{font-size:0.72rem;color:var(--accent);font-weight:600;margin-top:2px;}
.sidebar-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--text-muted);padding:8px 9px 2px;margin-top:4px;}
.sidebar-item{display:block;padding:5px 9px;border-radius:7px;text-decoration:none;font-size:0.8rem;color:var(--text-secondary);transition:all 0.15s;cursor:pointer;margin-bottom:1px;border:1px solid transparent;}.sidebar-item:hover{background:var(--bg);color:var(--text);}.sidebar-item.active{background:var(--accent-light);color:var(--accent);font-weight:600;border-color:#6EE7B733;}
.sidebar-item .num{display:inline-block;width:20px;height:20px;border-radius:5px;text-align:center;line-height:20px;font-size:0.66rem;font-weight:700;margin-right:7px;}.sidebar-item .sub{font-size:0.66rem;color:var(--text-muted);display:block;}
.main{margin-left:var(--sidebar-w);min-height:100vh;}.content{max-width:760px;margin:0 auto;padding:2rem 2.5rem 4rem;}
@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}.content{padding:1.5rem 1rem 3rem;}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useId}=React;

// ── HELPERS ──
function P({children}){return <p style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8,margin:"0.85rem 0"}}>{children}</p>;}
function S({children,color="var(--text)"}){return <strong style={{color,fontWeight:700}}>{children}</strong>;}
function CB({children}){return <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:10,padding:"1.1rem 1.3rem",margin:"1rem 0",fontSize:"0.82rem",lineHeight:1.7,fontFamily:"'JetBrains Mono',monospace",color:"#E2E8F0",overflowX:"auto"}}>{children}</pre>;}
function Callout({children,color="var(--accent)",icon="💡"}){
  const bgC=color==="var(--build-color)"?"var(--build-bg)":color==="var(--info-color)"?"var(--info-bg)":color==="var(--purple)"?"var(--purple-bg)":color==="var(--red)"?"var(--red-bg)":color==="var(--orange)"?"var(--orange-bg)":"var(--accent-light)";
  return(<div style={{background:bgC,borderRadius:10,padding:"1rem 1.25rem",margin:"1.25rem 0",display:"flex",gap:10,alignItems:"flex-start",border:"1px solid "+color+"22"}}><span style={{fontSize:"1.1rem",flexShrink:0}}>{icon}</span><div style={{color:"var(--text)",fontSize:"0.92rem",lineHeight:1.7}}>{children}</div></div>);
}
function ChH({num,title,sub,color="var(--accent)"}){return(<div style={{marginBottom:"1.5rem",paddingTop:"0.5rem"}} id={"ch"+num}><div style={{display:"inline-block",padding:"3px 12px",background:color+"15",borderRadius:5,marginBottom:10,border:"1px solid "+color+"25"}}><span style={{color,fontSize:"0.75rem",fontWeight:700,letterSpacing:1}}>CHAPTER {num}</span></div><h3 style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.65rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>{title}</h3><div style={{color:"var(--text-muted)",fontSize:"0.95rem"}}>{sub}</div></div>);}
function SH({children}){return <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>{children}</div>;}
function NotebookDemoLink(){
  return(
    <div style={{marginTop:"2rem",paddingTop:"1.25rem",borderTop:"1px solid var(--border-light)"}}>
      <div
        role="note"
        style={{
          display:"inline-flex",
          alignItems:"center",
          gap:10,
          padding:"8px 20px",
          borderRadius:9999,
          background:"#FFF8F0",
          border:"1px solid #E8C9A8",
          color:"#7C2D12",
          fontWeight:700,
          fontSize:"0.88rem",
          fontFamily:"'DM Sans',sans-serif",
          boxShadow:"0 1px 2px rgba(124,45,18,0.08)",
          cursor:"default",
          userSelect:"none",
        }}
      >
        <span style={{fontSize:"1.1rem",lineHeight:1}} aria-hidden>📓</span>
        Hands-on in live notebook demo
      </div>
    </div>
  );
}

// ── INTERACTIVE: RAG Pipeline Demo ──
function RAGPipelineDemo(){
  const[step,setStep]=useState(0);
  const steps=[
    {num:0,title:"User asks a question",icon:"❓",color:"#60A5FA",desc:"The user types: 'What is the TechStore return policy for electronics?'",detail:"This question can't be answered from the LLM's training data — it's company-specific, private information."},
    {num:1,title:"Query gets embedded",icon:"🔢",color:"#A78BFA",desc:"The question is converted into a vector (array of numbers) using an embedding model.",detail:"Same embedding model used for the documents. The query vector now lives in the same mathematical space as all document vectors."},
    {num:2,title:"Vector search (retrieval)",icon:"🔍",color:"#FBBF24",desc:"The query vector is compared against all document chunk vectors. Top-K most similar chunks are returned.",detail:"Cosine similarity or dot product measures how 'close' the query is to each chunk. Closest chunks = most relevant content."},
    {num:3,title:"Context assembly",icon:"📋",color:"#F97316",desc:"Retrieved chunks are assembled into a prompt alongside the original question.",detail:"The prompt tells the LLM: 'Answer this question using ONLY the following context. If the answer isn't in the context, say so.'"},
    {num:4,title:"LLM generates answer",icon:"🤖",color:"#10B981",desc:"The LLM reads the context + question and generates a grounded answer.",detail:"Because the answer is based on retrieved documents (not training data), it's accurate, up-to-date, and verifiable."},
  ];
  const s=steps[step];
  return(
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#10B981",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>The RAG Pipeline — Step by Step</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Click each step to see what happens.</div>
      {/* Pipeline steps */}
      <div style={{display:"flex",gap:0,marginBottom:"1.25rem",flexWrap:"wrap"}}>
        {steps.map((st,i)=>(
          <React.Fragment key={i}>
            <button onClick={()=>setStep(i)} style={{padding:"8px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.78rem",fontWeight:600,background:step===i?st.color:"#252833",color:step===i?"#111":"#94A3B8",transition:"all 0.2s"}}>{st.icon} {st.title}</button>
            {i<steps.length-1&&<span style={{color:"#4B5563",alignSelf:"center",margin:"0 2px"}}>→</span>}
          </React.Fragment>
        ))}
      </div>
      {/* Detail */}
      <div style={{background:"#12141C",borderRadius:10,padding:"1.25rem",border:"1px solid "+s.color+"33"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:"1.5rem"}}>{s.icon}</span>
          <span style={{color:s.color,fontWeight:700,fontSize:"1rem"}}>{s.title}</span>
        </div>
        <div style={{color:"#E2E8F0",fontSize:"0.92rem",lineHeight:1.7,marginBottom:8}}>{s.desc}</div>
        <div style={{color:"#94A3B8",fontSize:"0.82rem",lineHeight:1.6,padding:"8px 12px",background:"#1A1D2788",borderRadius:6}}>{s.detail}</div>
      </div>
    </div>
  );
}

// ── INTERACTIVE: Embedding Search Demo ──
function EmbeddingSearchDemo(){
  const[query,setQuery]=useState(0);
  const queries=[
    {text:"Can I return a laptop after 20 days?",matches:[
      {chunk:"Electronics have a shorter return window of 15 days and must include original packaging.",score:0.92,relevant:true},
      {chunk:"Standard items can be returned within 30 days of purchase with original receipt.",score:0.78,relevant:false},
      {chunk:"Holiday purchases between Nov 15 and Dec 31 have extended return until Jan 31.",score:0.45,relevant:false},
    ]},
    {text:"What if my package arrived broken?",matches:[
      {chunk:"Damaged items must be reported within 48 hours of delivery. Include photos of damage.",score:0.95,relevant:true},
      {chunk:"Standard items can be returned within 30 days of purchase with original receipt.",score:0.38,relevant:false},
      {chunk:"Gift cards are non-refundable under any circumstances.",score:0.12,relevant:false},
    ]},
    {text:"Are gift cards refundable?",matches:[
      {chunk:"Gift cards are non-refundable under any circumstances.",score:0.97,relevant:true},
      {chunk:"Software products are non-refundable once activated.",score:0.72,relevant:false},
      {chunk:"Damaged items must be reported within 48 hours of delivery.",score:0.15,relevant:false},
    ]},
  ];
  const q=queries[query];
  return(
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#FBBF24",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Similarity Search in Action</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Click a query to see which chunks match and their similarity scores.</div>
      <div style={{display:"flex",gap:6,marginBottom:"1rem",flexWrap:"wrap"}}>
        {queries.map((qr,i)=>(
          <button key={i} onClick={()=>setQuery(i)} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.78rem",fontWeight:600,background:query===i?"#FBBF24":"#252833",color:query===i?"#111":"#94A3B8"}}>{qr.text}</button>
        ))}
      </div>
      {/* Query */}
      <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",border:"1px solid #60A5FA33",marginBottom:10}}>
        <div style={{color:"#60A5FA",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:4}}>QUERY (embedded as vector)</div>
        <div style={{color:"#E2E8F0",fontSize:"0.92rem"}}>{q.text}</div>
      </div>
      {/* Results */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {q.matches.map((m,i)=>(
          <div key={i} style={{background:"#12141C",borderRadius:8,padding:"0.75rem 1rem",border:"1px solid "+(m.relevant?"#10B98133":"#2E3240"),display:"flex",gap:12,alignItems:"center"}}>
            <div style={{textAlign:"center",flexShrink:0,width:55}}>
              <div style={{color:m.score>0.8?"#10B981":m.score>0.5?"#FBBF24":"#6B7280",fontFamily:"'JetBrains Mono'",fontSize:"1rem",fontWeight:700}}>{m.score.toFixed(2)}</div>
              <div style={{fontSize:"0.6rem",color:"#6B7280"}}>similarity</div>
            </div>
            <div style={{height:8,width:4,borderRadius:2,background:m.relevant?"#10B981":"#2E3240",flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{color:m.relevant?"#E2E8F0":"#6B7280",fontSize:"0.82rem",lineHeight:1.5}}>{m.chunk}</div>
              {m.relevant&&<div style={{color:"#10B981",fontSize:"0.68rem",marginTop:3,fontWeight:600}}>✓ Most relevant — this chunk answers the question</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── INTERACTIVE: Similarity metrics (2D vectors) ──
function vecDot(a,b){return a[0]*b[0]+a[1]*b[1];}
function vecLen(v){return Math.hypot(v[0],v[1]);}
function cosineSim2D(a,b){
  const la=vecLen(a),lb=vecLen(b);
  if(la<1e-9||lb<1e-9)return 0;
  const c=vecDot(a,b)/(la*lb);
  return Math.max(-1,Math.min(1,c));
}
function euclid2D(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1]);}

const SIM_PRESETS=[
  {id:0,label:"Same topic, different length",a:[2,2],b:[5,5],note:"Cosine = 1.0 (perfect match). Both point the same way — like our short vs long Hadoop chunks. Euclidean says 4.24 (far apart) — the wrong answer for text search."},
  {id:1,label:"Similar topics",a:[3,4],b:[4,3],note:"High cosine — these vectors are about related topics. Like 'Hadoop architecture' vs 'Hadoop cluster setup'."},
  {id:2,label:"Unrelated topics",a:[4,0],b:[0,4],note:"Cosine = 0. These vectors share nothing in common. Like 'Hadoop' vs 'cooking recipes' — completely unrelated."},
  {id:3,label:"Opposite meanings",a:[3,4],b:[-3,-4],note:"Cosine = −1. Opposite direction. Rarely happens with text embeddings, but conceptually: 'happy' vs 'miserable'."},
  {id:4,label:"Same length, different topic",a:[4,1],b:[1,4],note:"Same length vectors but different directions. Euclidean = 4.24 (same as Preset 1!). But cosine correctly shows 0.47 — only partially related. Euclidean can't tell 'same topic, different length' from 'different topic, same length'."},
];

function SimilarityMetricsDemo(){
  const uid=useId().replace(/:/g,"");
  const[preset,setPreset]=useState(0);
  const p=SIM_PRESETS[preset];
  const a=p.a,b=p.b;
  const dot=vecDot(a,b);
  const cos=cosineSim2D(a,b);
  const euc=euclid2D(a,b);
  const cx=140,cy=140,scale=16,rArc=44;
  const toPx=(v)=>[cx+v[0]*scale,cy-v[1]*scale];
  const [ax,ay]=toPx(a),[bx,by]=toPx(b);
  const la=vecLen(a),lb=vecLen(b);
  const angleA=Math.atan2(-a[1],a[0]);
  const angleB=Math.atan2(-b[1],b[0]);
  let delta=angleB-angleA;
  while(delta>Math.PI)delta-=2*Math.PI;
  while(delta<-Math.PI)delta+=2*Math.PI;
  const largeArc=Math.abs(delta)>Math.PI?1:0;
  const sweep=delta>0?1:0;
  const axArc=cx+rArc*Math.cos(angleA),ayArc=cy+rArc*Math.sin(angleA);
  const bxArc=cx+rArc*Math.cos(angleB),byArc=cy+rArc*Math.sin(angleB);
  const arcSpan=Math.hypot(axArc-bxArc,ayArc-byArc);
  const showArc=arcSpan>4;
  const deg=(Math.acos(Math.max(-1,Math.min(1,cos)))*180/Math.PI).toFixed(1);
  const cosColor=cos>0.65?"#10B981":cos>-0.25?"#FBBF24":"#F87171";
  const dotNorm=Math.min(1,Math.max(0,(dot+35)/80));
  const dotColor=dot>12?"#10B981":dot>-5?"#FBBF24":"#F87171";
  const eucClose=1/(1+euc*0.22);
  const eucColor=euc<3?"#10B981":euc<7?"#FBBF24":"#F87171";
  return(
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.5rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#A78BFA",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.12rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Similarity Metrics in 2D</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1rem"}}>Drag isn&apos;t needed — use the presets. Watch all three metrics update together (2D stands in for high-dimensional embeddings).</div>
      <div style={{display:"flex",gap:8,marginBottom:"1rem",flexWrap:"wrap"}}>
        {SIM_PRESETS.map((pr)=>(
          <button key={pr.id} type="button" onClick={()=>setPreset(pr.id)} style={{padding:"7px 12px",borderRadius:7,border:"none",cursor:"pointer",fontSize:"0.72rem",fontWeight:600,background:preset===pr.id?"#A78BFA":"#252833",color:preset===pr.id?"#111":"#94A3B8",transition:"all 0.15s"}}>{pr.label}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"stretch"}}>
        <div style={{flex:"1 1 300px",minWidth:260}}>
          <svg width="100%" height="280" viewBox="0 0 280 280" style={{display:"block",maxWidth:320}} aria-label="Two vectors on a coordinate grid">
            <rect x="0" y="0" width="280" height="280" fill="#12141C" rx="10"/>
            {[...Array(11)].map((_,i)=>{
              const v=-1+i;
              const x=cx+v*scale;
              const y=cy-v*scale;
              return(
                <React.Fragment key={"g"+i}>
                  <line x1={x} y1={20} x2={x} y2={260} stroke="#2E3240" strokeWidth={v===0?1.2:0.5}/>
                  <line x1={20} y1={y} x2={260} y2={y} stroke="#2E3240" strokeWidth={v===0?1.2:0.5}/>
                </React.Fragment>
              );
            })}
            <text x={cx+4} y={22} fill="#64748B" fontSize="10" fontFamily="'JetBrains Mono',monospace">y</text>
            <text x={252} y={cy-6} fill="#64748B" fontSize="10" fontFamily="'JetBrains Mono',monospace">x</text>
            <defs>
              <marker id={uid+"-mb"} markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#60A5FA"/></marker>
              <marker id={uid+"-mo"} markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
            </defs>
            {showArc&&<path d={`M ${axArc} ${ayArc} A ${rArc} ${rArc} 0 ${largeArc} ${sweep} ${bxArc} ${byArc}`} fill="none" stroke="#475569" strokeWidth="1.5" strokeDasharray="4 3" opacity="0.85"/>}
            <text x={showArc?(axArc+bxArc)/2+8:cx+52} y={showArc?(ayArc+byArc)/2-6:cy-88} fill="#94A3B8" fontSize="10" fontFamily="'DM Sans',sans-serif">∠ {deg}°</text>
            <line x1={cx} y1={cy} x2={ax} y2={ay} stroke="#60A5FA" strokeWidth="2.5" markerEnd={"url(#"+uid+"-mb)"}/>
            <line x1={cx} y1={cy} x2={bx} y2={by} stroke="#F97316" strokeWidth="2.5" markerEnd={"url(#"+uid+"-mo)"}/>
            <text x={ax+(ax>cx?8:-52)} y={ay+(ay<cy?-6:16)} fill="#60A5FA" fontSize="11" fontFamily="'JetBrains Mono',monospace">A [{a[0]}, {a[1]}]</text>
            <text x={bx+(bx>cx?8:-52)} y={by+(by<cy?-6:16)} fill="#F97316" fontSize="11" fontFamily="'JetBrains Mono',monospace">B [{b[0]}, {b[1]}]</text>
          </svg>
        </div>
        <div style={{flex:"0 1 240px",minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",border:"1px solid #2E3240"}}>
            <div style={{color:"#94A3B8",fontSize:"0.65rem",fontWeight:700,marginBottom:4}}>COSINE SIMILARITY</div>
            <div style={{color:cosColor,fontFamily:"'JetBrains Mono',monospace",fontSize:"1.35rem",fontWeight:700}}>{cos.toFixed(3)}</div>
            <div style={{height:6,borderRadius:3,background:"#2E3240",marginTop:6,overflow:"hidden"}}><div style={{width:(cos+1)/2*100+"%",height:"100%",background:cosColor,borderRadius:3}}/></div>
            <div style={{color:"#64748B",fontSize:"0.7rem",marginTop:4}}>−1 opposite … 1 identical direction</div>
          </div>
          <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",border:"1px solid #2E3240"}}>
            <div style={{color:"#94A3B8",fontSize:"0.65rem",fontWeight:700,marginBottom:4}}>DOT PRODUCT</div>
            <div style={{color:dotColor,fontFamily:"'JetBrains Mono',monospace",fontSize:"1.35rem",fontWeight:700}}>{dot.toFixed(2)}</div>
            <div style={{height:6,borderRadius:3,background:"#2E3240",marginTop:6,overflow:"hidden"}}><div style={{width:dotNorm*100+"%",height:"100%",background:dotColor,borderRadius:3}}/></div>
            <div style={{color:"#64748B",fontSize:"0.7rem",marginTop:4}}>Angle × lengths (unbounded)</div>
          </div>
          <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",border:"1px solid #2E3240"}}>
            <div style={{color:"#94A3B8",fontSize:"0.65rem",fontWeight:700,marginBottom:4}}>EUCLIDEAN DISTANCE</div>
            <div style={{color:eucColor,fontFamily:"'JetBrains Mono',monospace",fontSize:"1.35rem",fontWeight:700}}>{euc.toFixed(2)}</div>
            <div style={{height:6,borderRadius:3,background:"#2E3240",marginTop:6,overflow:"hidden"}}><div style={{width:eucClose*100+"%",height:"100%",background:eucColor,borderRadius:3}}/></div>

{/* ── CH 1: Why RAG ── */}
<section id="ch1" style={{paddingTop:"2rem"}}>
  <ChH num="1" title="Why RAG Exists" sub="The three problems LLMs can't solve alone" color="var(--info-color)"/>

  <P>You already know LLMs generate text one token at a time from patterns learned during training. But this creates three problems no amount of prompting can fix:</P>

  <div style={{display:"flex",flexDirection:"column",gap:10,margin:"1rem 0"}}>
    {[
      {problem:"Hallucination",desc:"Ask 'What is TechStore's return policy?' and the model invents a plausible-sounding but completely fake answer. It has no way to say 'I don't know' by default — it always generates something.",icon:"🎭",color:"var(--red)"},
      {problem:"Knowledge Cutoff",desc:"The model's training data has a fixed end date. It can't answer about events, products, or changes after that date. 'What were our Q3 2025 results?' — the model simply doesn't have this information.",icon:"📅",color:"var(--orange)"},
      {problem:"No Access to Private Data",desc:"Your company's internal docs, policies, customer data, code repos — none of this was in the training data. The model can't answer questions about YOUR specific business.",icon:"🔒",color:"var(--purple)"},
    ].map((p,i)=>(
      <div key={i} style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid "+p.color+"33",borderLeft:"4px solid "+p.color,display:"flex",gap:12,alignItems:"flex-start"}}>
        <span style={{fontSize:"1.3rem",flexShrink:0}}>{p.icon}</span>
        <div><div style={{fontWeight:700,fontSize:"0.95rem",color:p.color,marginBottom:2}}>{p.problem}</div><div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>{p.desc}</div></div>
      </div>
    ))}
  </div>

  <Callout color="var(--info-color)" icon="🔑"><S>RAG solves all three</S> by retrieving relevant documents at query time and injecting them into the prompt. The LLM doesn't need to "know" the answer — it reads the answer from your documents and generates a response based on that context.</Callout>

  <P>You already practiced the core technique in Prompt Engineering Chapter 13 (Grounding with Reference Text). RAG automates the process: instead of you manually pasting context into the prompt, a <S>retrieval system</S> finds the right documents automatically.</P>

  <P>RAG has two phases: an <S color="var(--build-color)">offline phase</S> (process documents once, store them) and an <S color="var(--info-color)">online phase</S> (user asks, system retrieves, LLM answers).</P>

  <P>RAG isn't the only way to give an LLM new knowledge. Here's when to use each approach:</P>

  <Callout icon="🔑"><S>The 80/20 rule:</S> Prompt engineering handles 70% of use cases. RAG handles the next 25%. Fine-tuning handles the remaining 5%. Start with prompting, add RAG when you need external knowledge, fine-tune only when you need to change the model's behavior.</Callout>

{/* ── CH 4: Reading & Parsing Documents ── */}
<section id="ch4" style={{paddingTop:"2rem"}}>
  <ChH num="4" title="Reading & Parsing Documents" sub="Getting raw text out of different file formats" color="var(--build-color)"/>

  <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.12rem",color:"var(--text)",fontWeight:700,margin:"0.35rem 0 0.65rem"}}>The Goal: Get Your Documents Into a Vector Database</div>
  <P>Before we start processing documents, let&apos;s understand where they&apos;re going. The end goal of everything in this section (loading, chunking, embedding) is to get your documents into a <S>vector database</S> — a special database that lets you search by meaning, not just keywords.</P>

  <div style={{background:"white",borderRadius:10,padding:"1rem 1.15rem",border:"1px solid var(--border)",margin:"1rem 0"}}>
    <div style={{fontWeight:700,fontSize:"1rem",marginBottom:10,color:"var(--text)"}}>What is a Vector Database?</div>
    <p style={{margin:"0 0 0.85rem",fontSize:"0.95rem",color:"var(--text)",lineHeight:1.75}}>A regular database stores rows and columns — you search with exact queries like <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem",background:"var(--bg)",padding:"2px 6px",borderRadius:4}}>WHERE name = &apos;John&apos;</span>. A vector database stores numbers that represent meaning — you search with questions like <S>&quot;find documents similar to this question.&quot;</S></p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:"0.86rem"}}>
      <div style={{background:"var(--bg)",borderRadius:8,padding:"0.75rem 0.85rem",border:"1px solid var(--border-light)"}}>

  <P>Before chunking and embedding, you need to actually <S>read</S> your documents. This sounds trivial but it's where many RAG projects struggle — different formats need different parsers.</P>

{/* ── CH 5: Chunking ── */}
<section id="ch5" style={{paddingTop:"2rem"}}>
  <ChH num="5" title="Chunking Strategies" sub="How you split documents changes what you retrieve" color="var(--build-color)"/>

  <P>After reading a document into Python, you need to split it into smaller pieces. Why? Because embedding models have token limits (~8K tokens), and you want each chunk to be about <S>one coherent topic</S> so retrieval is precise.</P>

  <P>The way you chunk <S color="var(--red)">directly affects retrieval quality</S>. Bad chunking means irrelevant chunks and bad answers. Naive fixed-size splitting is the usual beginner mistake; production RAG uses LangChain&apos;s recursive splitter.</P>

  <SH>The Naive Approach: Fixed-Size Chunking</SH>

  <P>Splitting every <S>N</S> characters is easy to code — and easy to get wrong. A rigid window does not care about sentences or paragraphs:</P>

  <CB>{`Chunk 1: "...return window of 15 days and must include"
Chunk 2: "original packaging. Software products are..."`}</CB>

  <Callout color="var(--red)" icon="✂️"><S>The sentence &ldquo;must include original packaging&rdquo; got split across two chunks.</S> If the LLM retrieves Chunk 1, it gets an incomplete fact.</Callout>

  <SH>The Production Approach: LangChain RecursiveCharacterTextSplitter</SH>

  <P>This is what production RAG systems use. It tries to split at the best boundary available, in this order:</P>

  <div style={{display:"flex",flexDirection:"column",gap:8,margin:"1rem 0",padding:"1rem 1.15rem",background:"white",borderRadius:10,border:"1px solid var(--border)"}}>
    {[
      {sep:"\\n\\n",label:"paragraph boundaries (best)",n:1},
      {sep:"\\n",label:"line breaks",n:2},
      {sep:". ",label:"sentence endings",n:3},
      {sep:" ",label:"word boundaries (last resort)",n:4},
    ].map((row)=>(
      <div key={row.n} style={{display:"flex",gap:12,alignItems:"baseline",fontSize:"0.88rem"}}>
        <span style={{color:"var(--build-color)",fontWeight:700,fontFamily:"'JetBrains Mono'",fontSize:"0.8rem",width:22,flexShrink:0}}>{row.n}.</span>
        <div><span style={{fontFamily:"'JetBrains Mono'",fontSize:"0.82rem",color:"var(--text)"}}>&ldquo;{row.sep}&rdquo;</span> <span style={{color:"var(--text-secondary)"}}>— {row.label}</span></div>
      </div>
    ))}
  </div>

  <P>It always finds the nearest clean boundary. No mid-sentence cuts.</P>

  <CB>{`from langchain.text_splitter import RecursiveCharacterTextSplitter

splitter = RecursiveCharacterTextSplitter(
    chunk_size=500,
    chunk_overlap=50,
    separators=["\\n\\n", "\\n", ". ", " ", ""],
)

chunks = splitter.split_text(document_text)`}</CB>

  <Callout color="var(--accent)" icon="✓"><S>3 lines of code.</S> Handles every edge case. This is what every production RAG system uses — don&apos;t write your own chunker.</Callout>

  <SH>Chunk Overlap — Why It Matters</SH>

  <P>When you split text, important context can be lost at the boundary. <S>Overlap</S> means each chunk shares some text with the next — like reading with your finger keeping your place:</P>

  <CB>{`Without overlap:
  Chunk 1: "...return window of 15 days and must include"
  Chunk 2: "original packaging. Software products are..."
  
  ← "15 days and must include original packaging" is SPLIT
     across two chunks. Neither chunk has the full sentence.

With 50-char overlap:
  Chunk 1: "...return window of 15 days and must include original packaging."
  Chunk 2: "must include original packaging. Software products are..."
  
  ← Both chunks have "must include original packaging"
     The full sentence is preserved in at least one chunk.`}</CB>

  <Callout color="var(--build-color)" icon="🎯"><S>Practical defaults:</S> <span style={{fontFamily:"'JetBrains Mono'",fontSize:"0.86rem"}}>chunk_size=500</span>, <span style={{fontFamily:"'JetBrains Mono'",fontSize:"0.86rem"}}>chunk_overlap=50</span>, using <span style={{fontFamily:"'JetBrains Mono'",fontSize:"0.86rem"}}>RecursiveCharacterTextSplitter</span>. Works well for most documents. Adjust <span style={{fontFamily:"'JetBrains Mono'",fontSize:"0.86rem"}}>chunk_size</span> for your embedding model&apos;s token limit and your retrieval needs.</Callout>
  <NotebookDemoLink/>
</section>

{/* ── CH 6: Embeddings for Search ── */}
<section id="ch6" style={{paddingTop:"2rem"}}>
  <ChH num="6" title="Embeddings for Search" sub="How text becomes searchable vectors" color="var(--purple)"/>

  <P>You learned about embeddings in Section 1 — vectors that capture meaning. In RAG, we use embeddings for <S color="var(--purple)">search</S>: convert both the document chunks AND the user's query into vectors, then find the closest matches.</P>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>How Embedding-Based Search Works</div>
    <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.8rem",lineHeight:1.9,color:"#94A3B8"}}>
      <div>1. <span style={{color:"#60A5FA"}}>Document chunk</span> → embedding model → <span style={{color:"#60A5FA"}}>[0.12, -0.45, 0.78, ...]</span> (stored once)</div>
      <div>2. <span style={{color:"#FBBF24"}}>User query</span>    → embedding model → <span style={{color:"#FBBF24"}}>[0.15, -0.42, 0.81, ...]</span> (computed at query time)</div>
      <div>3. <span style={{color:"#10B981"}}>Similarity</span>    → cosine(query_vec, chunk_vec) → <span style={{color:"#10B981"}}>0.94</span> (high = relevant)</div>
    </div>
  </div>

  <P><S>The key insight:</S> "Can I return a laptop after 20 days?" and "Electronics have a 15-day return window" use completely different words — but their embedding vectors are close because they're about the <S>same concept</S>. This is why embedding search beats keyword search.</P>

  <SH>Common Embedding Models</SH>

  <div style={{background:"white",borderRadius:10,padding:"1rem",border:"1px solid var(--border)",margin:"1rem 0"}}>
    {[
      {model:"text-embedding-3-small",provider:"OpenAI",dims:1536,cost:"$0.02/1M tokens",notes:"Good balance of quality and cost. Default choice.",color:"#10B981"},
      {model:"text-embedding-3-large",provider:"OpenAI",dims:3072,cost:"$0.13/1M tokens",notes:"Higher quality, higher cost. Use for critical applications.",color:"#60A5FA"},
      {model:"all-MiniLM-L6-v2",provider:"Open-source",dims:384,cost:"Free (run locally)",notes:"Runs on your machine. Good enough for prototyping.",color:"#A78BFA"},
    ].map((m,i)=>(
      <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:i<2?"1px solid var(--border-light)":"none"}}>
        <span style={{color:m.color,fontWeight:700,fontSize:"0.82rem",fontFamily:"'JetBrains Mono'",width:210,flexShrink:0}}>{m.model}</span>
        <div><div style={{fontSize:"0.82rem"}}>{m.notes}</div><div style={{color:"var(--text-muted)",fontSize:"0.72rem"}}>{m.dims} dimensions • {m.cost}</div></div>
      </div>
    ))}
  </div>

  <Callout icon="⚠️"><S>Critical rule:</S> You must use the <S>same embedding model</S> for documents AND queries. If you embed documents with text-embedding-3-small, you must embed queries with text-embedding-3-small. Mixing models produces meaningless similarity scores.</Callout>
  <NotebookDemoLink/>
</section>


{/* ── CH 7: Vector Databases (conceptual) ── */}
<section id="ch7" style={{paddingTop:"2rem"}}>
  <ChH num="7" title="Vector Databases" sub="What they are and how they work" color="var(--purple)"/>

  <P>A vector database is a specialized database built for <S>storing vectors and finding the closest matches quickly</S>. Regular databases search by exact match ("WHERE id = 5"). Vector databases search by similarity ("find the 5 vectors closest to this one").</P>

  <SH>Why Not Just a Regular Database?</SH>

  <P>You could store embeddings in PostgreSQL as arrays and compute cosine similarity with SQL. For 1,000 documents, that works. For 1,000,000 documents, it's unacceptably slow — you'd be comparing the query vector against every single stored vector.</P>

  <P>Vector databases use <S>approximate nearest neighbor (ANN)</S> algorithms that build indexes for fast search — finding the top 10 closest vectors out of millions in milliseconds.</P>

  <SH>Similarity Metrics</SH>

  <P>When you search a vector database, it needs to measure how &ldquo;close&rdquo; your query vector is to each stored vector. There are three common ways to do that — and the difference matters.</P>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1.15rem 1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#94A3B8",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:8}}>SAME TOPIC, DIFFERENT LENGTH</div>
    <CB>{`Consider two chunks about the same topic (Hadoop):

Short: "Hadoop is a distributed framework."
Long:  "Hadoop is an open-source distributed computing framework designed
        for processing and storing large datasets across clusters of
        commodity hardware using MapReduce."

Both are about Hadoop. Both point in the same "direction" in vector space.
But the longer text produces a vector with larger magnitude (longer arrow).`}</CB>
  </div>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#94A3B8",fontSize:"0.68rem",fontWeight:700,letterSpacing:1,marginBottom:6}}>SAME DIRECTION, DIFFERENT LENGTH (SCHEMATIC)</div>
    <svg width="100%" height="140" viewBox="0 0 280 140" style={{display:"block",maxWidth:320}} aria-hidden>
      <rect width="280" height="140" fill="#12141C" rx="8"/>
      <text x="14" y="24" fill="#64748B" fontSize="10" fontFamily="'DM Sans',sans-serif">Angle ≈ 0° — tips far apart</text>
      <defs>
        <marker id="hadoopShort" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#60A5FA"/></marker>
        <marker id="hadoopLong" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#F97316"/></marker>
      </defs>
      <line x1="40" y1="100" x2="95" y2="55" stroke="#60A5FA" strokeWidth="2.5" markerEnd="url(#hadoopShort)"/>
      <line x1="40" y1="100" x2="210" y2="30" stroke="#F97316" strokeWidth="2.5" markerEnd="url(#hadoopLong)"/>
      <text x="98" y="52" fill="#60A5FA" fontSize="10" fontWeight="600">short chunk</text>
      <text x="168" y="28" fill="#F97316" fontSize="10" fontWeight="600">long chunk</text>
      <circle cx="40" cy="100" r="3" fill="#94A3B8"/>
      <text x="32" y="118" fill="#64748B" fontSize="9">origin</text>
    </svg>
  </div>

  <P><S color="var(--purple)">Cosine similarity</S> — measures the <S>angle</S> between two vectors. Both chunks point in the &ldquo;Hadoop direction&rdquo; → the angle is tiny → cosine is high (≈0.95 in real embeddings). Cosine doesn&apos;t care that one arrow is longer. <S>Same topic = high score.</S> This is what you want for RAG.</P>

  <P><S color="var(--purple)">Dot product</S> — multiplies <S>direction and length</S> together. The long chunk gets a much higher score than the short one, even though both are about Hadoop. That means dot product <S>prefers longer, more detailed content</S> — sometimes useful, but not when a short, precise chunk is just as valuable for retrieval.</P>

  <P><S color="var(--purple)">Euclidean distance</S> — measures the straight-line <S>gap between the arrow tips</S>. Even when both arrows point the same way, the tips are far apart because one vector is longer. Euclidean treats that as &ldquo;different&rdquo; — which is the wrong signal for text search. It&apos;s more common for <S>images</S>, where literal distance in the embedding space often matters more.</P>

  <div style={{background:"white",borderRadius:10,padding:"1rem 1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0",overflowX:"auto"}}>
    <div style={{fontWeight:700,fontSize:"0.95rem",color:"var(--text)",marginBottom:10}}>When to use which</div>
    <div style={{display:"grid",gridTemplateColumns:"minmax(100px,1fr) minmax(110px,1fr) minmax(100px,1fr) minmax(88px,0.9fr)",gap:0,fontSize:"0.78rem"}}>
      <div style={{padding:"8px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>Metric</div>
      <div style={{padding:"8px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>Measures</div>
      <div style={{padding:"8px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>Best for</div>
      <div style={{padding:"8px",fontWeight:700,borderBottom:"2px solid var(--border)",background:"var(--bg)"}}>For RAG?</div>
      {[
        ["Cosine similarity","Angle between vectors","Text search — same topic matches regardless of chunk length","✅ Yes — default"],
        ["Dot product","Angle × length","When you want to prefer longer, richer content","⚠️ Sometimes"],
        ["Euclidean distance","Gap between vector tips","Image / audio similarity","❌ Rarely for text"],
      ].map(([m,meas,best,rag],i)=>(
        <React.Fragment key={i}>
          <div style={{padding:"8px",fontWeight:600,borderBottom:"1px solid var(--border-light)",color:"var(--purple)"}}>{m}</div>
          <div style={{padding:"8px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{meas}</div>
          <div style={{padding:"8px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)"}}>{best}</div>
          <div style={{padding:"8px",color:"var(--text-secondary)",borderBottom:"1px solid var(--border-light)",fontWeight:600}}>{rag}</div>
        </React.Fragment>
      ))}
    </div>
  </div>

  <Callout color="var(--accent)" icon="🎯"><S>For RAG, use cosine similarity.</S> It answers &ldquo;are these about the same topic?&rdquo; without being fooled by text length. It&apos;s the default in ChromaDB and in most major vector databases for text.</Callout>

  <SimilarityMetricsDemo/>

  <div style={{background:"var(--bg)",borderRadius:8,padding:"0.65rem 1rem",border:"1px solid var(--border-light)",margin:"0.75rem 0 1rem"}}>
    <span style={{fontSize:"0.72rem",fontWeight:700,color:"var(--text-muted)",letterSpacing:0.6}}>QUICK REFERENCE — RANGES</span>
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:"var(--text-secondary)",marginTop:6,lineHeight:1.6}}>
      <strong style={{color:"var(--text)"}}>Cosine:</strong> −1 to 1 (1 = identical direction) &nbsp;·&nbsp; <strong style={{color:"var(--text)"}}>Dot product:</strong> −∞ to +∞ &nbsp;·&nbsp; <strong style={{color:"var(--text)"}}>Euclidean:</strong> 0 to ∞ (0 = identical tips)
    </div>
  </div>

  <details style={{margin:"1.25rem 0",borderRadius:10,border:"1px solid var(--border)",background:"var(--bg)",padding:"0.5rem 1rem 1rem"}}>
    <summary style={{cursor:"pointer",fontWeight:600,color:"var(--text-secondary)",fontSize:"0.92rem",padding:"0.35rem 0"}}>How the math works (click to expand)</summary>
    <CB>{`Cosine Similarity:
  dot(A, B) / (length(A) × length(B))
  → measures the ANGLE between vectors
  → ignores how long the vectors are
  → range: -1 (opposite) to 1 (identical direction)

Dot Product:
  A[0]×B[0] + A[1]×B[1] + ... + A[n]×B[n]
  → measures both angle AND length
  → longer vectors get higher scores (when aligned)
  → range: -∞ to +∞

Euclidean Distance:
  sqrt( (A[0]-B[0])² + (A[1]-B[1])² + ... )
  → straight-line distance between vector tips
  → lower = closer (opposite intuition vs cosine!)
  → range: 0 (identical) to ∞`}</CB>
  </details>

  <SH>How Vector Search Stays Fast (HNSW)</SH>

  <P>At millions of chunks, comparing your query against <S>every</S> stored vector is too slow. Production vector databases use graph-based ANN indexes. A common choice is <S>HNSW</S> (Hierarchical Navigable Small World): similar vectors are linked so search can &ldquo;hop&rdquo; toward neighbors instead of scanning the full set.</P>

  <P><strong>The airport analogy:</strong> To fly from Dubai to a small town in Norway, you don&apos;t evaluate every airport. You route through hubs (Dubai → London → Oslo → …). HNSW builds a similar network in embedding space — start near a hub, hop to nearby vectors, and zoom in on the closest matches in milliseconds instead of seconds.</P>

  <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
    {[
      {t:"Brute force",d:"Compare the query against every stored vector — accurate but slow (seconds at large scale).",c:"#EF4444"},
      {t:"HNSW index",d:"Navigate the graph; check a small subset — fast (milliseconds). Top results are almost always what you need for RAG.",c:"#10B981"},
      {t:"Trade-off",d:"HNSW is approximate: it might rarely miss the single closest vector but still returns excellent top-K lists. For RAG, that is usually ideal.",c:"#FBBF24"},
    ].map((x,i)=>(
      <div key={i} style={{flex:"1 1 200px",background:"white",borderRadius:10,padding:"1rem",border:"1px solid "+x.c+"33",borderLeft:"4px solid "+x.c}}>
        <div style={{color:x.c,fontWeight:700,fontSize:"0.88rem",marginBottom:6}}>{x.t}</div>
        <div style={{color:"var(--text-secondary)",fontSize:"0.85rem",lineHeight:1.6}}>{x.d}</div>
      </div>
    ))}
  </div>

  <P>Now that you understand the concepts, let&apos;s get hands-on with <S>ChromaDB</S> — a lightweight vector database perfect for learning. The same ideas transfer to Pinecone, Weaviate, pgvector, and the rest.</P>

  <NotebookDemoLink/>
</section>

{/* ── CH 8: ChromaDB Deep Dive ── */}
<section id="ch8" style={{paddingTop:"2rem"}}>
  <ChH num="8" title="ChromaDB Deep Dive" sub="Hands-on with a real vector database" color="var(--purple)"/>

  <Callout color="var(--purple)" icon="🎯"><S>For this course:</S> We use <S>ChromaDB</S> — it&apos;s free, runs locally, and needs no server setup. Perfect for learning; Part 2 compares production options.</Callout>

  <P>Retrieval is the <S>make-or-break step</S> in RAG. We&apos;ll go deep on ChromaDB because the concepts transfer to every vector database. Once you understand collections, CRUD, and queries here — Pinecone, Weaviate, and pgvector all work the same way with different syntax.</P>

  <SH>Architecture Overview</SH>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#94A3B8",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>ChromaDB Architecture</div>
    <pre style={{color:"#E2E8F0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",lineHeight:1.85,margin:0,whiteSpace:"pre-wrap"}}>{`Client (your Python code)
    │
    ▼
Collection ("techstore_docs")
    │
    ├── Documents (the original chunk text)
    ├── Embeddings (vectors — one per document)
    ├── Metadata (source file, chunk index, date, etc.)
    └── IDs (unique identifier per entry)`}</pre>
  </div>

  <P>A <S>collection</S> is like a table in a regular database. It holds your documents, their embeddings, and any metadata you attach. You can have multiple collections — one for HR docs, one for product docs, one for support tickets.</P>

  <SH>Storage Modes</SH>

  <div style={{display:"flex",gap:14,flexWrap:"wrap",margin:"1rem 0"}}>
    <div style={{flex:1,minWidth:260}}>
      <div style={{fontWeight:700,fontSize:"0.95rem",color:"var(--text)",marginBottom:8}}>In-Memory (for development)</div>
      <CB>{`import chromadb
client = chromadb.Client()  # data lives in RAM, gone when script ends`}</CB>
      <p style={{color:"var(--text-secondary)",fontSize:"0.92rem",lineHeight:1.75,margin:"0.5rem 0 0"}}>Fast, zero setup. Use for prototyping and notebooks.</p>
    </div>
    <div style={{flex:1,minWidth:260}}>
      <div style={{fontWeight:700,fontSize:"0.95rem",color:"var(--text)",marginBottom:8}}>Persistent (for production)</div>
      <CB>{`import chromadb
client = chromadb.PersistentClient(path="./chroma_db")  # saved to disk`}</CB>
      <p style={{color:"var(--text-secondary)",fontSize:"0.92rem",lineHeight:1.75,margin:"0.5rem 0 0"}}>Data survives restarts. Use for applications. The path is just a folder on your machine.</p>
    </div>
  </div>

  <SH>Creating a Collection</SH>

  <CB>{`collection = client.create_collection(
    name="techstore_docs",
    metadata={"hnsw:space": "cosine"}  # similarity metric
)`}</CB>

  <ul style={{margin:"0.75rem 0 0",paddingLeft:20,color:"var(--text-secondary)",fontSize:"0.92rem",lineHeight:1.75}}>
    <li><S style={{color:"var(--text)"}}>name</S> — unique identifier, like a table name.</li>
    <li><S style={{color:"var(--text)"}}>metadata</S> — collection-level config. <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>hnsw:space</span> sets the similarity metric: <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>&quot;cosine&quot;</span>, <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>&quot;l2&quot;</span>, or <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>&quot;ip&quot;</span>. Cosine is the usual choice for text.</li>
  </ul>

  <P>You can also open or remove collections:</P>

  <CB>{`# Get existing collection (doesn't create new)
collection = client.get_collection("techstore_docs")

# Get or create (safe for re-runs)
collection = client.get_or_create_collection("techstore_docs")

# Delete
client.delete_collection("techstore_docs")`}</CB>

  <SH>Adding Data</SH>

  <P>The full <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>add</span> pattern ties IDs, text, vectors, and metadata together:</P>

  <CB>{`collection.add(
    ids=["doc1_chunk0", "doc1_chunk1", "doc2_chunk0"],     # unique IDs (required)
    documents=["chunk text here...", "more text...", "..."], # original text (optional but recommended)
    embeddings=[[0.12, -0.45, ...], [0.34, 0.56, ...], ...], # vectors (required)
    metadatas=[                                               # metadata (optional but very useful)
        {"source": "return_policy.txt", "chunk_index": 0, "category": "policy"},
        {"source": "return_policy.txt", "chunk_index": 1, "category": "policy"},
        {"source": "employee_handbook.txt", "chunk_index": 0, "category": "hr"},
    ]
)`}</CB>

  <ul style={{margin:"0.75rem 0 0",paddingLeft:20,color:"var(--text-secondary)",fontSize:"0.92rem",lineHeight:1.75}}>
    <li><S style={{color:"var(--text)"}}>ids</S> — required; must be unique. Use a naming convention like <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>{`{filename}_chunk_{index}`}</span>.</li>
    <li><S style={{color:"var(--text)"}}>documents</S> — the original text. Store it so search results include the passage without a separate lookup.</li>
    <li><S style={{color:"var(--text)"}}>embeddings</S> — vectors you computed with your embedding model before adding.</li>
    <li><S style={{color:"var(--text)"}}>metadatas</S> — key-value pairs per entry. Enables filtered search (e.g. only HR documents).</li>
  </ul>

  <Callout color="var(--accent)" icon="📌"><S>Always store the original text as <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.86rem"}}>documents</span>.</S> Without it, you&apos;d get matching IDs and scores but would need another store to recover what the text actually said.</Callout>

  <SH>Querying / Searching</SH>

  <CB>{`results = collection.query(
    query_embeddings=[query_vector],    # your question, embedded
    n_results=3,                         # how many results to return (Top-K)
    include=["documents", "metadatas", "distances"],  # what to return
)`}</CB>

  <P>ChromaDB returns a dict-shaped structure like this:</P>

  <CB>{`results = {
    "ids": [["doc1_chunk2", "doc2_chunk0", "doc1_chunk5"]],
    "documents": [["chunk text...", "more text...", "..."]],
    "metadatas": [[{"source": "return_policy.txt"}, ...]],
    "distances": [[0.12, 0.25, 0.38]],  # lower = more similar (for cosine)
}`}</CB>

  <P><S>Important:</S> ChromaDB returns <S>distances</S>, not similarities. For cosine space, <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>similarity ≈ 1 - distance</span>. So distance <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>0.12</span> means similarity about <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>0.88</span> — very relevant.</P>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#A78BFA",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Query → results</div>
    <pre style={{color:"#E2E8F0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.82,margin:0,whiteSpace:"pre-wrap"}}>{`Query: "Can I return a laptop?"
         │
    embed query → [0.15, -0.42, 0.81, ...]
         │
    compare against all stored vectors
         │
    return top 3 closest matches:

    [0.08] return_policy.txt  → "Electronics have a 15-day return window..."
    [0.21] return_policy.txt  → "Standard items may be returned within 30 days..."
    [0.45] product_catalog.txt → "ProMax 15 — $1,299. Our flagship laptop..."`}</pre>
  </div>

  <P>Try different queries below to see how similarity search ranks chunks:</P>

  <EmbeddingSearchDemo/>

  <SH>How Many Chunks to Retrieve? (Top-K)</SH>

  <P>In ChromaDB, <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.84rem"}}>n_results</span> is your K — the number of chunks to pull into the prompt. How many should you use?</P>

  <div style={{display:"flex",flexDirection:"column",gap:6,margin:"1rem 0"}}>
    {[
      {k:"K = 1–2",use:"Simple factual questions with clear answers",risk:"Might miss context spread across multiple chunks"},
      {k:"K = 3–5",use:"Most questions — good balance of relevance and context",risk:"Default starting point"},
      {k:"K = 8–10",use:"Complex questions requiring information from multiple sections",risk:"May include irrelevant chunks that dilute quality"},
      {k:"K = 15+",use:"Broad research queries, summarization",risk:"Risk exceeding context window, high token cost"},
    ].map((r,i)=>(
      <div key={i} style={{display:"flex",gap:10,alignItems:"baseline",padding:"6px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
        <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.85rem",fontFamily:"'JetBrains Mono'",width:65,flexShrink:0}}>{r.k}</span>
        <div><span style={{fontSize:"0.88rem"}}>{r.use}</span> <span style={{color:"var(--text-muted)",fontSize:"0.78rem"}}>— {r.risk}</span></div>
      </div>
    ))}
  </div>

  <SH>Filtered Search (Metadata Queries)</SH>

  <CB>{`# Only search within a specific document
results = collection.query(
    query_embeddings=[query_vector],
    n_results=3,
    where={"source": "employee_handbook.txt"}  # metadata filter
)

# Filter with conditions
results = collection.query(
    query_embeddings=[query_vector],
    n_results=3,
    where={"category": {"$eq": "policy"}}  # equals
)

# Multiple conditions
results = collection.query(
    query_embeddings=[query_vector],
    n_results=3,
    where={"$and": [
        {"source": "return_policy.txt"},
        {"chunk_index": {"$gte": 2}}      # chunk index >= 2
    ]}
)`}</CB>

  <P>Metadata filtering happens <S>before</S> vector search: ChromaDB narrows to rows that match your filter, then searches only within those. That is usually much faster than retrieving everything and filtering afterward.</P>

  <SH>MMR — Maximum Marginal Relevance</SH>

  <P>Problem with pure Top-K: if your top 5 chunks all say roughly the same thing (because they&apos;re from similar sections), you waste context window space on redundant information.</P>

  <P><S color="var(--purple)">MMR</S> balances <S>relevance</S> (similarity to the query) with <S>diversity</S> (difference from chunks already selected). It picks the first chunk by relevance, then each subsequent chunk must be both relevant and different from previous picks.</P>

  <SH>Context Window Management</SH>

  <P>Retrieved chunks must fit within the LLM&apos;s context window alongside the system prompt, user question, and expected response. A simple formula:</P>

  <CB>{`Available for context = context_window - system_prompt - user_query - expected_response

Example (gpt-4o-mini, 128K context):
  System prompt:     ~200 tokens
  User question:     ~50 tokens
  Expected response: ~500 tokens
  Available:         128,000 - 750 = ~127,250 tokens for retrieved chunks

  That's plenty. But with gpt-3.5-turbo (4K context):
  Available:         4,000 - 750 = ~3,250 tokens = only 3-4 chunks!`}</CB>

  <SH>Other Operations</SH>

  <CB>{`# Count entries
collection.count()  # → 42

# Get specific entries by ID
collection.get(ids=["doc1_chunk0", "doc1_chunk2"])

# Update an entry
collection.update(ids=["doc1_chunk0"], documents=["updated text..."])

# Delete entries
collection.delete(ids=["doc1_chunk0"])

# Delete by filter
collection.delete(where={"source": "old_document.txt"})`}</CB>

  <Callout color="var(--purple)" icon="🔗">Every vector database has the same concepts: collections, documents, embeddings, metadata, filtered search. The API differs but the mental model is identical. In Part 2, we&apos;ll compare production options.</Callout>
  <NotebookDemoLink/>
</section>

{/* ── CH 9: RAG Prompt ── */}
<section id="ch9" style={{paddingTop:"2rem"}}>
  <ChH num="9" title="Building the RAG Prompt" sub="Assembling context + question into an effective prompt" color="var(--accent)"/>

  <P>This is where RAG meets prompt engineering. You need to combine the retrieved chunks with the user's question in a way that <S>grounds</S> the LLM's response in the provided context.</P>

  <P>You already learned this technique in Prompt Engineering Chapter 13 (Grounding). Here it's applied with retrieved context instead of manually pasted text.</P>

  <RAGPromptDemo/>

  <SH>The RAG Prompt Template</SH>

  <CB>{`# The template every RAG system uses:

system_prompt = """You are a helpful assistant. Answer questions
using ONLY the provided context. If the answer is not in the
context, say "I don't have that information."
Do NOT use your general knowledge."""

user_prompt = f"""
Context (retrieved from knowledge base):
---
{retrieved_chunks_text}
---

Question: {user_question}
"""

# The grounding instruction ("ONLY the provided context") is critical.
# Without it, the LLM will mix retrieved context with its training data,
# and you can't tell which parts are from your documents vs hallucinated.`}</CB>

  <Callout icon="🔗"><S>Connection:</S> This is the same grounding pattern from Prompt Engineering Chapter 13 — but now the context is <S>automatically retrieved</S> from a vector database instead of manually pasted. The prompting technique is identical.</Callout>
  <NotebookDemoLink/>
</section>

{/* ── CH 10: Common Failures ── */}
<section id="ch10" style={{paddingTop:"2rem"}}>
  <ChH num="10" title="Common Failures" sub="What goes wrong in RAG and how to debug it" color="var(--accent)"/>

  <P>When a RAG system gives a bad answer, the problem is in one of <S>three places</S>. Knowing which one to fix saves hours of debugging:</P>

  <div style={{display:"flex",flexDirection:"column",gap:12,margin:"1rem 0"}}>
    {[
      {stage:"📄 Document Processing",problem:"Bad parsing or chunking",symptoms:["Answer is partially correct but missing key details","Important information was split across chunk boundaries","Tables or lists lost their structure during parsing"],fixes:["Inspect your parsed documents — are they clean?","Increase chunk overlap","Try recursive or semantic chunking instead of fixed-size","Check PDF parsing output for mangled tables"],color:"var(--build-color)"},
      {stage:"🔍 Retrieval",problem:"Wrong chunks retrieved",symptoms:["Retrieved chunks are topically related but don't contain the answer","The correct chunk exists but wasn't retrieved (it's in the DB but too far from the query)","Query uses different terminology than the documents"],fixes:["Try the query manually — what chunks come back?","Increase K (retrieve more chunks)","Try MMR for diversity","Consider query transformation (rewrite the query)"],color:"var(--purple)"},
      {stage:"🤖 Generation",problem:"LLM ignores or misinterprets context",symptoms:["The right chunks were retrieved but the answer is still wrong","The LLM mixed retrieved context with its own knowledge","The answer contradicts the provided context"],fixes:["Strengthen grounding instructions in the system prompt","Add 'If not in context, say I don't know'","Reduce temperature to 0 for factual responses","Use a more capable model (gpt-4o vs mini)"],color:"var(--accent)"},
    ].map((s,i)=>(
      <div key={i} style={{background:"white",borderRadius:12,border:"1px solid "+s.color+"33",overflow:"hidden"}}>
        <div style={{background:s.color+"10",padding:"0.85rem 1.1rem",borderBottom:"1px solid "+s.color+"22"}}>
          <span style={{fontWeight:700,fontSize:"0.95rem",color:s.color}}>{s.stage}</span>
          <span style={{color:"var(--text-secondary)",fontSize:"0.85rem",marginLeft:8}}>— {s.problem}</span>
        </div>
        <div style={{padding:"0.85rem 1.1rem",display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:220}}>
            <div style={{color:"var(--red)",fontWeight:700,fontSize:"0.75rem",letterSpacing:0.5,marginBottom:6}}>SYMPTOMS</div>
            {s.symptoms.map((sym,j)=>(<div key={j} style={{color:"var(--text-secondary)",fontSize:"0.82rem",padding:"2px 0"}}>• {sym}</div>))}
          </div>
          <div style={{flex:1,minWidth:220}}>
            <div style={{color:"#10B981",fontWeight:700,fontSize:"0.75rem",letterSpacing:0.5,marginBottom:6}}>FIXES</div>
            {s.fixes.map((fix,j)=>(<div key={j} style={{color:"var(--text-secondary)",fontSize:"0.82rem",padding:"2px 0"}}>✓ {fix}</div>))}
          </div>
        </div>
      </div>
    ))}
  </div>

  <Callout color="var(--accent)" icon="🔍"><S>The debugging workflow:</S> When a RAG system gives a bad answer — (1) Check what chunks were retrieved. If wrong chunks → retrieval problem. (2) If right chunks but wrong answer → generation problem. (3) If the right information isn't in any chunk → document processing problem. Always debug from retrieval first.</Callout>
  <NotebookDemoLink/>
</section>

{/* ── CH 11: Advanced Data Processing ── */}
<section id="ch11" style={{paddingTop:"2rem"}}>
  <ChH num="11" title="Advanced Data Processing" sub="Handling PDFs, images, tables, and scanned documents" color="var(--orange)"/>

  <P>In Chapter 4 we loaded plain text files with <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.86rem"}}>open().read()</span>. Real-world RAG systems deal with messier formats — PDFs with tables, scanned invoices, images with text, Word docs with formatting. Getting the text out cleanly is often the hardest part of the entire RAG pipeline.</P>

  <Callout color="var(--build-color)" icon="⚠️"><S>Garbage in, garbage out.</S> If your PDF parser mangles a table or misses a paragraph, no amount of embedding or prompting will fix it. Always inspect your parsed output before embedding.</Callout>

  <SH>PDFs — The Most Common and Most Painful</SH>

  <P>A PDF stores drawing instructions (&ldquo;put this character at position x,y&rdquo;), not structured text. The parser has to reconstruct words, sentences, and paragraphs from character positions. That&apos;s why PDF extraction is unreliable.</P>

  <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
    {[
      {title:"PyPDF2 / PyPDFLoader (Basic)",color:"#FBBF24",good:"Extracts text page by page",use:"Simple text-heavy PDFs (reports, articles)",bad:"Tables become garbled, multi-column layouts merge, headers/footers repeat",code:`from langchain_community.document_loaders import PyPDFLoader
pages = PyPDFLoader("report.pdf").load()`},
      {title:"pdfplumber (Better)",color:"#60A5FA",good:"Layout-aware; tables as separate lists",use:"PDFs with tables, forms, structured content",bad:"Still imperfect on very complex layouts",code:`import pdfplumber
with pdfplumber.open("report.pdf") as pdf:
    text = pdf.pages[0].extract_text()
    tables = pdf.pages[0].extract_tables()`},
      {title:"Unstructured / LlamaParse (Best)",color:"#10B981",good:"Detects structure — titles, paragraphs, tables, lists, images",use:"Complex documents, mixed content",bad:"Heavier setup / cost for hosted parsers",code:"from unstructured.partition.pdf import partition_pdf\nelements = partition_pdf(\"report.pdf\")\nfor el in elements:\n    print(f\"{el.category}: {el.text[:80]}\")"},
    ].map((c,i)=>(
      <div key={i} style={{flex:"1 1 240px",minWidth:220,background:"white",borderRadius:10,padding:"1rem 1.1rem",border:"1px solid "+c.color+"33",borderLeft:"4px solid "+c.color}}>
        <div style={{color:c.color,fontWeight:700,fontSize:"0.92rem",marginBottom:8}}>{c.title}</div>
        <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",marginBottom:6}}><S style={{color:"var(--text)"}}>Good for:</S> {c.good}</div>
        <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",marginBottom:6}}><S style={{color:"var(--text)"}}>Best when:</S> {c.use}</div>
        <div style={{color:"var(--text-secondary)",fontSize:"0.82rem",marginBottom:10}}><S style={{color:"var(--red)"}}>Watch out:</S> {c.bad}</div>
        <CB>{c.code}</CB>
      </div>
    ))}
  </div>

  <SH>Scanned Documents — When There&apos;s No Text to Extract</SH>

  <P>A scanned PDF is just an image wrapped in a PDF — there&apos;s no text layer. PyPDF2 returns empty strings. You need <S>OCR</S> (Optical Character Recognition) to turn pixels of text into actual characters.</P>

  <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
    <div style={{flex:1,minWidth:260,background:"white",borderRadius:10,padding:"1rem",border:"1px solid #10B98133",borderLeft:"4px solid #10B981"}}>
      <div style={{color:"#10B981",fontWeight:700,fontSize:"0.9rem",marginBottom:8}}>Tesseract OCR (free, local)</div>
      <ul style={{margin:0,paddingLeft:18,color:"var(--text-secondary)",fontSize:"0.86rem",lineHeight:1.65}}>
        <li>Open-source OCR engine</li>
        <li>Works well on clean scans; struggles with handwriting or poor quality</li>
      </ul>
      <CB>{`# pip install pytesseract Pillow
import pytesseract
from PIL import Image
text = pytesseract.image_to_string(Image.open("scanned_page.png"))`}</CB>
    </div>
    <div style={{flex:1,minWidth:260,background:"white",borderRadius:10,padding:"1rem",border:"1px solid #60A5FA33",borderLeft:"4px solid #60A5FA"}}>
      <div style={{color:"#60A5FA",fontWeight:700,fontSize:"0.9rem",marginBottom:8}}>Vision LLMs (better quality, costs money)</div>
      <ul style={{margin:0,paddingLeft:18,color:"var(--text-secondary)",fontSize:"0.86rem",lineHeight:1.65}}>
        <li>Send the image to GPT-4o or Claude and ask for structured text</li>
        <li>Handles messy layouts and handwriting better than classical OCR</li>
        <li>Use when OCR isn&apos;t good enough — watch token and image pricing</li>
      </ul>
      <CB>{`# Send image to GPT-4o for extraction
response = client.chat.completions.create(
    model="gpt-4o",
    messages=[{
        "role": "user",
        "content": [
            {"type": "image_url", "image_url": {"url": f"data:image/png;base64,{img_b64}"}},
            {"type": "text", "text": "Extract all text from this document image. Preserve structure."}
        ]
    }]
)`}</CB>
    </div>
  </div>

  <Callout color="var(--info-color)" icon="🔎"><S>How to tell if a PDF is scanned:</S> Open it and try to select text with your mouse. If you can highlight individual words → it has a text layer (use PyPDF2 / pdfplumber). If you only get a whole-page image selection → it&apos;s scanned (use OCR or a vision LLM).</Callout>

  <SH>Tables — The Biggest Data Loss in RAG</SH>

  <P>Tables are where many RAG pipelines <S>silently fail</S>. A plain text extractor turns a neat grid into a run-on line of cell values. The LLM can&apos;t reconstruct the grid in its head, so answers drift or hallucinate.</P>

  <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap",alignItems:"stretch"}}>
    <div style={{flex:1,minWidth:220,background:"white",borderRadius:10,padding:"1rem",border:"1px solid var(--border)"}}>
      <div style={{fontWeight:700,fontSize:"0.82rem",color:"var(--text)",marginBottom:8}}>What the PDF looks like</div>
      <pre style={{margin:0,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.72rem",lineHeight:1.55,color:"var(--text-secondary)",whiteSpace:"pre-wrap"}}>{`| Product      | Price  | Return Window |
|-------------|--------|---------------|
| ProMax 15   | $1,299 | 15 days       |
| CloudBook   | $699   | 15 days       |`}</pre>
    </div>
    <div style={{flex:1,minWidth:220,background:"var(--red-bg)",borderRadius:10,padding:"1rem",border:"1px solid var(--red)33",borderLeft:"4px solid var(--red)"}}>
      <div style={{fontWeight:700,fontSize:"0.82rem",color:"var(--red)",marginBottom:8}}>What PyPDF2 often extracts</div>
      <pre style={{margin:0,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.72rem",lineHeight:1.55,color:"var(--text-secondary)",whiteSpace:"pre-wrap"}}>{`Product Price Return Window ProMax 15 $1,299 15 days CloudBook $699 15 days`}</pre>
      <div style={{color:"var(--red)",fontSize:"0.78rem",marginTop:8,fontWeight:600}}>Structure gone. Searching for &ldquo;ProMax 15 price&rdquo; won&apos;t retrieve a clean fact.</div>
    </div>
  </div>

  <P><S>The fix — extract tables separately</S> and turn each row into a sentence the model can reason over:</P>

  <CB>{`import pdfplumber
with pdfplumber.open("catalog.pdf") as pdf:
    for page in pdf.pages:
        tables = page.extract_tables()
        for table in tables:
            headers = table[0]
            for row in table[1:]:
                entry = ", ".join(f"{h}: {v}" for h, v in zip(headers, row))
                # → "Product: ProMax 15, Price: $1,299, Return Window: 15 days"`}</CB>

  <Callout color="var(--accent)" icon="💡"><S>The trick:</S> Convert each table row into a readable sentence before embedding. <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem"}}>Product: ProMax 15, Price: $1,299, Return Window: 15 days</span> is something the LLM can use. A raw concatenated dump isn&apos;t.</Callout>

  <SH>Images Inside Documents</SH>

  <P>Some documents hide important facts in <S>images</S> — charts, diagrams, screenshots. Plain text extraction skips them entirely.</P>

  <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
    <div style={{flex:1,minWidth:240,background:"white",borderRadius:10,padding:"1rem",border:"1px solid var(--border)",borderLeft:"4px solid #60A5FA"}}>
      <div style={{fontWeight:700,color:"#60A5FA",marginBottom:6}}>Option 1: Describe with a vision LLM</div>
      <div style={{color:"var(--text-secondary)",fontSize:"0.86rem",lineHeight:1.65}}>Pull images out of the PDF, send each to GPT-4o (or similar), and store the returned description as its own chunk next to your text chunks. Strong for charts, diagrams, and screenshots with text.</div>
    </div>
    <div style={{flex:1,minWidth:240,background:"white",borderRadius:10,padding:"1rem",border:"1px solid var(--border)",borderLeft:"4px solid #94A3B8"}}>
      <div style={{fontWeight:700,color:"#64748B",marginBottom:6}}>Option 2: Ignore images (sometimes OK)</div>
      <div style={{color:"var(--text-secondary)",fontSize:"0.86rem",lineHeight:1.65}}>If images are decorative (logos, stock photos), skip them and index body text only. Fine when visuals are not the source of truth.</div>
    </div>
  </div>

  <SH>Choosing a Path — Document Type</SH>

  <div style={{background:"#1A1D27",borderRadius:10,padding:"1.15rem 1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
    <div style={{color:"#94A3B8",fontSize:"0.65rem",fontWeight:700,letterSpacing:1,marginBottom:8}}>DECISION TREE</div>
    <pre style={{color:"#E2E8F0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.75,margin:0,whiteSpace:"pre-wrap"}}>{`What type of document?
├── Plain text (.txt, .md, .csv) → open().read() — Chapter 4
├── PDF with selectable text → PyPDF2 or pdfplumber
│   └── Has tables? → pdfplumber + row-to-sentence conversion
├── Scanned PDF / image → OCR (Tesseract) or Vision LLM (GPT-4o)
├── Word (.docx) → python-docx
└── HTML → BeautifulSoup + strip boilerplate`}</pre>
  </div>

  <Callout color="var(--orange)" icon="📌"><S>Data processing is unglamorous but critical.</S> In production RAG, teams often spend more time parsing and cleaning documents than on embeddings or prompts. Models are the easy part — <S>getting clean text into the pipeline</S> is the hard part.</Callout>
