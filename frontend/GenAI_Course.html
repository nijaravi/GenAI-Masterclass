        <SectionDivider part="1" title="How the Model Was Built" sub="The Training Story" color="var(--build-color)"/>

        <section id="ch1"><ChH num="1" title="The Big Picture" sub="Two training phases that create an LLM" color="var(--build-color)"/>
          <P>Before you can use an LLM, someone had to <S>build</S> it. This happens in two distinct phases.</P>
          <div style={{display:"flex",flexDirection:"column",gap:14,margin:"1.25rem 0"}}>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--build-border)",padding:"1.3rem",borderLeft:"4px solid var(--build-color)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"var(--build-color)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"1rem"}}>1</div>
                  <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.2rem",color:"var(--build-color)",fontWeight:700}}>Train the Tokenizer</span>
                </div>
                <span style={{color:"var(--text-muted)",fontSize:"0.82rem"}}>Hours • Cheap</span>
              </div>
              <P><S>Input:</S> Massive text dataset (internet, books, code)</P>
              <P><S>Output:</S> Vocabulary table (~100K entries) + Merge rules</P>
              <P><S>What it does:</S> Figures out how to split text into pieces (tokens)</P>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.3rem"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--info-border)",padding:"1.3rem",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"var(--info-color)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"1rem"}}>2</div>
                  <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.2rem",color:"var(--info-color)",fontWeight:700}}>Train the Model</span>
                </div>
                <span style={{color:"var(--text-muted)",fontSize:"0.82rem"}}>Months • Millions $$$</span>
              </div>
              <P><S>Input:</S> Same text, tokenized using Phase 1's tokenizer</P>
              <P><S>Output:</S> Embedding table + Attention weights + Feed-forward weights</P>
              <P><S>What it does:</S> Learns language — meaning, grammar, facts, reasoning</P>
            </div>
          </div>
          <Callout color="var(--build-color)"><S>Why two phases?</S> The model needs NUMBERS, not text. Phase 1 creates the converter. Phase 2 uses it to learn language.</Callout>
        </section>

        <section id="ch2"><ChH num="2" title="Training the Tokenizer" sub="How BPE creates the vocabulary" color="var(--build-color)"/>
          <P>We know machines don't understand English — they only understand numbers. So the very first step of any interaction with a machine is to convert human-readable text into machine-readable numbers.</P>
          <P>If you think about programming languages — we write code using text, characters, and numbers. There's something called a compiler that converts that code into numbers the machine can understand. But programming languages are structured. They have strict syntax rules, defined keywords, and clear standards. The compiler's job is straightforward because the input follows a predictable pattern.</P>
          <P>But here, we're talking to a machine (the LLM) in plain English. There's no fixed structure. Each person can ask the same question in completely different ways, using their own style of communication.</P>
          <div style={{display:"flex",gap:14,margin:"1.1rem 0 0.85rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:280,background:"white",borderRadius:12,border:"1px solid #BFE6D8",borderLeft:"4px solid #0E9F6E",padding:"1rem",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              <div style={{color:"#0F766E",fontWeight:700,fontSize:"0.92rem",marginBottom:8}}>Compiler (Structured Input)</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.75rem 0.9rem",margin:"0 0 0.65rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",lineHeight:1.6,color:"#E2E8F0"}}>{`def add(a, b):
    return a + b`}</pre>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.05rem",marginBottom:"0.45rem"}}>↓</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.6rem 0.9rem",margin:"0 0 0.7rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.73rem",lineHeight:1.5,color:"#A7F3D0"}}>{`01001010 11010010 10110001...`}</pre>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"0.6rem 0.7rem",background:"#ECFDF5",border:"1px solid #BBF7D0",borderRadius:8}}>
                <span style={{color:"#059669",fontSize:"0.95rem",lineHeight:1}}>✅</span>
                <span style={{color:"#065F46",fontSize:"0.8rem",lineHeight:1.5}}>Structured input with strict rules → straightforward conversion</span>
              </div>
            </div>
            <div style={{flex:1,minWidth:280,background:"white",borderRadius:12,border:"1px solid #F6D3A6",borderLeft:"4px solid #D97706",padding:"1rem",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              <div style={{color:"#B45309",fontWeight:700,fontSize:"0.92rem",marginBottom:8}}>Tokenizer (Unstructured Input)</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.75rem 0.9rem",margin:"0 0 0.5rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.65,color:"#FDE68A"}}>{`"What's the weather?"
"Tell me if it's gonna rain today"
"Is it hot outside right now?"`}</pre>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"0.72rem",fontWeight:600,letterSpacing:0.3,marginBottom:"0.45rem"}}>Same question, 3 different ways</div>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.05rem",marginBottom:"0.45rem"}}>↓</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.6rem 0.9rem",margin:"0 0 0.7rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.73rem",lineHeight:1.5,color:"#FDBA74"}}>{`[3923, 596, 9282, 30]`}</pre>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"0.6rem 0.7rem",background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:8}}>
                <span style={{color:"#D97706",fontSize:"0.95rem",lineHeight:1}}>🧩</span>
                <span style={{color:"#9A3412",fontSize:"0.8rem",lineHeight:1.5}}>No fixed structure, infinite variations → needs a smarter approach</span>
              </div>
            </div>
          </div>
          <P>So we need a smart technique to efficiently convert free-form text into numbers. That technique is called <S color="var(--build-color)">tokenization</S>, and the specific algorithm used by modern LLMs is <S color="var(--build-color)">Byte Pair Encoding (BPE)</S>.</P>
          <P>The tokenizer is a <S>program</S> — not a neural network, not AI. It's a simple rule-based program that was trained once on billions of sentences to figure out the best way to split text into pieces.</P>
          <Callout color="var(--build-color)" icon="🔑"><S>BPE doesn't know any language.</S> Common words become single tokens because their characters appeared billions of times together — not because BPE understands English.</Callout>
          <P>Let's see BPE in action. Imagine we're training a tokenizer on a small text dataset. In reality, this runs on billions of sentences — we'll use a tiny example so you can see every step clearly.</P>
          <P><S>Training text:</S> low low low low low lowest lowest newer newer newer wider wider wider</P>
          <P>The algorithm starts by splitting every word into individual characters. That gives us 11 unique characters — this is our starting vocabulary.</P>
          <CB>{`const vocab = ["l", "o", "w", "e", "s", "t", "n", "r", "i", "d", " "];`}</CB>
          <P>Then it begins merging: it scans the entire text, counts every pair of adjacent characters, and merges the most frequent pair into a new token. This new token gets added to the vocabulary (nothing is ever removed). Then it scans again, counts again, merges again. Each merge grows the vocabulary by 1.</P>
          <P><S>Click "Next Merge" to step through the process:</S></P>
          <BPEDemo/>
          <P><S>"But wait — if the vocabulary only grows, when does it stop?"</S></P>
          <P>BPE doesn't run forever. The model creators set a vocabulary size limit before training begins — typically 100,000 tokens. The algorithm keeps merging until it hits that limit, then stops. Whatever didn't get merged stays as smaller pieces.</P>
          <P>This is why common words like "the" or "hello" become single tokens — they appeared billions of times, so their characters merged early. But rare words like "Bartholomew" stay split into pieces:</P>
          <CB>{`Step 1:        h + e → he          (appeared 900 million times)
Step 2:        he + l → hel        (appeared 700 million times)
...
Step 87,241:   hel + lo → hello    (appeared 50 million times - full word!)
...
Step 99,998:   Barthol + omew      (appeared only 4,200 times)
Step 99,999:   ...one more merge...
Step 100,000:  STOP. Vocabulary limit reached.`}</CB>
          <P><S>Result:</S> "hello" = 1 token, "Bartholomew" = 3 tokens (Barth + ol + omew)</P>
          <P>The vocabulary limit is a design choice. Bigger vocabulary = more single-token words = faster processing but more memory. Smaller vocabulary = more splitting = slower but lighter. Modern LLMs typically use 100K-128K tokens as the sweet spot.</P>
          <P>After training, two things are stored and <S color="var(--build-color)">frozen forever</S>:</P>
          <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:260,padding:"1rem",background:"var(--build-bg)",border:"1px solid var(--build-border)",borderRadius:10}}>
              <div style={{color:"var(--build-color)",fontWeight:700,marginBottom:4}}>Vocabulary Table</div>
              <div style={{background:"#fff8e8",border:"1px solid #f2d9a7",borderRadius:8,padding:"0.5rem 0.6rem",maxHeight:300,overflowY:"auto",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",color:"#8B5E34",fontWeight:700,padding:"3px 4px",borderBottom:"1px solid #f2d9a7"}}>
                  <span>Token</span><span>ID</span>
                </div>
                {[
                  ["l",0],["o",1],["w",2],["e",3],["s",4],["t",5],["n",6],["r",7],["i",8],["d",9],
                  ["lo",10],["low",11],["er",12],["ne",13],["new",14],["newer",15],["wi",16],["wid",17],["wider",18],["lowe",19],["lowes",20],["lowest",21]
                ].map((row,idx)=>(
                  <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"3px 4px",background:idx%2===0?"#fff3dc":"#ffefcf",color:"#6b4b2c"}}>
                    <span style={{textAlign:"left"}}>{row[0]}</span>
                    <span style={{textAlign:"right"}}>{row[1]}</span>
                  </div>
                ))}
              </div>
              <div style={{color:"var(--text-muted)",fontSize:"0.74rem",marginTop:7,lineHeight:1.55}}>Our tiny training text produced 22 tokens. In reality, GPT-4's tokenizer was trained on billions of sentences and has ~100,000 tokens in its vocabulary.</div>
            </div>
            <div style={{flex:1,minWidth:260,padding:"1rem",background:"var(--build-bg)",border:"1px solid var(--build-border)",borderRadius:10}}>
              <div style={{color:"var(--build-color)",fontWeight:700,marginBottom:4}}>Merge Rules</div>
              <div style={{background:"#fff8e8",border:"1px solid #f2d9a7",borderRadius:8,padding:"0.5rem 0.6rem",maxHeight:300,overflowY:"auto",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem"}}>
                {[
                  ["l","o","lo"],["lo","w","low"],["e","r","er"],["n","e","ne"],["ne","w","new"],["new","er","newer"],
                  ["w","i","wi"],["wi","d","wid"],["wid","er","wider"],["low","e","lowe"],["lowe","s","lowes"],["lowes","t","lowest"]
                ].map((r,idx)=>(
                  <div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 4px",background:idx%2===0?"#fff3dc":"#ffefcf",borderBottom:idx<11?"1px solid #f2d9a7":"none",flexWrap:"wrap"}}>
                    <span style={{color:"#9C9690",minWidth:58}}>Rule #{idx+1}</span>
                    <span style={{color:"#B45309"}}>{r[0]} + {r[1]} →</span>
                    <span style={{color:"#1A6B4E",fontWeight:700}}>{r[2]}</span>
                  </div>
                ))}
              </div>
              <div style={{color:"var(--text-muted)",fontSize:"0.74rem",marginTop:7,lineHeight:1.55}}>Our training produced 12 merge rules. GPT-4's tokenizer has ~100,000 merge rules, learned from trillions of tokens.</div>
            </div>
          </div>
          <P>Now that the tokenizer is trained, it's frozen forever. When you type a prompt to an LLM, the tokenizer doesn't count frequencies in your text — it simply applies its pre-learned merge rules one by one, in order. Let's see this in action.</P>
          <TrainedTokenizerDemo/>
        </section>

        <section id="ch3"><ChH num="3" title="Training the Model" sub="Learning meaning through weight adjustment" color="var(--build-color)"/>

          <P>The core idea: make the model <S color="var(--info-color)">predict the next token</S>. But how does a model "know" which token should come next?</P>

          <P>Every token is mapped to a <S>point in a multi-dimensional space</S> — think of a giant map where every word has a location. The model's job during training is to <S color="var(--build-color)">move related tokens closer together</S> in this space. "Cat" should be near "kitten." "King" should be near "queen." "Banana" should be far from both.</P>

          <P>But how do you move a point in space? Think of 2D coordinates. A token sits at <span style={{fontFamily:"'JetBrains Mono',monospace",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#60A5FA",fontSize:"0.9rem"}}>[2, 3]</span>. To move it to <span style={{fontFamily:"'JetBrains Mono',monospace",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#10B981",fontSize:"0.9rem"}}>[6, 9]</span>, multiply each coordinate by 3: <span style={{fontFamily:"'JetBrains Mono',monospace",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#E2E8F0",fontSize:"0.9rem"}}>[2×3, 3×3] = [6, 9]</span>. That multiplier — <S color="var(--build-color)">3</S> — is a <S color="var(--build-color)">weight</S>.</P>

          <Callout color="var(--build-color)" icon="🔑"><S>Weights are just numbers that move tokens around in space.</S> The right weights pull related words together. The wrong weights push them apart or overshoot. Training is the process of finding the right weights — billions of them.</Callout>

          <WeightsDemo/>

          <P>In reality, the model works in <S>1,536 to 12,288 dimensions</S>, not 2. And instead of a single weight, there are <S>billions</S> of them. But there's another important difference...</P>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"1.75rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>One Big Jump vs. Many Small Nudges</div>

          <P>The WeightsDemo above showed a <S>single weight</S> moving "cat" from [2, 3] to [6, 9] in one jump. That's the core concept — weights are multipliers that reposition tokens. But real models don't work in one jump.</P>

          <P>A real model has <S color="var(--purple)">dozens of layers</S> — typically 32 to 120+. Each layer has its <S>own set of weights</S>. When a token flows through the model, each layer nudges it a little bit. Layer 1 moves it slightly, Layer 2 adjusts further, Layer 3 refines more — and by the final layer, it has arrived at the right position.</P>

          <Callout color="var(--purple)" icon="🗺️"><S>Analogy:</S> The single-weight demo was like <S>teleporting</S> to your destination. Real models are more like <S>GPS turn-by-turn navigation</S> — each layer is one turn that gets you closer. No single turn gets you there, but the full sequence does.</Callout>

          <LayerByLayerDemo/>

          <Callout color="var(--info-color)" icon="🔢">
            <S>What are all those weight matrices?</S> Each layer has 5 main weight matrices — think of each one as a "transformation lens" that reshapes the token's vector in a different way. <S color="var(--purple)">W_Q, W_K, W_V</S> are used by attention to figure out which words are relevant to each other. <S color="var(--accent)">W_1, W_2</S> are used by the feed-forward network to apply stored knowledge. Each matrix is a large grid of numbers (e.g. 1536 × 1536 = ~2.4 million numbers in one matrix alone). Multiply that across 5 matrices × 120 layers — that's how you get <S>billions of total weights</S>.
          </Callout>

          <P>This is why models have <S>billions of parameters</S> — each layer has its own set of weight matrices. And why <S>deeper models are more capable</S>: more layers means more refined nudges, which means more precise final positions.</P>

          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontSize:"0.95rem"}}>What Different Layers Learn</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border-light)"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#60A5FA",flexShrink:0}}/>
                <div><span style={{fontWeight:600,fontSize:"0.88rem"}}>Early layers (1–10):</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Basic patterns — grammar, syntax, punctuation rules</span></div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border-light)"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#FBBF24",flexShrink:0}}/>
                <div><span style={{fontWeight:600,fontSize:"0.88rem"}}>Middle layers (10–60):</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Relationships — word associations, sentence structure, topic coherence</span></div>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#10B981",flexShrink:0}}/>
                <div><span style={{fontWeight:600,fontSize:"0.88rem"}}>Deep layers (60–120+):</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Abstract reasoning — logic, nuance, complex knowledge synthesis</span></div>
              </div>
            </div>
          </div>

          <Callout color="var(--info-color)" icon="📊"><S>Scale comparison:</S> GPT-2 had <S>12 layers</S> and 1.5B parameters — it could write basic text. GPT-4 is estimated to have <S>120 layers</S> and over 1 trillion parameters — it can reason, code, and pass professional exams. More layers = more refined understanding.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>The Training Loop</div>

          <P>Now that you know what weights are, here is how the model learns the <S>right</S> weights. It is a 5-step loop repeated trillions of times:</P>

          <div style={{display:"flex",flexDirection:"column",gap:0,margin:"1.25rem 0"}}>
            {[
              {num:"1", title:"Random Start", desc:"All tokens are placed at random positions in space. The model knows nothing — its weights are random numbers.", color:"#6B7280", icon:"🎲"},
              {num:"2", title:"Make a Prediction", desc:"Feed the model a sentence like \"The cat sat on the\" and ask it: what comes next? With random weights, it guesses randomly — maybe \"banana.\"", color:"var(--info-color)", icon:"🤔"},
              {num:"3", title:"Measure the Error (Loss)", desc:"How wrong was the prediction? Loss is a single number — like a golf score, lower is better. Predicting \"banana\" when the answer was \"mat\" = high loss.", color:"#EF4444", icon:"📏"},
              {num:"4", title:"Trace the Blame (Backpropagation)", desc:"There are billions of weights. Which ones caused the bad prediction? Backpropagation traces backward from the error, assigning a \"blame score\" to each weight.", color:"#A78BFA", icon:"🔍"},
              {num:"5", title:"Adjust Weights (Learning Rate)", desc:"Now adjust each weight based on its blame — but not too much and not too little. The learning rate controls the step size.", color:"#F59E0B", icon:"🔧"},
            ].map((step, i) => (
              <div key={i} style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:step.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.95rem"}}>{step.num}</div>
                  {i < 4 && <div style={{width:2,height:40,background:"var(--border)"}}/>}
                </div>
                <div style={{paddingBottom:i<4?16:0}}>
                  <div style={{fontWeight:700,fontSize:"1rem",color:"var(--text)",marginBottom:2}}>{step.icon} {step.title}</div>
                  <div style={{color:"var(--text-secondary)",fontSize:"0.92rem",lineHeight:1.7}}>{step.desc}</div>
                </div>
              </div>
            ))}
          </div>

          <Callout icon="🔄">This entire loop — predict, measure loss, trace blame, adjust weights — happens <S color="var(--build-color)">trillions of times</S>. With each iteration, the model's predictions get slightly better.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>What Emerges from Training</div>

          <P>After trillions of iterations, three sets of weights have been learned — each storing a different kind of knowledge:</P>

          <div style={{display:"flex",flexDirection:"column",gap:12,margin:"1rem 0"}}>
            <div style={{padding:"1rem 1.25rem",background:"var(--info-bg)",border:"1px solid var(--info-border)",borderRadius:10,borderLeft:"4px solid var(--info-color)"}}>
              <div style={{color:"var(--info-color)",fontWeight:700,marginBottom:4,fontSize:"0.95rem"}}>Embedding Table</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Positions similar words close together in space. "King" near "queen." "Dog" near "puppy." This is the model's vocabulary of meaning.</div>
              <div style={{marginTop:"0.75rem",background:"#F3F7FF",border:"1px solid #BFDBFE",borderRadius:10,padding:"0.6rem 0.75rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#4B5563",marginBottom:"0.4rem"}}>
                  <span>Token (example)</span>
                  <span>Vector (first 4)</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem"}}>
                  <div style={{display:"flex",justifyContent:"space-between",background:"#EFF6FF",borderRadius:8,padding:"0.35rem 0.45rem"}}>
                    <span style={{color:"#1D4ED8"}}>cat (ID 317)</span>
                    <span style={{color:"#111827"}}>[0.12, -0.45, 0.78, 0.33, ...]</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",background:"#FFF7ED",borderRadius:8,padding:"0.35rem 0.45rem",border:"1px solid #FDBA74"}}>
                    <span style={{color:"#B45309"}}>kitten (ID 3847)</span>
                    <span style={{color:"#111827"}}>[0.82, -0.31, 0.44, 0.67, ...]</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",background:"#EFF6FF",borderRadius:8,padding:"0.35rem 0.45rem"}}>
                    <span style={{color:"#2563EB"}}>car (ID 318)</span>
                    <span style={{color:"#111827"}}>[-0.55, 0.21, -0.67, 0.14, ...]</span>
                  </div>
                </div>
                <div style={{marginTop:"0.45rem",color:"var(--text-muted)",fontSize:"0.72rem",lineHeight:1.5}}>
                  Neighbor intuition: the model stores meanings as vectors, so similar meanings land near each other.
                </div>
              </div>
            </div>
            <div style={{padding:"1rem 1.25rem",background:"var(--purple-bg)",border:"1px solid #C4B5FD",borderRadius:10,borderLeft:"4px solid var(--purple)"}}>
              <div style={{color:"var(--purple)",fontWeight:700,marginBottom:4,fontSize:"0.95rem"}}>Attention Weights</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Learn which words to connect across a sentence. Here, “bank” attends to “river” because “river” is the nearby clue for the “riverbank” meaning; banking clues like “loan” or “financial” get much less attention.</div>
              <div style={{marginTop:"0.75rem",background:"#F7F3FF",border:"1px solid #E9D5FF",borderRadius:10,padding:"0.6rem 0.75rem"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#4B5563",marginBottom:"0.45rem"}}>
                  <span>Query token: <span style={{color:"var(--purple)",fontWeight:700}}>bank</span></span>
                  <span>Focus weights</span>
                </div>
                {[
                  { t:"river", w:0.62, c:"#A78BFA" },
                  { t:"bank", w:0.22, c:"#7C3AED" },
                  { t:"loan", w:0.06, c:"#6B7280" },
                  { t:"financial", w:0.04, c:"#6B7280" },
                ].map((r, i) => (
                  <div key={r.t} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<3?6:0}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#94A3B8",width:80}}>{r.t}</span>
                    <div style={{flex:1,height:7,background:"#E9D5FF",borderRadius:999,overflow:"hidden"}}>
                      <div style={{width:(r.w*100)+"%",height:"100%",background:r.c,transition:"width 0.3s ease"}}/>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#111827",width:46,textAlign:"right"}}>{(r.w).toFixed(2)}</span>
                  </div>
                ))}
                <div style={{marginTop:"0.45rem",color:"var(--text-muted)",fontSize:"0.72rem",lineHeight:1.5}}>
                  Attention uses surrounding tokens as evidence to choose a sense for ambiguous words like “bank”.
                </div>
              </div>
            </div>
            <div style={{padding:"1rem 1.25rem",background:"var(--accent-light)",border:"1px solid var(--work-border)",borderRadius:10,borderLeft:"4px solid var(--accent)"}}>
              <div style={{color:"var(--accent)",fontWeight:700,marginBottom:4,fontSize:"0.95rem"}}>Feed-Forward Weights</div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem"}}>Absorb factual knowledge. "Paris is the capital of France" gets encoded in these weights through repeated exposure.</div>
              <div style={{marginTop:"0.75rem",background:"#FFF7ED",border:"1px solid #FCD34D",borderRadius:10,padding:"0.6rem 0.75rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#4B5563",marginBottom:"0.45rem"}}>
                  <span>Activated features (example)</span>
                  <span>Activation</span>
                </div>
                {[
                  { id:"F-12", v:0.91, c:"#10B981" },
                  { id:"F-33", v:0.18, c:"#F59E0B" },
                  { id:"F-07", v:0.12, c:"#6B7280" },
                  { id:"F-90", v:0.05, c:"#6B7280" },
                ].map((r, i) => (
                  <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<3?6:0}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#94A3B8",width:64}}>{r.id}</span>
                    <div style={{flex:1,height:7,background:"#FDE68A",borderRadius:999,overflow:"hidden"}}>
                      <div style={{width:(r.v*100)+"%",height:"100%",background:r.c,transition:"width 0.3s ease",borderRadius:999}}/>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem",color:"#111827",width:46,textAlign:"right"}}>{r.v.toFixed(2)}</span>
                  </div>
                ))}
                <div style={{marginTop:"0.45rem",color:"var(--text-muted)",fontSize:"0.72rem",lineHeight:1.5}}>
                  Higher activation means the network has learned a stronger association for the current context.
                </div>
              </div>
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>The Scale of Training</div>

          <P>This process is not something you run on a laptop. Training a frontier LLM is one of the most computationally expensive tasks humans have ever attempted.</P>

          <div style={{display:"flex",gap:12,flexWrap:"wrap",margin:"1.25rem 0"}}>
            {[
              {icon:"📚", label:"Training Data", value:"~15T tokens", sub:"Books, web, code, Wikipedia, papers", color:"var(--info-color)", bg:"var(--info-bg)"},
              {icon:"🖥️", label:"Hardware", value:"10,000+ GPUs", sub:"Running in parallel for months", color:"var(--purple)", bg:"var(--purple-bg)"},
              {icon:"⏱️", label:"Duration", value:"3 – 6 months", sub:"Of continuous computation", color:"var(--build-color)", bg:"var(--build-bg)"},
              {icon:"💰", label:"Cost", value:"$10M – $100M+", sub:"For a frontier model", color:"var(--red)", bg:"var(--red-bg)"},
            ].map((s, i) => (
              <div key={i} style={{flex:"1 1 140px",minWidth:140,padding:"1rem",background:s.bg,border:"1px solid "+s.color+"22",borderRadius:10,textAlign:"center"}}>
                <div style={{fontSize:"1.5rem",marginBottom:4}}>{s.icon}</div>
                <div style={{color:s.color,fontWeight:700,fontSize:"0.82rem",marginBottom:2}}>{s.label}</div>
                <div style={{color:"var(--text)",fontWeight:700,fontSize:"1.05rem",fontFamily:"'JetBrains Mono',monospace"}}>{s.value}</div>
                <div style={{color:"var(--text-muted)",fontSize:"0.75rem",marginTop:2}}>{s.sub}</div>
              </div>
            ))}
          </div>

          <Callout color="var(--build-color)" icon="⚠️">What goes in shapes what comes out. Trained mostly on English? The model is better at English. Trained on lots of code? It can write code. This is why <S>training data quality and bias</S> are critical concerns.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",fontWeight:700,color:"var(--text)",marginTop:"2.5rem",marginBottom:"1rem"}}>From Text Predictor to Helpful Assistant</div>

          <P>Everything above is called <S color="var(--build-color)">pre-training</S> — the model learns to predict the next token. The result is a raw text completer. You type "The capital of France is" and it predicts "Paris." But it does not <S>follow instructions</S> or <S>have a conversation</S>.</P>

          <P>So how does ChatGPT or Claude go from "autocomplete" to "helpful assistant"? Through two additional stages of training called <S color="var(--info-color)">fine-tuning</S>:</P>

          <div style={{display:"flex",flexDirection:"column",gap:0,margin:"1.25rem 0"}}>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--build-border)",padding:"1.2rem",borderLeft:"4px solid var(--build-color)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>📚</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--build-color)",fontWeight:700}}>Stage 1: Pre-training</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Learn language from trillions of tokens. Next-token prediction on the entire internet.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--build-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--build-color)",fontWeight:600}}>Output: Raw text predictor</div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.2rem",padding:"4px 0"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--info-border)",padding:"1.2rem",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>📋</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--info-color)",fontWeight:700}}>Stage 2: Instruction Tuning (SFT)</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Human trainers write thousands of (instruction, ideal response) pairs. The model learns the format of being helpful.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--info-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--info-color)",fontWeight:600}}>Output: Helpful but rough</div>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.2rem",padding:"4px 0"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--work-border)",padding:"1.2rem",borderLeft:"4px solid var(--accent)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:"1.3rem"}}>👍</span>
                <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem",color:"var(--accent)",fontWeight:700}}>Stage 3: RLHF</span>
              </div>
              <div style={{color:"var(--text-secondary)",fontSize:"0.9rem",marginBottom:4}}>Humans rank multiple model responses from best to worst. The model learns to prefer responses humans rated highly.</div>
              <div style={{display:"inline-block",padding:"3px 10px",background:"var(--work-bg)",borderRadius:5,fontSize:"0.78rem",color:"var(--accent)",fontWeight:600}}>Output: ChatGPT / Claude</div>
            </div>
          </div>

          <Callout color="var(--build-color)" icon="🎓"><S>Analogy:</S> Pre-training is like getting a medical degree — you absorb everything in the textbooks. Fine-tuning is residency — you learn bedside manner, how to talk to patients, when to refer to a specialist. Same knowledge, but now you know how to <S>apply it helpfully</S>.</Callout>

          <Callout color="var(--info-color)" icon="📘">This entire Part 1 covers <S>pre-training</S>. Fine-tuning (SFT and RLHF) will be covered in detail in a later module.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Stage 2: Instruction Tuning (SFT)</div>

          <P>The pre-trained model is like a brilliant person who has read every book in the library - but has <S>never had a job</S>. It knows everything about language but doesn't know the <S color="var(--build-color)">format</S> of being helpful.</P>

          <P>If you type "Summarize this article," the pre-trained model might continue your sentence with <span style={{fontFamily:"'JetBrains Mono'",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#EF4444",fontSize:"0.88rem"}}>"...in 3 paragraphs for my homework"</span> instead of actually summarizing. It's still in autocomplete mode - it doesn't understand that you're giving it a <S>task</S>.</P>

          <P><S color="var(--build-color)">Supervised Fine-Tuning (SFT)</S> fixes this. Human trainers - often hundreds of them - write thousands of example conversations: "When a user asks X, here's what a good response looks like." The model is then trained on these curated examples.</P>

          <Callout color="var(--build-color)" icon="💼"><S>Analogy:</S> Pre-training is like reading every book in the library. SFT is like <S>doing an internship</S> where a mentor shows you: "here's how we actually talk to customers, here's how we handle complaints, here's how we politely decline."</Callout>

          <SFTExamplesDemo/>

          <P>Notice the variety: the model learns to answer questions, follow tasks precisely, refuse harmful requests politely, and show creativity. Each example teaches the model a different <S>behavior pattern</S>.</P>

          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:"0.95rem"}}>SFT - Key Facts</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Training data</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>10,000-100,000+ curated (instruction, response) pairs</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Method</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Same next-token prediction - but on curated conversations, not random internet text</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Duration</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Days to weeks (much faster than pre-training)</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0"}}>
                <span style={{color:"var(--build-color)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>What changes</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>The model's weights are slightly adjusted - it doesn't learn new knowledge, it learns new <strong>behavior</strong></span>
              </div>
            </div>
          </div>

          <Callout icon="⚠️"><S>Important:</S> SFT doesn't add new knowledge - the model already knows everything from pre-training. It just learns the <S>format</S> of being helpful: start with the answer, be concise, show your reasoning, cite sources when possible.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.15rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 0.75rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Stage 3: RLHF - Learning Human Preferences</div>

          <P>SFT gets the model 80% of the way there. But there's a problem: for any given question, there are <S>many possible good answers</S>. Some are verbose, some concise. Some are formal, some casual. Some are cautious, some confident. Which style should the model use?</P>

          <P>You can't capture this in written examples alone. What you need is <S color="var(--purple)">human judgment</S> - thousands of comparisons saying "this response is better than that one, and here's why."</P>

          <P>That's <S color="var(--purple)">RLHF: Reinforcement Learning from Human Feedback</S>. Instead of showing the model the "right answer," you show it two options and tell it which one humans prefer.</P>

          <Callout color="var(--purple)" icon="📝"><S>Analogy:</S> SFT is a teacher giving you the <S>answer key</S>. RLHF is a teacher <S>grading your essays</S> and saying "this one's better than that one" - over and over - until you internalize what "good" means.</Callout>

          <RLHFDemo/>

          <P>Through thousands of these comparisons, the model learns nuanced preferences that are hard to write down explicitly: be helpful but not sycophantic, be honest even when the truth is uncomfortable, admit uncertainty rather than guess, match the tone of the question.</P>

          <div style={{background:"white",borderRadius:10,padding:"1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:"0.95rem"}}>RLHF - Key Facts</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Training data</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Thousands of human-ranked response pairs ("B is better than A")</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Method</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Train a reward model on rankings, then optimize the main model to maximize reward scores</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid var(--border-light)"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>Duration</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>Days to weeks - iterative process with ongoing human feedback</span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"baseline",padding:"5px 0"}}>
                <span style={{color:"var(--purple)",fontWeight:700,fontSize:"0.82rem",flexShrink:0,width:100}}>What changes</span>
                <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>The model learns <strong>preferences</strong> - which response style humans consider better, safer, more helpful</span>
              </div>
            </div>
          </div>

          <Callout color="var(--purple)" icon="🎯"><S>Why this matters for you as a user:</S> RLHF is why ChatGPT and Claude feel different from each other even though they're both LLMs. They were trained with <S>different human preferences</S>. The personality, tone, and judgment you experience is shaped by RLHF.</Callout>

          <Callout color="var(--info-color)" icon="🔒">After training — both pre-training and fine-tuning — everything is <S>frozen</S>. The model never learns again. When you use ChatGPT or Claude, you're running a frozen snapshot. The weights are locked in place forever.</Callout>
        </section>

        <SectionDivider part="2" title="How the Model Works" sub="The Inference Story" color="var(--work-color)"/>

        <section id="ch4"><ChH num="4" title="Text to Tokens" sub="The tokenizer converts your text into numbers" color="var(--work-color)"/>
          <P>The <S>tokenizer</S> applies its pre-learned merge rules, then looks up each token in the vocabulary table.</P>
          <CB>{`"Hello, how are you?"
  → Tokenizer applies merge rules
  → ["Hello", ",", " how", " are", " you", "?"]
  → Vocabulary lookup
  → [15339, 11, 1268, 527, 499, 30]`}</CB>
        </section>

        <section id="ch5"><ChH num="5" title="Tokens to Meaning" sub="Embedding lookup gives each token its meaning" color="var(--work-color)"/>
          <P>Token IDs are just numbers. The <S>embedding table</S> maps each to a meaning vector — a simple fetch.</P>
          <CB>{`15339 → [0.23, -0.45, 0.12, ...]  "Hello" general meaning
11    → [0.01,  0.78, -0.33, ...]  "," general meaning
1268  → [0.56,  0.12,  0.89, ...]  " how" general meaning`}</CB>
          <Callout icon="⚠️">These are <S>general</S> meanings. "bank" gets the same vector whether about rivers or money. Context comes from self-attention.</Callout>
        </section>

        <section id="ch6"><ChH num="6" title="Understanding Context" sub="Self-attention connects words to build meaning" color="var(--work-color)"/>

          <P>After the embedding lookup, every token has a <S>general meaning vector</S> — but no awareness of context. "Bank" doesn't know if it's near "river" or "money".</P>

          <P>Self-attention fixes this. Every word looks at every other word and asks: <S color="var(--purple)">"how relevant are you for understanding me?"</S></P>

          <Callout color="var(--purple)" icon="🪑"><S>Meeting room analogy:</S> Every word in your sentence is sitting around a table. When it's your turn to speak, you look at everyone else and decide who to listen to most carefully. "bank" looks around, sees "river" → <S>very relevant, listen closely</S>. Sees "the" → <S>not very useful</S>. Based on these scores, "bank" absorbs information from the most relevant words and becomes "river bank" specifically.</Callout>

          <P>The key: <S>every word does this simultaneously</S>. While "bank" is looking at everyone, "river" is also looking at everyone, "sat" is looking at everyone. The entire sentence develops contextual understanding in one shot.</P>

          <AttentionDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>How Self-Attention Works: Query, Key, Value</div>

          <P>At this point we have tokens and their embedding vectors. Each vector gets multiplied by <S>three different weight matrices</S> (W_Q, W_K, W_V) to create three new vectors with different purposes:</P>

          <div style={{background:"#1A1D27",borderRadius:10,padding:"1.25rem",border:"1px solid #2E3240",margin:"1rem 0"}}>
            <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>From One Embedding → Three Purpose-Specific Vectors</div>
            <div style={{textAlign:"center",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem"}}>
              <div style={{color:"#94A3B8",marginBottom:8}}>"bank" embedding = <span style={{color:"#F0F4F8"}}>[0.5, 0.3, 0.8, 0.2]</span></div>
              <div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:4}}>
                <span style={{color:"#6B7280"}}>│</span>
              </div>
              <div style={{display:"flex",justifyContent:"center",gap:30,flexWrap:"wrap"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_Q</div>
                  <div style={{color:"#60A5FA",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#60A5FA15",border:"1px solid #60A5FA33",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#60A5FA",fontWeight:700,fontSize:"0.82rem"}}>Q (Query)</div>
                    <div style={{color:"#60A5FA",fontSize:"0.72rem"}}>[0.12, -0.45, 0.33, 0.67]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What am I<br/>looking for?"</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_K</div>
                  <div style={{color:"#FBBF24",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#FBBF2415",border:"1px solid #FBBF2433",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#FBBF24",fontWeight:700,fontSize:"0.82rem"}}>K (Key)</div>
                    <div style={{color:"#FBBF24",fontSize:"0.72rem"}}>[0.89, 0.23, -0.11, 0.44]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What do I<br/>have to offer?"</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#6B7280",marginBottom:4}}>× W_V</div>
                  <div style={{color:"#10B981",fontSize:"0.75rem"}}>↓</div>
                  <div style={{background:"#10B98115",border:"1px solid #10B98133",borderRadius:8,padding:"8px 14px",marginTop:4}}>
                    <div style={{color:"#10B981",fontWeight:700,fontSize:"0.82rem"}}>V (Value)</div>
                    <div style={{color:"#10B981",fontSize:"0.72rem"}}>[0.34, 0.56, 0.78, -0.22]</div>
                    <div style={{color:"#6B7280",fontSize:"0.68rem",marginTop:4}}>"What info<br/>do I carry?"</div>
                  </div>
                </div>
              </div>
            </div>
            <div style={{color:"#6B7280",fontSize:"0.72rem",textAlign:"center",marginTop:10}}>It's just matrix multiplication — embedding × weight matrix → new vector with a new purpose</div>
          </div>

          <P>These weight matrices (W_Q, W_K, W_V) are the <S>same ones learned during training</S> — frozen into the model, just like the embedding table.</P>

          <Callout color="var(--info-color)" icon="📚"><S>Library analogy:</S> Imagine walking into a library. <S color="#60A5FA">Query (Q)</S> is your question — "I need information about river geography." <S color="#FBBF24">Key (K)</S> is the label on each book — "Financial Systems," "River Ecosystems," "Cooking Recipes." <S color="#10B981">Value (V)</S> is the actual content inside each book. You <S>match your Query against every Key</S> to find relevant books, then <S>read the Values</S> of the ones that scored highest.</Callout>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Step by Step: How "bank" Figures Out Its Meaning</div>

          <P>Sentence: <S>"I sat by the river bank"</S>. Let's trace exactly how self-attention helps "bank" understand it means "river bank" — click through each step:</P>

          <QKVWalkthroughDemo/>

          <div style={{background:"white",borderRadius:10,padding:"1.1rem 1.25rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>The Complete Self-Attention Process</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                {step:"1",label:"Create Q, K, V",desc:"Each word's embedding × W_Q, W_K, W_V → three purpose-specific vectors",color:"#A78BFA"},
                {step:"2",label:"Score relevance",desc:"Each word's Query is compared against every other word's Key → dot product → scores",color:"#60A5FA"},
                {step:"3",label:"Weighted sum",desc:"Each word collects everyone's Values, weighted by relevance scores → context vector",color:"#10B981"},
                {step:"4",label:"Residual add",desc:"Context vector is ADDED to the original embedding — identity preserved, context gained",color:"#FBBF24"},
              ].map(s => (
                <div key={s.step} style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:s.step!=="4"?"1px solid var(--border-light)":"none"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:s.color+"20",display:"flex",alignItems:"center",justifyContent:"center",color:s.color,fontWeight:700,fontSize:"0.72rem",flexShrink:0}}>{s.step}</div>
                  <div><span style={{fontWeight:600,fontSize:"0.88rem"}}>{s.label}:</span> <span style={{color:"var(--text-secondary)",fontSize:"0.88rem"}}>{s.desc}</span></div>
                </div>
              ))}
            </div>
          </div>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Multi-Head Attention: Multiple Perspectives at Once</div>

          <P>Everything above was <S>one</S> attention computation — one way of asking "what should I pay attention to?" But a single computation can only capture one type of relationship.</P>

          <P>The model runs <S color="var(--purple)">multiple self-attention operations in parallel</S> — called <S color="var(--purple)">heads</S>. Each head has its own W_Q, W_K, W_V and learns to ask different questions. Click each head to see:</P>

          <MultiHeadDemo/>

          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.25rem",color:"var(--text)",fontWeight:700,margin:"2rem 0 1rem",paddingTop:"0.75rem",borderTop:"1px solid var(--border-light)"}}>Where Do These Weights Live?</div>

          <CB>{`Model weights on disk:
├── embedding_table          (token ID → embedding vector)
├── layer_1/
│   ├── W_Q, W_K, W_V        (attention weights)
│   └── W_1, W_2             (feed-forward weights)
├── layer_2/
│   ├── W_Q, W_K, W_V        (DIFFERENT from layer 1!)
│   └── W_1, W_2
├── ...
└── layer_120/
    ├── W_Q, W_K, W_V
    └── W_1, W_2`}</CB>

          <Callout color="var(--purple)"><S>Every layer has its OWN set of W_Q, W_K, W_V.</S> Layer 1's matrices are different from Layer 2's. This is why different layers capture different types of relationships — each layer learned different transformations during training. This connects directly to the Layer-by-Layer demo in Part 1.</Callout>

        </section>

        <section id="ch7"><ChH num="7" title="Activating Knowledge" sub="Feed-forward applies stored facts" color="var(--work-color)"/>
          <P>Self-attention gave context. Feed-forward activates <S>knowledge</S> stored in its weights.</P>
          <CB>{`Self-Attention: "What does this word mean HERE?"
Feed-Forward:   "What do I KNOW about this?"

→ EXPAND to 6144 dims (activate knowledge)
→ ReLU: turn OFF irrelevant knowledge
→ COMPRESS to 1536 dims (keep relevant facts)`}</CB>
          <P>One Transformer layer = self-attention + feed-forward. Repeat <S>32 to 120+ times</S>.</P>
        </section>

        <section id="ch8"><ChH num="8" title="Generating the Response" sub="One token at a time" color="var(--work-color)"/>
          <P>LLMs generate text <S color="var(--red)">one token at a time</S>. Predict one, append it, run everything again.</P>
          <CB>{`"What is Python?"
  Iter 1: [What, is, Python, ?]         → "Python"
  Iter 2: [What, is, Python, ?, Python] → " is"
  Iter 3: [..., Python, is]             → " a"
  ...
  Iter 50: [...]                        → END
  → "Python is a high-level programming language..."`}</CB>
          <Callout color="var(--red)" icon="⚡">This is why <S>streaming</S> exists — tokens appear one by one. Longer responses cost more. The model can't go back and fix mistakes.</Callout>
        </section>

        <section id="ch9"><ChH num="9" title="Controlling Creativity" sub="Temperature, Top-P, and Top-K" color="var(--work-color)"/>
          <P><S>Temperature</S> controls whether the model picks the safe word or takes creative risks.</P>
          <TemperatureDemo/>
          <div style={{marginTop:"1.25rem"}}>
            <P><S color="var(--info-color)">Top-K:</S> Only consider the top K tokens. Fixed cutoff.</P>
            <P><S color="var(--orange)">Top-P (nucleus):</S> Keep tokens until cumulative probability reaches P. Adapts to confidence. Generally preferred.</P>
          </div>
          <div style={{background:"white",borderRadius:10,padding:"1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>Practical Defaults</div>
            {[{use:"Code generation",temp:"0",topP:"1.0",c:"var(--info-color)"},{use:"Factual Q&A",temp:"0.3",topP:"0.9",c:"#0E7490"},{use:"General conversation",temp:"0.7",topP:"0.9",c:"var(--accent)"},{use:"Creative writing",temp:"1.0",topP:"0.95",c:"var(--build-color)"}].map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:r.c,flexShrink:0}}/>
                <span style={{flex:1,fontSize:"0.88rem"}}>{r.use}</span>
                <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>temp={r.temp}</span>
                <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>top_p={r.topP}</span>
              </div>
            ))}
          </div>
        </section>

        <div style={{marginTop:"3rem",padding:"1.75rem",background:"white",borderRadius:12,textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.3rem",fontWeight:700,marginBottom:6}}>You've completed this module</div>
          <div style={{color:"var(--text-muted)",fontSize:"0.92rem"}}>You now understand the complete journey — from training data to the response you see in ChatGPT.</div>
          <div style={{color:"var(--accent)",fontSize:"0.88rem",fontWeight:600,marginTop:8}}>Next → Prompt Engineering Deep Dive</div>
        </div>

      </div></div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
