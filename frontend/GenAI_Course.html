<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CHAPTERS = [
  { id: "intro", part: 0, num: "", title: "Overview", sub: "" },
  { id: "ch1", part: 1, num: "1", title: "The Big Picture", sub: "Two training phases" },
  { id: "ch2", part: 1, num: "2", title: "Training the Tokenizer", sub: "BPE algorithm" },
  { id: "ch3", part: 1, num: "3", title: "Training the Model", sub: "Embeddings & weights" },
  { id: "ch4", part: 2, num: "4", title: "Text to Tokens", sub: "Tokenizer in action" },
  { id: "ch5", part: 2, num: "5", title: "Tokens to Meaning", sub: "Embedding lookup" },
  { id: "ch6", part: 2, num: "6", title: "Understanding Context", sub: "Self-Attention" },
  { id: "ch7", part: 2, num: "7", title: "Activating Knowledge", sub: "Feed-Forward" },
  { id: "ch8", part: 2, num: "8", title: "Generating Response", sub: "Autoregressive loop" },
  { id: "ch9", part: 2, num: "9", title: "Controlling Creativity", sub: "Temperature & sampling" },
];

const MERGE_RULES = [
  ["l", "o"],
  ["lo", "w"],
  ["e", "r"],
  ["n", "e"],
  ["ne", "w"],
  ["new", "er"],
  ["w", "i"],
  ["wi", "d"],
  ["wid", "er"],
  ["low", "e"],
  ["lowe", "s"],
  ["lowes", "t"],
];

function encodeWord(word, rules) {
  let tokens = word.split("");
  const steps = [{ tokens: [...tokens], rule: null, ruleNum: 0, applied: false }];

  for (let r = 0; r < rules.length; r++) {
    const [p1, p2] = rules[r];
    const merged = p1 + p2;
    const newTokens = [];
    let i = 0;
    let applied = false;
    while (i < tokens.length) {
      if (i < tokens.length - 1 && tokens[i] === p1 && tokens[i + 1] === p2) {
        newTokens.push(merged);
        i += 2;
        applied = true;
      } else {
        newTokens.push(tokens[i]);
        i++;
      }
    }
    steps.push({ tokens: [...newTokens], rule: rules[r], ruleNum: r + 1, applied });
    if (applied) tokens = newTokens;
  }

  return steps;
}

// ============================================================
// INTERACTIVE: BPE Demo
// ============================================================
function BPEDemo() {
  const initialWords = "low low low low low lowest lowest newer newer newer wider wider wider".split(" ").map(w => w.split(""));
  const getPairCounts = (tList) => {
    const c = {};
    tList.forEach(ts => {
      for (let i = 0; i < ts.length - 1; i++) {
        const k = ts[i] + "|" + ts[i + 1];
        c[k] = (c[k] || 0) + 1;
      }
    });
    return c;
  };

  const [step, setStep] = useState(0);
  const [tokens, setTokens] = useState(initialWords);
  const [mergeLog, setMergeLog] = useState([]);
  const [vocabSize, setVocabSize] = useState(11);
  const [pairCounts, setPairCounts] = useState(() => getPairCounts(initialWords));
  const [prevPairCounts, setPrevPairCounts] = useState({});
  const [transitionPreview, setTransitionPreview] = useState(null);

  const previewWords = (wordList) => wordList.map(w => `[${w.join(", ")}]`).join("  ");

  const doStep = () => {
    const pairs = getPairCounts(tokens);
    if (!Object.keys(pairs).length) return;
    const sortedPairs = Object.entries(pairs).sort((a, b) => b[1] - a[1]);
    const best = sortedPairs[0];
    const [p1, p2] = best[0].split("|");
    const merged = p1 + p2;
    const nt = tokens.map(ts => {
      const r = [];
      let i = 0;
      while (i < ts.length) {
        if (i < ts.length - 1 && ts[i] === p1 && ts[i + 1] === p2) {
          r.push(merged);
          i += 2;
        } else {
          r.push(ts[i]);
          i++;
        }
      }
      return r;
    });
    const nextPairs = getPairCounts(nt);
    setPrevPairCounts(pairs);
    setPairCounts(nextPairs);
    setTokens(nt);
    setStep(s => s + 1);
    setVocabSize(v => v + 1);
    setMergeLog(l => [...l, { p1, p2, merged, count: best[1], ruleNum: step + 1 }]);
    setTransitionPreview({
      before: previewWords(tokens),
      after: previewWords(nt)
    });
  };
  const reset = () => {
    setTokens(initialWords);
    setStep(0);
    setMergeLog([]);
    setVocabSize(11);
    setPairCounts(getPairCounts(initialWords));
    setPrevPairCounts({});
    setTransitionPreview(null);
  };
  const tColors = ["#1A6B4E","#B45309","#1E6091","#6D28D9","#C2410C","#0E7490","#9333EA","#B91C1C"];
  const currentSorted = Object.entries(pairCounts).sort((a, b) => b[1] - a[1]);
  const maxCount = currentSorted.length ? currentSorted[0][1] : 0;
  const winnerKey = currentSorted.length ? currentSorted[0][0] : null;
  const tieEntry = currentSorted.find((entry, idx) => idx > 0 && entry[1] === maxCount);
  const droppedPairs = Object.entries(prevPairCounts)
    .filter(([k, v]) => v > 0 && !pairCounts[k])
    .sort((a, b) => b[1] - a[1]);
  const displayPairs = [
    ...currentSorted.map(([k, v]) => ({ key: k, count: v, dropped: false, prev: prevPairCounts[k] || 0 })),
    ...droppedPairs.map(([k, v]) => ({ key: k, count: 0, dropped: true, prev: v }))
  ];

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{color:"#F59E0B",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
          <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>BPE Tokenizer Training</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={doStep} style={{padding:"7px 18px",background:"#F59E0B",color:"#111",border:"none",borderRadius:7,fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>Next Merge →</button>
          <button onClick={reset} style={{padding:"7px 14px",background:"transparent",color:"#94A3B8",border:"1px solid #404552",borderRadius:7,cursor:"pointer",fontSize:"0.8rem"}}>Reset</button>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:"1rem",flexWrap:"wrap"}}>
        <div style={{background:"#252833",padding:"5px 12px",borderRadius:6,fontSize:"0.78rem"}}><span style={{color:"#94A3B8"}}>Step </span><span style={{color:"#60A5FA",fontWeight:700,fontFamily:"'JetBrains Mono'"}}>{step}</span></div>
        <div style={{background:"#252833",padding:"5px 12px",borderRadius:6,fontSize:"0.78rem"}}><span style={{color:"#94A3B8"}}>Vocab </span><span style={{color:"#34D399",fontWeight:700,fontFamily:"'JetBrains Mono'"}}>{vocabSize}</span></div>
      </div>
      <div style={{background:"#12141C",borderRadius:10,padding:"0.85rem 1rem",marginBottom:"0.75rem",border:"1px solid #2E3240"}}>
        <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Adjacent Pair Counts</div>
        {step === 0 && tieEntry && (
          <div style={{fontSize:"0.72rem",color:"#94A3B8",marginBottom:8}}>
            Tied with <span style={{fontFamily:"'JetBrains Mono'"}}>{tieEntry[0].split("|").join(" + ")}</span> — picks first encountered.
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {displayPairs.map((pair, i) => {
            const [a, b] = pair.key.split("|");
            const isWinner = !pair.dropped && pair.key === winnerKey;
            const rowBg = isWinner ? "#10B9811A" : pair.dropped ? "#EF44441A" : "transparent";
            const rowBorder = isWinner ? "1px solid #10B98155" : pair.dropped ? "1px solid #EF444455" : "1px solid transparent";
            return (
              <div key={pair.key + i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 6px",background:rowBg,border:rowBorder,borderRadius:6,fontSize:"0.75rem"}}>
                <span style={{fontFamily:"'JetBrains Mono'",minWidth:120,color:pair.dropped?"#FCA5A5":"#E2E8F0",textDecoration:pair.dropped?"line-through":"none"}}>
                  {a} + {b}
                </span>
                <div style={{flex:1,height:7,background:"#252833",borderRadius:4,overflow:"hidden"}}>
                  <div style={{width:(maxCount ? (pair.count / maxCount) * 100 : 0)+"%",height:"100%",background:isWinner?"#10B981":pair.dropped?"#EF4444":"#60A5FA",borderRadius:4}}/>
                </div>
                <span style={{fontFamily:"'JetBrains Mono'",color:isWinner?"#34D399":pair.dropped?"#FCA5A5":"#94A3B8",minWidth:60,textAlign:"right"}}>
                  {pair.count}x
                </span>
                {isWinner && <span style={{fontSize:"0.65rem",fontWeight:700,color:"#10B981"}}>→ WINNER</span>}
                {pair.dropped && <span style={{fontSize:"0.65rem",color:"#FCA5A5"}}>was {pair.prev}</span>}
              </div>
            );
          })}
        </div>
        {droppedPairs.length > 0 && (
          <div style={{marginTop:8,fontSize:"0.72rem",color:"#FCA5A5"}}>
            {droppedPairs[0][0].split("|").join(" + ")} was {droppedPairs[0][1]} before — the first token got absorbed into a merged token, so this pair no longer exists.
          </div>
        )}
      </div>
      {transitionPreview && (
        <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",marginBottom:"0.75rem",border:"1px solid #2E3240"}}>
          <div style={{fontFamily:"'JetBrains Mono'",fontSize:"0.73rem",lineHeight:1.6,wordBreak:"break-word"}}>
            <div><span style={{color:"#FCA5A5"}}>BEFORE:</span> <span style={{color:"#94A3B8"}}>{transitionPreview.before}</span></div>
            <div><span style={{color:"#34D399"}}>AFTER:</span> <span style={{color:"#E2E8F0"}}>{transitionPreview.after}</span></div>
          </div>
        </div>
      )}
      {step >= 1 && (
        <div style={{marginBottom:"0.75rem",padding:"0.8rem 0.9rem",background:"#12141C88",borderRadius:8,border:"1px solid #10B98133",fontSize:"0.78rem",color:"#94A3B8"}}>
          Notice how merging changes the landscape - "o + w" disappeared because "o" was absorbed into "lo". BPE always counts on the current state of the text, not the original.
        </div>
      )}
      <div style={{background:"#12141C",borderRadius:10,padding:"1rem",marginBottom:"0.75rem",border:"1px solid #2E3240"}}>
        <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Current Tokens</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {tokens.map((word,wi) => (
            <div key={wi} style={{display:"flex",gap:2,background:"#1E2130",borderRadius:5,padding:"3px 5px"}}>
              {word.map((tok,ti) => (
                <span key={ti} style={{background:tColors[tok.length%tColors.length]+"1A",color:tColors[tok.length%tColors.length],border:"1px solid "+tColors[tok.length%tColors.length]+"33",padding:"2px 7px",borderRadius:4,fontSize:"0.82rem",fontFamily:"'JetBrains Mono'",fontWeight:600}}>{tok}</span>
              ))}
            </div>
          ))}
        </div>
      </div>
      {mergeLog.length>0&&(
        <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 1rem",border:"1px solid #2E3240"}}>
          <div style={{color:"#6B7280",fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Merge Rules Learned</div>
          {mergeLog.map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<mergeLog.length-1?"1px solid #2E3240":"none",flexWrap:"wrap"}}>
              <span style={{color:"#6B7280",fontFamily:"'JetBrains Mono'",fontSize:"0.72rem",width:48}}>#{m.ruleNum}</span>
              <span style={{color:"#FBBF24",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem"}}>'{m.p1}'</span>
              <span style={{color:"#6B7280"}}>+</span>
              <span style={{color:"#FBBF24",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem"}}>'{m.p2}'</span>
              <span style={{color:"#6B7280"}}>→</span>
              <span style={{color:"#34D399",fontFamily:"'JetBrains Mono'",fontSize:"0.82rem",fontWeight:700}}>'{m.merged}'</span>
              <span style={{color:"#4B5563",fontSize:"0.72rem",marginLeft:"auto"}}>({m.count}×)</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// INTERACTIVE: Using Trained Tokenizer
// ============================================================
function TrainedTokenizerDemo() {
  const [inputWord, setInputWord] = useState("slower");
  const [showAllRules, setShowAllRules] = useState(true);
  const normalizedWord = (inputWord || "").trim().toLowerCase();
  const safeWord = normalizedWord || "slower";
  const steps = encodeWord(safeWord, MERGE_RULES);
  const ruleRows = steps.slice(1).filter(s => showAllRules || s.applied);
  const finalTokens = steps[steps.length - 1].tokens;
  const seenWords = new Set(["low", "lowest", "newer", "wider"]);
  const isSeenDuringTraining = seenWords.has(safeWord);
  const tokenColors = ["#34D399", "#60A5FA", "#FBBF24", "#A78BFA", "#FB7185", "#22D3EE"];

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.25rem 0 1.5rem"}}>
      <div style={{color:"#F59E0B",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:3}}>Using the Trained Tokenizer</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1rem"}}>Type any word — watch the merge rules apply step by step.</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:"0.85rem"}}>
        <input
          value={inputWord}
          placeholder="Type a word..."
          onChange={(e)=>setInputWord(e.target.value)}
          style={{flex:1,minWidth:200,padding:"8px 10px",borderRadius:8,border:"1px solid #404552",background:"#12141C",color:"#E2E8F0",fontSize:"0.86rem",outline:"none"}}
        />
        {["low","newer","slower"].map((word)=>(
          <button key={word} onClick={()=>setInputWord(word)} style={{padding:"7px 10px",borderRadius:7,border:"1px solid #404552",background:"#252833",color:"#E2E8F0",fontSize:"0.78rem",cursor:"pointer"}}>
            {word}
          </button>
        ))}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.6rem",flexWrap:"wrap",gap:8}}>
        <div style={{color:"#CBD5E1",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>Encoding: "{safeWord}"</div>
        <button onClick={()=>setShowAllRules(v=>!v)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #404552",background:"transparent",color:"#94A3B8",fontSize:"0.74rem",cursor:"pointer"}}>
          {showAllRules ? "Show applied only" : "Show all rules"}
        </button>
      </div>

      <div style={{background:"#12141C",borderRadius:10,padding:"0.8rem 0.95rem",border:"1px solid #2E3240",marginBottom:"0.8rem"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,fontFamily:"'JetBrains Mono'",fontSize:"0.76rem"}}>
          <span style={{color:"#94A3B8",minWidth:54}}>Start:</span>
          <span style={{color:"#E2E8F0"}}>{steps[0].tokens.map(t=>`[${t}]`).join(" ")}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:280,overflowY:"auto",paddingRight:2}}>
          {ruleRows.map((row) => {
            const [p1,p2] = row.rule;
            const merged = p1 + p2;
            return (
              <div key={row.ruleNum} style={{display:"flex",gap:8,alignItems:"center",padding:"4px 6px",borderRadius:6,background:row.applied?"#10B9811A":"transparent",border:row.applied?"1px solid #10B98144":"1px solid #2E3240",fontFamily:"'JetBrains Mono'",fontSize:"0.73rem",flexWrap:"wrap"}}>
                <span style={{color:"#6B7280",minWidth:50}}>Rule #{row.ruleNum}</span>
                <span style={{color:"#FBBF24",minWidth:130}}>{p1}+{p2} → {merged}</span>
                <span style={{color:row.applied?"#34D399":"#6B7280",minWidth:78}}>{row.applied ? "✓ Applied" : "✗ Skipped"}</span>
                <span style={{color:row.applied?"#E2E8F0":"#6B7280"}}>{row.applied ? row.tokens.map(t=>`[${t}]`).join(" ") : "(no match)"}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{background:"#12141C",borderRadius:10,padding:"0.75rem 0.95rem",border:"1px solid #2E3240",marginBottom:"0.8rem"}}>
        <div style={{color:"#94A3B8",fontSize:"0.75rem",marginBottom:6}}>Final tokens:</div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {finalTokens.map((tok, idx)=>(
            <span key={tok+idx} style={{padding:"3px 9px",borderRadius:999,border:"1px solid "+tokenColors[idx%tokenColors.length]+"66",background:tokenColors[idx%tokenColors.length]+"1A",color:tokenColors[idx%tokenColors.length],fontFamily:"'JetBrains Mono'",fontSize:"0.78rem",fontWeight:700}}>
              [{tok}]
            </span>
          ))}
          <span style={{color:"#94A3B8",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem",marginLeft:4}}>→ {finalTokens.length} tokens</span>
        </div>
      </div>

      <div style={{padding:"0.75rem 0.9rem",background:isSeenDuringTraining?"#10B98114":"#60A5FA14",border:isSeenDuringTraining?"1px solid #10B98144":"1px solid #60A5FA44",borderRadius:8,color:"#CBD5E1",fontSize:"0.8rem",lineHeight:1.65}}>
        {isSeenDuringTraining
          ? "This word was in the training data - its character pairs were frequent enough to merge all the way into a single token."
          : "This word was never in the training data, but the tokenizer handles it perfectly by breaking it into known pieces. This is the power of subword tokenization - it can handle any word, even ones it has never seen."}
      </div>
    </div>
  );
}

// ============================================================
// INTERACTIVE: Weights Demo
// ============================================================
function WeightsDemo() {
  const gridW = 420;
  const gridH = 320;
  const padL = 60;
  const padR = 20;
  const padT = 25;
  const padB = 55;
  const xMax = 11; // supports weight=5 -> x=10
  const yMax = 16; // supports weight=5 -> y=15

  const start = { x: 2, y: 3 };
  const target = { x: 6, y: 9 };
  const kitten = { x: 6.5, y: 9.5 };
  const [weightChoice, setWeightChoice] = useState(null); // null | 1 | 3 | 5

  const mul = weightChoice === null ? 1 : weightChoice;
  const pos = { x: start.x * mul, y: start.y * mul };

  const scaleX = (x) => padL + ((gridW - padL - padR) * x) / xMax;
  const scaleY = (y) => (gridH - padB) - ((gridH - padT - padB) * y) / yMax;

  const catCx = scaleX(pos.x);
  const catCy = scaleY(pos.y);
  const kittenCx = scaleX(kitten.x);
  const kittenCy = scaleY(kitten.y);
  const targetCx = scaleX(target.x);
  const targetCy = scaleY(target.y);

  const dotColor = weightChoice === 5 ? "#F87171" : "#60A5FA";
  const isSuccess = weightChoice === 3;
  const isError = weightChoice === 5;

  const dotBadgeX = Math.min(catCx + 8, gridW - 95);
  const dotBadgeY = Math.max(catCy - 18, 8);

  // Part B
  const [isTrained, setIsTrained] = useState(false);
  const trainW = 420;
  const trainH = 280;
  const trainPad = 20;

  const makeRandomPositions = () => {
    const rand = (min, max) => min + Math.random() * (max - min);
    return {
      king: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      queen: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      prince: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      princess: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      dog: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      cat: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      puppy: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      kitten: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      pizza: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      pasta: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
      sushi: { x: rand(trainPad, trainW - trainPad), y: rand(trainPad, trainH - trainPad) },
    };
  };

  const [randomPositions, setRandomPositions] = useState(() => makeRandomPositions());

  useEffect(() => {
    if (!isTrained) setRandomPositions(makeRandomPositions());
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [isTrained]);

  const clusterTargets = {
    king: { x: 320, y: 65 },
    queen: { x: 360, y: 85 },
    prince: { x: 305, y: 105 },
    princess: { x: 350, y: 125 },
    dog: { x: 95, y: 205 },
    cat: { x: 140, y: 225 },
    puppy: { x: 120, y: 255 },
    kitten: { x: 80, y: 245 },
    pizza: { x: 165, y: 155 },
    pasta: { x: 210, y: 170 },
    sushi: { x: 250, y: 145 },
  };

  const groups = [
    { word: "king", color: "#2563EB" },
    { word: "queen", color: "#3B82F6" },
    { word: "prince", color: "#60A5FA" },
    { word: "princess", color: "#93C5FD" },
    { word: "dog", color: "#059669" },
    { word: "cat", color: "#10B981" },
    { word: "puppy", color: "#34D399" },
    { word: "kitten", color: "#6EE7B7" },
    { word: "pizza", color: "#D97706" },
    { word: "pasta", color: "#F59E0B" },
    { word: "sushi", color: "#FBBF24" },
  ];

  const coordsForWord = (w) => (isTrained ? clusterTargets[w] : randomPositions[w]);

  const trainTrain = () => setIsTrained(true);
  const trainReset = () => {
    setIsTrained(false);
    setRandomPositions(makeRandomPositions());
  };

  const monoStyle = {
    fontFamily: "'JetBrains Mono', monospace",
    background: "#252833",
    padding: "2px 8px",
    borderRadius: 4,
    color: "#E2E8F0",
    fontSize: "0.88rem",
  };

  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.25rem 0 1.5rem"}}>
      <div style={{color:"#F59E0B",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.25rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:4}}>Why Weights Matter</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.05rem"}}>Moving a point by multiplying its coordinates</div>

      <div style={{background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"1rem",marginBottom:"1.25rem"}}>
        {/* Part A */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <div style={{color:"#94A3B8",fontSize:"0.72rem",letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>Moving a Token with Weights</div>
          <div style={{fontFamily:"'JetBrains Mono'",color:"#CBD5E1",fontSize:"0.82rem"}}>State: {weightChoice === null ? "null" : weightChoice}</div>
        </div>

        <svg width={gridW} height={gridH} style={{width:"100%",maxWidth:gridW,display:"block",margin:"0 auto"}}>
          {/* grid */}
          {Array.from({ length: xMax + 1 }, (_, i) => i).map((i) => (
            i % 1 === 0 && (
              <line
                key={"v" + i}
                x1={scaleX(i)}
                y1={padT}
                x2={scaleX(i)}
                y2={gridH - padB}
                stroke="#263043"
                strokeOpacity={0.45}
                strokeWidth={1}
              />
            )
          ))}
          {Array.from({ length: yMax + 1 }, (_, i) => i).map((i) => (
            i % 2 === 0 && (
              <line
                key={"h" + i}
                x1={padL}
                y1={scaleY(i)}
                x2={gridW - padR}
                y2={scaleY(i)}
                stroke="#263043"
                strokeOpacity={0.45}
                strokeWidth={1}
              />
            )
          ))}

          {/* axes */}
          <line x1={padL} y1={gridH - padB} x2={gridW - padR} y2={gridH - padB} stroke="#334155" strokeWidth={1} />
          <line x1={padL} y1={padT} x2={padL} y2={gridH - padB} stroke="#334155" strokeWidth={1} />

          <text x={(padL + (gridW - padR)) / 2} y={gridH - 16} fill="#94A3B8" fontSize="12" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
            Dimension 1
          </text>
          <text
            x={18}
            y={(padT + (gridH - padB)) / 2}
            fill="#94A3B8"
            fontSize="12"
            fontFamily="'JetBrains Mono', monospace"
            textAnchor="middle"
            transform={`rotate(-90 18 ${(padT + (gridH - padB)) / 2})`}
          >
            Dimension 2
          </text>

          {/* target zone */}
          <circle
            cx={targetCx}
            cy={targetCy}
            r={Math.max(18, (Math.min(gridW, gridH) / 18) * 2)}
            fill="#10B98122"
            stroke="#10B98155"
            strokeWidth={1}
          />
          <text x={targetCx} y={targetCy - 26} fill="#34D399" fontSize="12" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
            Target zone (closer to 'kitten')
          </text>

          {/* kitten */}
          <circle cx={kittenCx} cy={kittenCy} r={4.5} fill="#6EE7B7" opacity={0.45} />

          {/* too-much red zone */}
          {isError && (
            <rect
              x={scaleX(8)}
              y={scaleY(12)}
              width={gridW - padR - scaleX(8)}
              height={scaleY(0) - scaleY(12)}
              fill="#EF44441A"
              stroke="#EF444455"
              strokeDasharray="4 3"
              opacity={0.9}
            />
          )}

          {/* cat */}
          <circle
            cx={catCx}
            cy={catCy}
            r={8}
            fill={dotColor}
            style={{ transition: "all 0.5s ease" }}
          />

          {/* coordinate badge */}
          <g style={{ transition: "all 0.5s ease" }} transform={`translate(${dotBadgeX}, ${dotBadgeY})`}>
            <rect x={0} y={0} width={70} height={22} rx={6} fill="#111827" stroke="#2E3240" />
            <text x={35} y={15} fill="#E2E8F0" fontSize="12" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
              [{pos.x.toFixed(1).replace(".0","")},{pos.y.toFixed(1).replace(".0","")}]
            </text>
          </g>
        </svg>

        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",margin:"1rem 0 0.75rem"}}>
          <button onClick={()=>setWeightChoice(1)} style={{padding:"9px 12px",borderRadius:8,border:"1px solid #404552",background:weightChoice===1?"#252833":"transparent",color:weightChoice===1?"#E2E8F0":"#94A3B8",cursor:"pointer",fontSize:"0.82rem",fontWeight:700}}>
            Weight = 1 (no change)
          </button>
          <button onClick={()=>setWeightChoice(3)} style={{padding:"9px 12px",borderRadius:8,border:"1px solid #404552",background:weightChoice===3?"#252833":"transparent",color:weightChoice===3?"#E2E8F0":"#94A3B8",cursor:"pointer",fontSize:"0.82rem",fontWeight:700}}>
            Weight = 3 (just right)
          </button>
          <button onClick={()=>setWeightChoice(5)} style={{padding:"9px 12px",borderRadius:8,border:"1px solid #404552",background:weightChoice===5?"#252833":"transparent",color:weightChoice===5?"#E2E8F0":"#94A3B8",cursor:"pointer",fontSize:"0.82rem",fontWeight:700}}>
            Weight = 5 (too much)
          </button>
        </div>

        <div style={{color:"#CBD5E1",fontFamily:"'JetBrains Mono'",fontSize:"0.86rem"}}>
          Current weight: <span style={{color:isSuccess ? "#34D399" : isError ? "#F87171" : "#E2E8F0",fontWeight:800}}>{weightChoice === null ? "—" : weightChoice}</span>
          {"  "}•{"  "}
          Calculation: <span style={{color:"#E2E8F0"}}>[{start.x}×{mul}, {start.y}×{mul}] = [{pos.x}, {pos.y}]</span>
        </div>

        {isSuccess && (
          <div style={{marginTop:10,padding:"0.75rem 0.9rem",background:"#10B98114",border:"1px solid #10B98144",borderRadius:10,color:"#E2E8F0",fontSize:"0.9rem"}}>
            <span style={{color:"#34D399",fontWeight:800,marginRight:8}}>Success</span>[{start.x}×3, {start.y}×3] = [6, 9] (lands in the green zone)
          </div>
        )}
        {isError && (
          <div style={{marginTop:10,padding:"0.75rem 0.9rem",background:"#EF444414",border:"1px solid #EF444444",borderRadius:10,color:"#E2E8F0",fontSize:"0.9rem"}}>
            <span style={{color:"#F87171",fontWeight:800,marginRight:8}}>Error</span>[{start.x}×5, {start.y}×5] = [10, 15] (too far — outside the target zone)
          </div>
        )}
      </div>

      {/* Part B */}
      <div style={{borderTop:"1px solid #2E3240",paddingTop:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
          <div>
            <div style={{color:"#F0F4F8",fontWeight:800,fontFamily:"'Libre Baskerville',serif",fontSize:"1.05rem"}}>After billions of weight adjustments...</div>
            <div style={{color:"#94A3B8",fontSize:"0.82rem",marginTop:4}}>Words drift until meaning-based clusters emerge.</div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={trainTrain} style={{padding:"9px 14px",background:"#F59E0B",color:"#111",border:"none",borderRadius:8,fontWeight:800,cursor:"pointer",fontSize:"0.85rem"}}>Train Model</button>
            <button onClick={trainReset} style={{padding:"9px 14px",background:"transparent",color:"#94A3B8",border:"1px solid #404552",borderRadius:8,fontWeight:800,cursor:"pointer",fontSize:"0.85rem"}}>Reset</button>
          </div>
        </div>

        <svg width={trainW} height={trainH} style={{width:"100%",display:"block",margin:"0 auto",background:"#12141C",borderRadius:12,border:"1px solid #2E3240"}}>
          {isTrained && (
            <>
              <circle cx={345} cy={85} r={80} fill="none" stroke="#60A5FA" strokeOpacity={0.35} strokeDasharray="6 5" />
              <text x={345} y={85} fill="#60A5FA" fontSize="13" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
                Royalty
              </text>

              <circle cx={120} cy={215} r={85} fill="none" stroke="#34D399" strokeOpacity={0.35} strokeDasharray="6 5" />
              <text x={120} y={215} fill="#34D399" fontSize="13" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
                Animals
              </text>

              <circle cx={215} cy={160} r={75} fill="none" stroke="#F59E0B" strokeOpacity={0.35} strokeDasharray="6 5" />
              <text x={215} y={160} fill="#F59E0B" fontSize="13" fontFamily="'JetBrains Mono', monospace" textAnchor="middle">
                Food
              </text>
            </>
          )}

          {groups.map((g) => {
            const c = coordsForWord(g.word);
            const cx = c.x;
            const cy = c.y;
            return (
              <g key={g.word}>
                <circle cx={cx} cy={cy} r={6} fill={g.color} opacity={isTrained ? 0.95 : 0.9} style={{ transition: "all 1s ease" }} />
                <text
                  x={cx + 9}
                  y={cy + 4}
                  fill={g.color}
                  fontSize="13"
                  fontFamily="'JetBrains Mono', monospace"
                  style={{ transition: "all 1s ease" }}
                >
                  {g.word}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>

      <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:10,height:190,padding:"0 0.75rem"}}>
        {sentence.map((word,i)=>{
          const h=w[i]*270;const isH=w[i]===Math.max(...w);
          return(<div key={i} style={{textAlign:"center",flex:1}}>
            <div style={{color:isH?"#10B981":"#6B7280",fontFamily:"'JetBrains Mono'",fontSize:"0.75rem",fontWeight:700,marginBottom:5}}>{(w[i]*100).toFixed(0)}%</div>

          </div>);
        })}

    </div>
  );
}

function TemperatureDemo() {
  const [temp,setTemp]=useState(1.0);
  const words=["distributed","popular","powerful","open","versatile","high-level","banana","purple"];
  const logits=[5.2,4.1,3.9,3.5,2.8,2.3,0.3,-1.0];
  const applyT=(l,t)=>{if(t<0.05)return l.map((_,i)=>i===0?1:0);const s=l.map(v=>v/t);const mx=Math.max(...s);const e=s.map(v=>Math.exp(v-mx));const sm=e.reduce((a,b)=>a+b,0);return e.map(v=>v/sm);};
  const probs=applyT(logits,temp);const mx=Math.max(...probs);
  const lbl=temp<=0.3?{t:"Deterministic — code, facts",c:"#2563EB"}:temp<=0.7?{t:"Balanced — conversation",c:"#059669"}:temp<=1.2?{t:"Creative — writing",c:"#D97706"}:{t:"Wild — risky",c:"#DC2626"};
  return (
    <div style={{background:"#1A1D27",borderRadius:14,padding:"1.75rem",border:"1px solid #2E3240",margin:"1.5rem 0"}}>
      <div style={{color:"#F97316",fontSize:"0.7rem",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Interactive Demo</div>
      <div style={{color:"#F0F4F8",fontSize:"1.15rem",fontWeight:700,fontFamily:"'Libre Baskerville',serif",marginBottom:3}}>Temperature Control</div>
      <div style={{color:"#94A3B8",fontSize:"0.82rem",marginBottom:"1.25rem"}}>Prompt: "Python is a ___" — drag the slider.</div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:6}}>
        <span style={{color:"#2563EB",fontSize:"0.75rem",fontWeight:600}}>0</span>
        <input type="range" min="0" max="2" step="0.1" value={temp} onChange={e=>setTemp(parseFloat(e.target.value))}/>
        <span style={{color:"#DC2626",fontSize:"0.75rem",fontWeight:600}}>2.0</span>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
        <span style={{color:"#F0F4F8",fontFamily:"'JetBrains Mono'",fontSize:"1.4rem",fontWeight:700}}>{temp.toFixed(1)}</span>
        <span style={{color:lbl.c,fontSize:"0.82rem",fontWeight:600}}>{lbl.t}</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:7,height:170,padding:"0 0.4rem"}}>
        {words.map((word,i)=>{const h=probs[i]/(mx||1)*155;const isT=probs[i]===mx;
          return(<div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{color:isT?"#60A5FA":"#6B7280",fontFamily:"'JetBrains Mono'",fontSize:"0.65rem",fontWeight:600,marginBottom:3}}>{probs[i]>0.005?(probs[i]*100).toFixed(1)+"%":"<1%"}</div>
            <div style={{height:Math.max(h,2),background:isT?"linear-gradient(to top,#1E40AF,#3B82F6)":probs[i]>0.1?"#3B3F4E":"#252833",borderRadius:"4px 4px 0 0",transition:"height 0.3s",border:isT?"1px solid #60A5FA":"1px solid #2E3240"}}/>
            <div style={{color:probs[i]>0.05?"#E5E7EB":"#4B5563",fontSize:"0.6rem",fontFamily:"'JetBrains Mono'",marginTop:5,transform:"rotate(-30deg)",transformOrigin:"top left",whiteSpace:"nowrap",marginLeft:7}}>{word}</div>
          </div>);
        })}
      </div>
    </div>
  );
}

        </section>

        <SectionDivider part="1" title="How the Model Was Built" sub="The Training Story" color="var(--build-color)"/>

        <section id="ch1"><ChH num="1" title="The Big Picture" sub="Two training phases that create an LLM" color="var(--build-color)"/>
          <P>Before you can use an LLM, someone had to <S>build</S> it. This happens in two distinct phases.</P>
          <div style={{display:"flex",flexDirection:"column",gap:14,margin:"1.25rem 0"}}>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--build-border)",padding:"1.3rem",borderLeft:"4px solid var(--build-color)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"var(--build-color)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"1rem"}}>1</div>
                  <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.2rem",color:"var(--build-color)",fontWeight:700}}>Train the Tokenizer</span>
                </div>
                <span style={{color:"var(--text-muted)",fontSize:"0.82rem"}}>Hours • Cheap</span>
              </div>
              <P><S>Input:</S> Massive text dataset (internet, books, code)</P>
              <P><S>Output:</S> Vocabulary table (~100K entries) + Merge rules</P>
              <P><S>What it does:</S> Figures out how to split text into pieces (tokens)</P>
            </div>
            <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.3rem"}}>↓</div>
            <div style={{background:"white",borderRadius:12,border:"1px solid var(--info-border)",padding:"1.3rem",borderLeft:"4px solid var(--info-color)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"var(--info-color)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"1rem"}}>2</div>
                  <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.2rem",color:"var(--info-color)",fontWeight:700}}>Train the Model</span>
                </div>
                <span style={{color:"var(--text-muted)",fontSize:"0.82rem"}}>Months • Millions $$$</span>
              </div>
              <P><S>Input:</S> Same text, tokenized using Phase 1's tokenizer</P>
              <P><S>Output:</S> Embedding table + Attention weights + Feed-forward weights</P>
              <P><S>What it does:</S> Learns language — meaning, grammar, facts, reasoning</P>
            </div>
          </div>
          <Callout color="var(--build-color)"><S>Why two phases?</S> The model needs NUMBERS, not text. Phase 1 creates the converter. Phase 2 uses it to learn language.</Callout>
        </section>

        <section id="ch2"><ChH num="2" title="Training the Tokenizer" sub="How BPE creates the vocabulary" color="var(--build-color)"/>
          <P>We know machines don't understand English — they only understand numbers. So the very first step of any interaction with a machine is to convert human-readable text into machine-readable numbers.</P>
          <P>If you think about programming languages — we write code using text, characters, and numbers. There's something called a compiler that converts that code into numbers the machine can understand. But programming languages are structured. They have strict syntax rules, defined keywords, and clear standards. The compiler's job is straightforward because the input follows a predictable pattern.</P>
          <P>But here, we're talking to a machine (the LLM) in plain English. There's no fixed structure. Each person can ask the same question in completely different ways, using their own style of communication.</P>
          <div style={{display:"flex",gap:14,margin:"1.1rem 0 0.85rem",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:280,background:"white",borderRadius:12,border:"1px solid #BFE6D8",borderLeft:"4px solid #0E9F6E",padding:"1rem",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              <div style={{color:"#0F766E",fontWeight:700,fontSize:"0.92rem",marginBottom:8}}>Compiler (Structured Input)</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.75rem 0.9rem",margin:"0 0 0.65rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",lineHeight:1.6,color:"#E2E8F0"}}>{`def add(a, b):
    return a + b`}</pre>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.05rem",marginBottom:"0.45rem"}}>↓</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.6rem 0.9rem",margin:"0 0 0.7rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.73rem",lineHeight:1.5,color:"#A7F3D0"}}>{`01001010 11010010 10110001...`}</pre>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"0.6rem 0.7rem",background:"#ECFDF5",border:"1px solid #BBF7D0",borderRadius:8}}>
                <span style={{color:"#059669",fontSize:"0.95rem",lineHeight:1}}>✅</span>
                <span style={{color:"#065F46",fontSize:"0.8rem",lineHeight:1.5}}>Structured input with strict rules → straightforward conversion</span>
              </div>
            </div>
            <div style={{flex:1,minWidth:280,background:"white",borderRadius:12,border:"1px solid #F6D3A6",borderLeft:"4px solid #D97706",padding:"1rem",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
              <div style={{color:"#B45309",fontWeight:700,fontSize:"0.92rem",marginBottom:8}}>Tokenizer (Unstructured Input)</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.75rem 0.9rem",margin:"0 0 0.5rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.76rem",lineHeight:1.65,color:"#FDE68A"}}>{`"What's the weather?"
"Tell me if it's gonna rain today"
"Is it hot outside right now?"`}</pre>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"0.72rem",fontWeight:600,letterSpacing:0.3,marginBottom:"0.45rem"}}>Same question, 3 different ways</div>
              <div style={{textAlign:"center",color:"var(--text-muted)",fontSize:"1.05rem",marginBottom:"0.45rem"}}>↓</div>
              <pre style={{background:"#1A1D27",border:"1px solid #2E3240",borderRadius:8,padding:"0.6rem 0.9rem",margin:"0 0 0.7rem",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.73rem",lineHeight:1.5,color:"#FDBA74"}}>{`[3923, 596, 9282, 30]`}</pre>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,padding:"0.6rem 0.7rem",background:"#FFFBEB",border:"1px solid #FCD34D",borderRadius:8}}>
                <span style={{color:"#D97706",fontSize:"0.95rem",lineHeight:1}}>🧩</span>
                <span style={{color:"#9A3412",fontSize:"0.8rem",lineHeight:1.5}}>No fixed structure, infinite variations → needs a smarter approach</span>
              </div>
            </div>
          </div>
          <P>So we need a smart technique to efficiently convert free-form text into numbers. That technique is called <S color="var(--build-color)">tokenization</S>, and the specific algorithm used by modern LLMs is <S color="var(--build-color)">Byte Pair Encoding (BPE)</S>.</P>
          <P>The tokenizer is a <S>program</S> — not a neural network, not AI. It's a simple rule-based program that was trained once on billions of sentences to figure out the best way to split text into pieces.</P>
          <Callout color="var(--build-color)" icon="🔑"><S>BPE doesn't know any language.</S> Common words become single tokens because their characters appeared billions of times together — not because BPE understands English.</Callout>
          <P>Let's see BPE in action. Imagine we're training a tokenizer on a small text dataset. In reality, this runs on billions of sentences — we'll use a tiny example so you can see every step clearly.</P>
          <P><S>Training text:</S> low low low low low lowest lowest newer newer newer wider wider wider</P>
          <P>The algorithm starts by splitting every word into individual characters. That gives us 11 unique characters — this is our starting vocabulary.</P>
          <CB>{`const vocab = ["l", "o", "w", "e", "s", "t", "n", "r", "i", "d", " "];`}</CB>
          <P>Then it begins merging: it scans the entire text, counts every pair of adjacent characters, and merges the most frequent pair into a new token. This new token gets added to the vocabulary (nothing is ever removed). Then it scans again, counts again, merges again. Each merge grows the vocabulary by 1.</P>
          <P><S>Click "Next Merge" to step through the process:</S></P>
          <BPEDemo/>
          <P><S>"But wait — if the vocabulary only grows, when does it stop?"</S></P>
          <P>BPE doesn't run forever. The model creators set a vocabulary size limit before training begins — typically 100,000 tokens. The algorithm keeps merging until it hits that limit, then stops. Whatever didn't get merged stays as smaller pieces.</P>
          <P>This is why common words like "the" or "hello" become single tokens — they appeared billions of times, so their characters merged early. But rare words like "Bartholomew" stay split into pieces:</P>
          <CB>{`Step 1:        h + e → he          (appeared 900 million times)
Step 2:        he + l → hel        (appeared 700 million times)
...
Step 87,241:   hel + lo → hello    (appeared 50 million times - full word!)
...
Step 99,998:   Barthol + omew      (appeared only 4,200 times)
Step 99,999:   ...one more merge...
Step 100,000:  STOP. Vocabulary limit reached.`}</CB>
          <P><S>Result:</S> "hello" = 1 token, "Bartholomew" = 3 tokens (Barth + ol + omew)</P>
          <P>The vocabulary limit is a design choice. Bigger vocabulary = more single-token words = faster processing but more memory. Smaller vocabulary = more splitting = slower but lighter. Modern LLMs typically use 100K-128K tokens as the sweet spot.</P>
          <P>After training, two things are stored and <S color="var(--build-color)">frozen forever</S>:</P>
          <div style={{display:"flex",gap:12,margin:"1rem 0",flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:260,padding:"1rem",background:"var(--build-bg)",border:"1px solid var(--build-border)",borderRadius:10}}>
              <div style={{color:"var(--build-color)",fontWeight:700,marginBottom:4}}>Vocabulary Table</div>
              <div style={{background:"#fff8e8",border:"1px solid #f2d9a7",borderRadius:8,padding:"0.5rem 0.6rem",maxHeight:300,overflowY:"auto",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",color:"#8B5E34",fontWeight:700,padding:"3px 4px",borderBottom:"1px solid #f2d9a7"}}>
                  <span>Token</span><span>ID</span>
                </div>
                {[
                  ["l",0],["o",1],["w",2],["e",3],["s",4],["t",5],["n",6],["r",7],["i",8],["d",9],
                  ["lo",10],["low",11],["er",12],["ne",13],["new",14],["newer",15],["wi",16],["wid",17],["wider",18],["lowe",19],["lowes",20],["lowest",21]
                ].map((row,idx)=>(
                  <div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"3px 4px",background:idx%2===0?"#fff3dc":"#ffefcf",color:"#6b4b2c"}}>
                    <span style={{textAlign:"left"}}>{row[0]}</span>
                    <span style={{textAlign:"right"}}>{row[1]}</span>
                  </div>
                ))}
              </div>
              <div style={{color:"var(--text-muted)",fontSize:"0.74rem",marginTop:7,lineHeight:1.55}}>Our tiny training text produced 22 tokens. In reality, GPT-4's tokenizer was trained on billions of sentences and has ~100,000 tokens in its vocabulary.</div>
            </div>
            <div style={{flex:1,minWidth:260,padding:"1rem",background:"var(--build-bg)",border:"1px solid var(--build-border)",borderRadius:10}}>
              <div style={{color:"var(--build-color)",fontWeight:700,marginBottom:4}}>Merge Rules</div>
              <div style={{background:"#fff8e8",border:"1px solid #f2d9a7",borderRadius:8,padding:"0.5rem 0.6rem",maxHeight:300,overflowY:"auto",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.75rem"}}>
                {[
                  ["l","o","lo"],["lo","w","low"],["e","r","er"],["n","e","ne"],["ne","w","new"],["new","er","newer"],
                  ["w","i","wi"],["wi","d","wid"],["wid","er","wider"],["low","e","lowe"],["lowe","s","lowes"],["lowes","t","lowest"]
                ].map((r,idx)=>(
                  <div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 4px",background:idx%2===0?"#fff3dc":"#ffefcf",borderBottom:idx<11?"1px solid #f2d9a7":"none",flexWrap:"wrap"}}>
                    <span style={{color:"#9C9690",minWidth:58}}>Rule #{idx+1}</span>
                    <span style={{color:"#B45309"}}>{r[0]} + {r[1]} →</span>
                    <span style={{color:"#1A6B4E",fontWeight:700}}>{r[2]}</span>
                  </div>
                ))}
              </div>
              <div style={{color:"var(--text-muted)",fontSize:"0.74rem",marginTop:7,lineHeight:1.55}}>Our training produced 12 merge rules. GPT-4's tokenizer has ~100,000 merge rules, learned from trillions of tokens.</div>
            </div>
          </div>
          <P>Now that the tokenizer is trained, it's frozen forever. When you type a prompt to an LLM, the tokenizer doesn't count frequencies in your text — it simply applies its pre-learned merge rules one by one, in order. Let's see this in action.</P>
          <TrainedTokenizerDemo/>
        </section>

        <section id="ch3"><ChH num="3" title="Training the Model" sub="Learning meaning through weight adjustment" color="var(--build-color)"/>

          <P>The core idea: make the model <S color="var(--info-color)">predict the next token</S>. But how does a model "know" which token should come next?</P>

          <P>Every token is mapped to a point in a multi-dimensional space — think of a giant map where every word has a location. The model's job during training is to <S color="var(--build-color)">move related tokens closer together</S> in this space. "Cat" should be near "kitten." "King" should be near "queen." "Banana" should be far from both.</P>

          <P>But how do you move a point in space? Think of 2D coordinates. A token sits at <A color="var(--info-color)">[3, 4]</A>. To move it to <A color="var(--accent)">[6, 8]</A>, you multiply by 2: <code style={{fontFamily:"'JetBrains Mono', monospace",background:"#252833",padding:"2px 8px",borderRadius:4,color:"#E2E8F0",fontSize:"0.88rem"}}>[3×2, 4×2] = [6, 8]</code>. That multiplier — <S color="var(--build-color)">2</S> — is a weight.</P>

          <Callout color="var(--build-color)" icon="🔑">
            <S>Weights are just numbers that move tokens around in space.</S> The right weights pull related words together. The wrong weights push them apart. Training is the process of finding the right weights.
          </Callout>

          <WeightsDemo/>

          <P>In reality, the model uses <S>1,536 to 12,288 dimensions</S>, not 2. And instead of one weight, there are billions — but the principle is identical: multiply coordinates by weights to reposition tokens.</P>

          <P>The complete training loop:</P>

          <div style={{display:"flex",flexDirection:"column",gap:10,margin:"1rem 0 1.25rem"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"0.85rem 1rem"}}>
              <div style={{width:28,height:28,borderRadius:999,background:"var(--build-color)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:800,fontSize:"0.82rem"}}>1</div>
              <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.7}}>All tokens start at <span style={{color:"#FBBF24",fontWeight:800}}>RANDOM</span> positions in space</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"0.85rem 1rem"}}>
              <div style={{width:28,height:28,borderRadius:999,background:"var(--build-color)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:800,fontSize:"0.82rem"}}>2</div>
              <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.7}}>Model tries to predict the next token</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"0.85rem 1rem"}}>
              <div style={{width:28,height:28,borderRadius:999,background:"var(--build-color)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:800,fontSize:"0.82rem"}}>3</div>
              <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.7}}>Gets it wrong → measures <span style={{color:"#94A3B8"}}>"how wrong"</span> (loss)</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"0.85rem 1rem"}}>
              <div style={{width:28,height:28,borderRadius:999,background:"var(--build-color)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:800,fontSize:"0.82rem"}}>4</div>
              <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.7}}>Adjusts weights to move tokens to better positions</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",background:"#12141C",border:"1px solid #2E3240",borderRadius:12,padding:"0.85rem 1rem"}}>
              <div style={{width:28,height:28,borderRadius:999,background:"var(--build-color)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:800,fontSize:"0.82rem"}}>5</div>
              <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.7}}>Repeat trillions of times</div>
            </div>
          </div>

          <P>Over trillions of examples, three things emerge:</P>
          <div style={{display:"flex",flexDirection:"column",gap:10,margin:"0.6rem 0 1.1rem"}}>
            <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8}}>- The <S color="var(--info-color)">embedding table</S> positions similar words close together (shown in demo below)</div>
            <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8}}>- <S color="var(--purple)">Attention weights</S> learn to connect related words across a sentence</div>
            <div style={{color:"var(--text)",fontSize:"1.02rem",lineHeight:1.8}}>- <S color="var(--accent)">Feed-forward weights</S> absorb facts and knowledge</div>
          </div>

          <EmbeddingViz/>

          <Callout color="var(--info-color)">After training, everything is <S>frozen</S>. The model never learns again — the weights that were learned are locked in place forever.</Callout>
        </section>

        <SectionDivider part="2" title="How the Model Works" sub="The Inference Story" color="var(--work-color)"/>

        <section id="ch4"><ChH num="4" title="Text to Tokens" sub="The tokenizer converts your text into numbers" color="var(--work-color)"/>
          <P>The <S>tokenizer</S> applies its pre-learned merge rules, then looks up each token in the vocabulary table.</P>
          <CB>{`"Hello, how are you?"
  → Tokenizer applies merge rules
  → ["Hello", ",", " how", " are", " you", "?"]
  → Vocabulary lookup
  → [15339, 11, 1268, 527, 499, 30]`}</CB>
        </section>

        <section id="ch5"><ChH num="5" title="Tokens to Meaning" sub="Embedding lookup gives each token its meaning" color="var(--work-color)"/>
          <P>Token IDs are just numbers. The <S>embedding table</S> maps each to a meaning vector — a simple fetch.</P>
          <CB>{`15339 → [0.23, -0.45, 0.12, ...]  "Hello" general meaning
11    → [0.01,  0.78, -0.33, ...]  "," general meaning
1268  → [0.56,  0.12,  0.89, ...]  " how" general meaning`}</CB>
          <Callout icon="⚠️">These are <S>general</S> meanings. "bank" gets the same vector whether about rivers or money. Context comes from self-attention.</Callout>
        </section>

        <section id="ch6"><ChH num="6" title="Understanding Context" sub="Self-attention connects words to build meaning" color="var(--work-color)"/>
          <P>Every word looks at every other word: <S color="var(--purple)">"how relevant are you for understanding me?"</S></P>
          <P>Each embedding is multiplied by three weight matrices to create <S>Query</S>, <S>Key</S>, and <S>Value</S> vectors.</P>
          <AttentionDemo/>
          <Callout color="var(--purple)">The output is <S>added</S> to the original embedding — not replaced. This "residual connection" preserves identity while adding context.</Callout>
        </section>

        <section id="ch7"><ChH num="7" title="Activating Knowledge" sub="Feed-forward applies stored facts" color="var(--work-color)"/>
          <P>Self-attention gave context. Feed-forward activates <S>knowledge</S> stored in its weights.</P>
          <CB>{`Self-Attention: "What does this word mean HERE?"
Feed-Forward:   "What do I KNOW about this?"

→ EXPAND to 6144 dims (activate knowledge)
→ ReLU: turn OFF irrelevant knowledge
→ COMPRESS to 1536 dims (keep relevant facts)`}</CB>
          <P>One Transformer layer = self-attention + feed-forward. Repeat <S>32 to 120+ times</S>.</P>
        </section>

        <section id="ch8"><ChH num="8" title="Generating the Response" sub="One token at a time" color="var(--work-color)"/>
          <P>LLMs generate text <S color="var(--red)">one token at a time</S>. Predict one, append it, run everything again.</P>
          <CB>{`"What is Python?"
  Iter 1: [What, is, Python, ?]         → "Python"
  Iter 2: [What, is, Python, ?, Python] → " is"
  Iter 3: [..., Python, is]             → " a"
  ...
  Iter 50: [...]                        → END
  → "Python is a high-level programming language..."`}</CB>
          <Callout color="var(--red)" icon="⚡">This is why <S>streaming</S> exists — tokens appear one by one. Longer responses cost more. The model can't go back and fix mistakes.</Callout>
        </section>

        <section id="ch9"><ChH num="9" title="Controlling Creativity" sub="Temperature, Top-P, and Top-K" color="var(--work-color)"/>
          <P><S>Temperature</S> controls whether the model picks the safe word or takes creative risks.</P>
          <TemperatureDemo/>
          <div style={{marginTop:"1.25rem"}}>
            <P><S color="var(--info-color)">Top-K:</S> Only consider the top K tokens. Fixed cutoff.</P>
            <P><S color="var(--orange)">Top-P (nucleus):</S> Keep tokens until cumulative probability reaches P. Adapts to confidence. Generally preferred.</P>
          </div>
          <div style={{background:"white",borderRadius:10,padding:"1.1rem",border:"1px solid var(--border)",margin:"1.25rem 0"}}>
            <div style={{fontWeight:700,marginBottom:8,fontFamily:"'Libre Baskerville',serif",fontSize:"1rem"}}>Practical Defaults</div>
            {[{use:"Code generation",temp:"0",topP:"1.0",c:"var(--info-color)"},{use:"Factual Q&A",temp:"0.3",topP:"0.9",c:"#0E7490"},{use:"General conversation",temp:"0.7",topP:"0.9",c:"var(--accent)"},{use:"Creative writing",temp:"1.0",topP:"0.95",c:"var(--build-color)"}].map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<3?"1px solid var(--border-light)":"none"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:r.c,flexShrink:0}}/>
                <span style={{flex:1,fontSize:"0.88rem"}}>{r.use}</span>
                <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>temp={r.temp}</span>
                <span style={{color:"var(--text-muted)",fontFamily:"'JetBrains Mono'",fontSize:"0.8rem"}}>top_p={r.topP}</span>
              </div>
            ))}
          </div>
        </section>

        <div style={{marginTop:"3rem",padding:"1.75rem",background:"white",borderRadius:12,textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontFamily:"'Libre Baskerville',serif",fontSize:"1.3rem",fontWeight:700,marginBottom:6}}>You've completed this module</div>
          <div style={{color:"var(--text-muted)",fontSize:"0.92rem"}}>You now understand the complete journey — from training data to the response you see in ChatGPT.</div>
          <div style={{color:"var(--accent)",fontSize:"0.88rem",fontWeight:600,marginTop:8}}>Next → Prompt Engineering Deep Dive</div>
        </div>

      </div></div>
    </div>
  );
}
