# Optional. The app runs perfectly well with LangGraph's in-memory
# checkpointer (the default - see app/graph.py). Use this only to exercise
# the production pattern described in Section 11 of the design doc: a
# durable, Postgres-backed checkpointer so conversation state survives a
# process restart and any pod can serve any session.
#
# Usage:
#   docker compose up -d
#   # then set CHECKPOINTER_DB_URL in .env and wire it into app/graph.py's
#   # build_graph() in place of MemorySaver() - see the walkthrough doc,
#   # Section "Swapping in production infrastructure".
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator_checkpoints
    ports:
      - "5433:5432"
    volumes:
      - orchestrator_pg_data:/var/lib/postgresql/data

volumes:
  orchestrator_pg_data:
